<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico?v=2" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>eCompany · AI 虚拟公司</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'PingFang SC','Microsoft YaHei',sans-serif}
body{background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);min-height:100vh;display:flex;align-items:center;justify-content:center;color:#e0e0e0}
.card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:32px;width:380px;text-align:center}
.card h2{color:#fff;margin-bottom:8px;font-size:18px}
.card p{color:#8892b0;font-size:12px;margin-bottom:20px}
.qr-area{margin:16px auto;min-height:200px;display:flex;align-items:center;justify-content:center}
.qr-area img{width:180px;height:180px;border-radius:8px}
.qr-area .loading{color:#6b7294;font-size:13px}
.btn{padding:8px 24px;border-radius:8px;border:none;cursor:pointer;font-size:14px;font-weight:600}
.btn-primary{background:#4ecdc4;color:#0f0c29}
.btn-primary:hover{background:#45b7aa}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed}
.status{font-size:12px;margin-top:12px;min-height:20px}
.status.ok{color:#22c55e}
.status.err{color:#ef4444}
.status.wait{color:#eab308}
.back{margin-top:16px;display:inline-block;color:#4ecdc4;text-decoration:none;font-size:12px}
.steps{text-align:left;font-size:11px;color:#8892b0;margin:12px 0;line-height:1.8}
.steps b{color:#e0e0e0}
</style>
</head>
<body>
<div class="card">
  <h2>🐧 QQ 机器人绑定</h2>
  <p>扫码绑定后，QQ 消息将直达 eCompany CEO</p>
  <div id="bindStatus"></div>
  <div class="qr-area" id="qrArea">
    <div class="loading" id="qrStatus">正在获取二维码...</div>
  </div>
  <div class="steps" id="steps">
    <b>操作步骤：</b><br>
    1. 打开手机 QQ 扫一扫<br>
    2. 在 QQ 开放平台登录并创建机器人<br>
    3. 复制 AppID 和 Secret 填入设置页<br>
    <b>或直接：</b>在设置页填写已有的机器人的 AppID 和 Secret
  </div>
  <button class="btn btn-primary" id="qrBtn" onclick="getQR()">获取二维码</button>
  <div class="status" id="msg"></div>
  <a href="/settings" class="back">← 返回设置</a>
</div>
<script>
var pollTimer = null;
function checkBound() {
  var x = new XMLHttpRequest();
  x.open('GET', '/api/qqbot/bind/status', true);
  x.onload = function() {
    try {
      var s = JSON.parse(x.responseText);
      if (s.bound) {
        document.getElementById('bindStatus').innerHTML = '<div style="color:#22c55e;font-size:12px;margin-bottom:12px;padding:8px;background:rgba(34,197,94,0.08);border-radius:6px">✅ 已绑定 ' + (s.account || '') + '</div>';
        document.getElementById('steps').style.display = 'none';
      }
    } catch(e) {}
  };
  x.send();
}
checkBound();
function getQR() {
  var btn = document.getElementById('qrBtn');
  var area = document.getElementById('qrArea');
  var msg = document.getElementById('msg');
  btn.disabled = true;
  btn.textContent = '获取中...';
  msg.className = 'status wait';
  msg.textContent = '正在生成二维码...';
  var x = new XMLHttpRequest();
  x.open('GET', '/api/qqbot/qrcode', true);
  x.onload = function() {
    try {
      var d = JSON.parse(x.responseText);
      if (d.ok && d.image) {
        area.innerHTML = '<img src="' + d.image + '" alt="QQ 二维码" />';
        msg.textContent = '请用 QQ 扫码绑定';
        msg.className = 'status ok';
        btn.textContent = '刷新二维码';
        btn.disabled = false;
      } else {
        msg.textContent = '❌ ' + (d.error || '获取失败');
        msg.className = 'status err';
        btn.textContent = '重试';
        btn.disabled = false;
      }
    } catch(e) { msg.textContent = '❌ 解析失败'; msg.className = 'status err'; btn.textContent = '重试'; btn.disabled = false; }
  };
  x.onerror = function() { msg.textContent = '❌ 请求失败'; msg.className = 'status err'; btn.textContent = '重试'; btn.disabled = false; };
  x.send();
}
</script>
</body>
</html>
