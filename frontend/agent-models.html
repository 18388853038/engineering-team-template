<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico?v=2" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>eCompany · AI 虚拟公司</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'PingFang SC','Microsoft YaHei',sans-serif}
body{background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);min-height:100vh;color:#e0e0e0;padding:24px}
h1{color:#4ecdc4;font-size:20px;margin-bottom:4px}
.desc{color:#8892b0;font-size:12px;margin-bottom:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:12px}
.card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:16px}
.card h3{font-size:14px;color:#fff;margin-bottom:4px}
.card .role{font-size:11px;color:#8892b0;margin-bottom:10px}
.card label{display:block;font-size:11px;color:#8892b0;margin-bottom:2px;margin-top:8px}
.card select,.card input{width:100%;padding:6px 10px;border-radius:4px;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.04);color:#e0e0e0;font-size:12px;outline:none}
.card select:focus,.card input:focus{border-color:#4ecdc4}
.strategy-tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;margin-left:6px}
.strategy-fixed{background:rgba(78,205,196,0.15);color:#4ecdc4}
.strategy-fallback{background:rgba(234,179,8,0.15);color:#eab308}
.strategy-roundrobin{background:rgba(99,102,241,0.15);color:#6366f1}
.strategy-smart{background:rgba(168,85,247,0.15);color:#a855f7}
.save-btn{padding:6px 16px;background:#4ecdc4;color:#0f0c29;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;margin-top:10px}
.save-btn:hover{background:#45b7aa}
.save-btn:disabled{opacity:0.5}
.status{font-size:11px;margin-top:6px;min-height:16px}
.back{display:inline-block;margin-top:16px;color:#4ecdc4;text-decoration:none;font-size:12px}
</style>
</head>
<body>
<h1>🧠 Agent 多模型策略</h1>
<p class="desc">为每个 AI 员工独立配置 AI 模型，未配置的自动使用全局默认模型</p>
<a href="/settings" class="back" style="display:inline-block;margin-bottom:16px;color:#4ecdc4;text-decoration:none;font-size:13px">← 返回系统设置</a>
<div class="grid" id="agentGrid"></div>
<a href="/settings" class="back">← 返回设置</a>
<script>
var A = ["deepseek","openai","claude","gemini","qwen","moonshot","tongyi","zhipu"];
var PL = {deepseek:"DeepSeek",openai:"OpenAI",claude:"Claude",gemini:"Gemini",qwen:"Qwen",moonshot:"Moonshot",tongyi:"通义千问",zhipu:"智谱GLM"};
var MS = {deepseek:["deepseek-chat","deepseek-reasoner","deepseek-v4-flash","deepseek-v4-pro"],qwen:["qwen3.5-plus","qwen3-max-2026-01-23","qwen3-coder-plus"],openai:["gpt-4o","gpt-4o-mini"],claude:["claude-sonnet-4-20250514"],gemini:["gemini-2.5-flash","gemini-2.5-pro"]};
var ST = ["fixed","fallback","roundrobin","smart"];
var SL = {fixed:"固定",fallback:"自动回退",roundrobin:"轮流",smart:"智能路由"};
var agents = [];
var configs = {};

async function load() {
  var ar = await fetch("/api/agents").then(function(r){return r.json();});
  var mr = await fetch("/api/agent-models").then(function(r){return r.json();});
  agents = (ar.agents || ar || []);
  configs = mr.agents || {};
  var grid = document.getElementById("agentGrid");
  grid.innerHTML = "";
  agents.forEach(function(a) {
    if (a.id === "ai_ceo") return;
    var cfg = configs[a.id] || {};
    var card = document.createElement("div");
    card.className = "card";
    card.id = "card-" + a.id;
    var strat = cfg.strategy || "fixed";
    var h = "";
    h += '<h3>' + (a.icon || "") + ' ' + (a.name_cn || a.name || a.id);
    h += '<span class="strategy-tag strategy-' + strat + '">' + SL[strat] + '</span></h3>';
    h += '<div class="role">' + (a.title || "") + '</div>';
    h += '<label>💡 模型提供商</label>';
    h += '<select id="p-' + a.id + '" onchange="updateModelList(\'' + a.id + '\')">';
    h += A.map(function(p) { return '<option value="' + p + '"' + (cfg.provider === p ? " selected" : "") + '>' + PL[p] + '</option>'; }).join("");
    h += '</select>';
    h += '<label>🗄️ 模型名称</label>';
    h += '<input id="m-' + a.id + '" value="' + (cfg.model || "") + '" placeholder="留空使用默认模型">';
    h += '<label>🧠 策略模式</label>';
    h += '<select id="s-' + a.id + '">';
    h += ST.map(function(s) { return '<option value="' + s + '"' + (cfg.strategy === s ? " selected" : "") + '>' + SL[s] + '</option>'; }).join("");
    h += '</select>';
    h += '<button class="save-btn" id="btn-' + a.id + '" onclick="save(\'' + a.id + '\')">💾 保存</button>';
    h += '<div class="status" id="st-' + a.id + '"></div>';
    card.innerHTML = h;
    grid.appendChild(card);
    updateModelList(a.id);
  });
}

function updateModelList(id) {
  var s = document.getElementById("p-" + id);
  var m = document.getElementById("m-" + id);
  if (!s || !m) return;
  var sug = MS[s.value] || [];
  m.placeholder = sug.length > 0 ? "例如: " + sug[0] : "输入模型名";
}

async function save(id) {
  var btn = document.getElementById("btn-" + id);
  var st = document.getElementById("st-" + id);
  btn.disabled = true;
  st.textContent = "保存中...";
  try {
    var body = { agentId: id, config: {
      provider: document.getElementById("p-" + id).value,
      model: document.getElementById("m-" + id).value,
      strategy: document.getElementById("s-" + id).value
    }};
    var r = await fetch("/api/agent-models", { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify(body) });
    var d = await r.json();
    if (d.ok) { st.textContent = "✅ 已保存"; st.style.color = "#22c55e"; }
    else { st.textContent = "❌ " + d.error; st.style.color = "#ef4444"; }
  } catch(e) { st.textContent = "❌ " + e.message; st.style.color = "#ef4444"; }
  btn.disabled = false;
}

load();
</script>
</body>
</html>
