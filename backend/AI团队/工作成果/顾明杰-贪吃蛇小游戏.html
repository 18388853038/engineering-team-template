<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🐍 贪吃蛇 · 顾明杰</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0e17;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
        }

        .container {
            background: linear-gradient(145deg, #111827, #0f172a);
            border-radius: 28px;
            padding: 36px 44px 44px;
            box-shadow:
                0 25px 80px rgba(0, 0, 0, 0.8),
                inset 0 1px 0 rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 20%, rgba(34, 197, 94, 0.03), transparent 60%);
            pointer-events: none;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 22px;
            padding: 0 6px;
            position: relative;
            z-index: 1;
        }

        .title {
            color: #e2e8f0;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 1.5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .title .snake-icon {
            font-size: 28px;
        }
        .title .brand {
            color: #22c55e;
            position: relative;
        }
        .title .brand::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, #22c55e, transparent);
            border-radius: 2px;
        }

        .stats {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat-label {
            color: #64748b;
            font-size: 13px;
            font-weight: 500;
        }

        .stat-value {
            background: #1e293b;
            color: #22d972;
            font-size: 22px;
            font-weight: 700;
            padding: 4px 16px;
            border-radius: 10px;
            min-width: 48px;
            text-align: center;
            font-variant-numeric: tabular-nums;
            border: 1px solid rgba(34, 197, 94, 0.15);
            transition: all 0.3s ease;
        }

        .stat-value.best {
            color: #a78bfa;
            border-color: rgba(167, 139, 250, 0.15);
        }

        .stat-value.pop {
            transform: scale(1.15);
            border-color: rgba(34, 197, 94, 0.5);
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.15);
        }

        .canvas-wrapper {
            position: relative;
            display: inline-block;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.6);
            z-index: 1;
        }

        canvas {
            display: block;
            background: #0c1322;
            width: 480px;
            height: 480px;
            image-rendering: pixelated;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(10, 14, 23, 0.88);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 2;
        }
        .overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .overlay-icon {
            font-size: 52px;
            margin-bottom: 12px;
            animation: float 2s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .overlay-title {
            color: #f1f5f9;
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 4px;
            letter-spacing: 1px;
        }
        .overlay-title.gameover {
            background: linear-gradient(135deg, #f87171, #ef4444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .overlay-sub {
            color: #94a3b8;
            font-size: 16px;
            margin-bottom: 2px;
        }

        .overlay-score {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 52px;
            font-weight: 900;
            margin: 6px 0 10px;
            letter-spacing: 2px;
        }

        .overlay-hint {
            color: #64748b;
            font-size: 14px;
            letter-spacing: 0.5px;
            margin-top: 4px;
        }

        .overlay-hint .key-badge {
            display: inline-block;
            background: #1e293b;
            border: 1px solid #334155;
            color: #22c55e;
            padding: 5px 18px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 15px;
            margin: 0 4px;
            font-family: monospace;
        }

        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 18px;
            padding: 0 6px;
            position: relative;
            z-index: 1;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .controls .hint {
            color: #475569;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .keycap {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #1e293b;
            color: #94a3b8;
            width: 30px;
            height: 30px;
            border-radius: 7px;
            font-size: 14px;
            font-weight: 700;
            border: 1px solid #334155;
            box-shadow: 0 2px 0 #0f172a;
            transition: all 0.1s;
        }
        .keycap:active {
            transform: translateY(1px);
            box-shadow: none;
        }

        .btn {
            background: #1e293b;
            border: 1px solid #334155;
            color: #94a3b8;
            font-size: 13px;
            font-weight: 600;
            padding: 8px 22px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.25s ease;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .btn:hover {
            background: #334155;
            color: #e2e8f0;
            border-color: #22c55e;
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.1);
        }
        .btn:active {
            transform: scale(0.96);
        }

        .speed-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #475569;
            font-size: 12px;
        }
        .speed-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #334155;
            transition: all 0.3s;
        }
        .speed-dot.active {
            background: #22c55e;
            box-shadow: 0 0 8px rgba(34, 197, 94, 0.4);
        }

        /* 移动端触控区域 */
        .touch-area {
            display: none;
            position: relative;
            z-index: 1;
            margin-top: 16px;
            padding: 0 6px;
        }

        .touch-grid {
            display: grid;
            grid-template-columns: 64px 64px 64px;
            grid-template-rows: 64px 64px;
            gap: 6px;
            justify-content: center;
        }

        .touch-btn {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 14px;
            color: #94a3b8;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.15s;
            -webkit-tap-highlight-color: transparent;
        }
        .touch-btn:active {
            background: #334155;
            transform: scale(0.92);
        }
        .touch-btn.up    { grid-column: 2; grid-row: 1; }
        .touch-btn.down  { grid-column: 2; grid-row: 2; }
        .touch-btn.left  { grid-column: 1; grid-row: 2; }
        .touch-btn.right { grid-column: 3; grid-row: 2; }

        @media (max-width: 540px) {
            .container {
                padding: 20px 16px 24px;
                border-radius: 20px;
                margin: 10px;
                width: calc(100% - 20px);
            }
            canvas {
                width: 100%;
                height: auto;
                aspect-ratio: 1/1;
            }
            .header {
                flex-wrap: wrap;
                gap: 10px;
            }
            .title { font-size: 18px; }
            .stats { gap: 10px; flex-wrap: wrap; }
            .stat-value { font-size: 16px; padding: 2px 10px; min-width: 36px; }
            .footer { flex-wrap: wrap; gap: 10px; justify-content: center; }
            .controls .hint { font-size: 12px; }
            .touch-area { display: block; }
            .overlay-title { font-size: 24px; }
            .overlay-score { font-size: 38px; }
        }

        @media (pointer: coarse) {
            .touch-area { display: block; }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- 头部 -->
    <div class="header">
        <div class="title">
            <span class="snake-icon">🐍</span>
            <span><span class="brand">贪吃蛇</span></span>
        </div>
        <div class="stats">
            <div class="stat-item">
                <span class="stat-label">🏆 最高</span>
                <span class="stat-value best" id="bestScoreDisplay">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">🍎 分数</span>
                <span class="stat-value" id="scoreDisplay">0</span>
            </div>
        </div>
    </div>

    <!-- 画布 -->
    <div class="canvas-wrapper">
        <canvas id="gameCanvas" width="480" height="480"></canvas>
        <div class="overlay" id="overlay">
            <div class="overlay-icon" id="overlayIcon">💀</div>
            <div class="overlay-title gameover" id="overlayTitle">游戏结束</div>
            <div class="overlay-sub">最终得分</div>
            <div class="overlay-score" id="finalScore">0</div>
            <div class="overlay-hint">
                按 <span class="key-badge">␣ 空格</span> 重新开始
            </div>
        </div>
    </div>

    <!-- 底部 -->
    <div class="footer">
        <div class="controls">
            <span class="hint">
                <span class="keycap">↑</span>
                <span class="keycap">↓</span>
                <span class="keycap">←</span>
                <span class="keycap">→</span>
                <span style="color:#475569;margin-left:2px;">方向</span>
            </span>
            <span class="speed-indicator">
                <span style="color:#475569;">⚡</span>
                <span class="speed-dot active" id="speedDot1"></span>
                <span class="speed-dot" id="speedDot2"></span>
                <span class="speed-dot" id="speedDot3"></span>
            </span>
        </div>
        <button class="btn" id="restartBtn">🔄 重新开始</button>
    </div>

    <!-- 移动端触摸控制 -->
    <div class="touch-area">
        <div class="touch-grid">
            <div class="touch-btn up" data-dir="up">↑</div>
            <div class="touch-btn down" data-dir="down">↓</div>
            <div class="touch-btn left" data-dir="left">←</div>
            <div class="touch-btn right" data-dir="right">→</div>
        </div>
    </div>
</div>

<script>
(function () {
    'use strict';

    // ============ 配置 ============
    const GRID_SIZE = 20;              // 20x20 网格
    const CELL_SIZE = 24;              // 像素
    const CANVAS_SIZE = 480;
    const BASE_INTERVAL = 150;         // 基础速度 (ms)

    const DIR = {
        UP:    { x: 0,  y: -1 },
        DOWN:  { x: 0,  y: 1  },
        LEFT:  { x: -1, y: 0  },
        RIGHT: { x: 1,  y: 0  },
    };

    // ============ DOM 引用 ============
    const canvas  = document.getElementById('gameCanvas');
    const ctx     = canvas.getContext('2d');
    const scoreEl = document.getElementById('scoreDisplay');
    const bestEl  = document.getElementById('bestScoreDisplay');
    const finalEl = document.getElementById('finalScore');
    const overlay = document.getElementById('overlay');
    const iconEl  = document.getElementById('overlayIcon');
    const titleEl = document.getElementById('overlayTitle');
    const restartBtn = document.getElementById('restartBtn');

    // ============ 游戏状态 ============
    let snake      = [];        // [{x, y}]  蛇身，头在索引0
    let food       = { x: 8, y: 10 };
    let dir        = DIR.RIGHT;
    let nextDir    = DIR.RIGHT;
    let score      = 0;
    let bestScore  = parseInt(localStorage.getItem('snake_best') || '0', 10);
    let active     = false;     // 游戏中
    let over       = false;     // 已结束
    let timerId    = null;
    let dirLocked  = false;     // 同一帧防止多次转向
    let eatCount   = 0;         // 吃到的食物计数，用于加速

    // 速度等级
    const SPEED_LEVELS = [
        { threshold: 0,  interval: 150, label: '慢' },
        { threshold: 5,  interval: 120, label: '中' },
        { threshold: 12, interval: 90,  label: '快' },
        { threshold: 20, interval: 70,  label: '极速' },
    ];

    // ============ DOM 更新 ============
    function updateScoreUI() {
        scoreEl.textContent = score;
        bestEl.textContent  = bestScore;
        // 分数动画
        scoreEl.classList.remove('pop');
        void scoreEl.offsetWidth;
        scoreEl.classList.add('pop');
        setTimeout(() => scoreEl.classList.remove('pop'), 300);
    }

    function updateSpeedUI() {
        const level = getSpeedLevel();
        document.querySelectorAll('.speed-dot').forEach((dot, i) => {
            dot.classList.toggle('active', i <= level);
        });
    }

    function getSpeedLevel() {
        let level = 0;
        for (let i = SPEED_LEVELS.length - 1; i >= 0; i--) {
            if (eatCount >= SPEED_LEVELS[i].threshold) {
                level = i;
                break;
            }
        }
        return level;
    }

    function getCurrentInterval() {
        return SPEED_LEVELS[getSpeedLevel()].interval;
    }

    // ============ 初始化 ============
    function initGame() {
        snake = [
            { x: 9, y: 10 },
            { x: 8, y: 10 },
            { x: 7, y: 10 },
        ];
        dir       = DIR.RIGHT;
        nextDir   = DIR.RIGHT;
        score     = 0;
        eatCount  = 0;
        over      = false;
        active    = true;
        dirLocked = false;

        spawnFood();
        updateScoreUI();
        updateSpeedUI();
        overlay.classList.remove('active');
        draw();

        // 重新开始计时器
        clearTimer();
        startTimer();
    }

    // ============ 食物生成 ============
    function spawnFood() {
        const total = GRID_SIZE * GRID_SIZE;
        if (snake.length >= total) return;

        const occupied = new Set(snake.map(c => `${c.x},${c.y}`));
        const free = [];
        for (let x = 0; x < GRID_SIZE; x++) {
            for (let y = 0; y < GRID_SIZE; y++) {
                if (!occupied.has(`${x},${y}`)) free.push({ x, y });
            }
        }
        if (free.length === 0) return;
        food = free[Math.floor(Math.random() * free.length)];
    }

    // ============ 计时器 ============
    function startTimer() {
        stopTimer();
        timerId = setInterval(tick, getCurrentInterval());
    }

    function stopTimer() {
        if (timerId !== null) {
            clearInterval(timerId);
            timerId = null;
        }
    }

    function clearTimer() {
        stopTimer();
    }

    function restartTimer() {
        if (active && !over) {
            stopTimer();
            startTimer();
        }
    }

    // ============ 游戏主循环 Tick ============
    function tick() {
        if (!active || over) return;

        // 应用方向
        dir = nextDir;
        dirLocked = false;

        // 计算新头部
        const head = snake[0];
        const newHead = {
            x: head.x + dir.x,
            y: head.y + dir.y,
        };

        // 检查是否吃到食物
        const ate = (newHead.x === food.x && newHead.y === food.y);

        // 移动蛇
        snake.unshift(newHead);
        if (!ate) {
            snake.pop();
        } else {
            score += 1;
            eatCount += 1;
            updateScoreUI();
            updateSpeedUI();
            // 速度变化时重新设定计时器
            restartTimer();
            spawnFood();
            // 胜利条件
            if (snake.length >= GRID_SIZE * GRID_SIZE) {
                gameWin();
                return;
            }
        }

        // 碰撞检测
        if (checkCollision()) {
            gameOver();
            return;
        }

        draw();
    }

    // ============ 碰撞检测 ============
    function checkCollision() {
        const head = snake[0];

        // 撞墙
        if (head.x < 0 || head.x >= GRID_SIZE || head.y < 0 || head.y >= GRID_SIZE) {
            return true;
        }

        // 撞自身（从索引1开始检查）
        for (let i = 1; i < snake.length; i++) {
            if (snake[i].x === head.x && snake[i].y === head.y) {
                return true;
            }
        }

        return false;
    }

    // ============ 游戏结束 / 胜利 ============
    function gameOver() {
        if (over) return;
        over = true;
        active = false;
        stopTimer();

        // 更新最高分
        if (score > bestScore) {
            bestScore = score;
            localStorage.setItem('snake_best', String(bestScore));
        }

        finalEl.textContent = score;
        iconEl.textContent  = '💀';
        titleEl.textContent = '游戏结束';
        titleEl.className   = 'overlay-title gameover';
        overlay.classList.add('active');
        draw();
    }

    function gameWin() {
        over = true;
        active = false;
        stopTimer();

        if (score > bestScore) {
            bestScore = score;
            localStorage.setItem('snake_best', String(bestScore));
        }

        finalEl.textContent = score;
        iconEl.textContent  = '🏆';
        titleEl.textContent = '恭喜通关!';
        titleEl.className   = 'overlay-title';
        titleEl.style.background = 'linear-gradient(135deg, #fbbf24, #f59e0b)';
        titleEl.style.webkitBackgroundClip = 'text';
        titleEl.style.webkitTextFillColor = 'transparent';
        titleEl.style.backgroundClip = 'text';
        overlay.classList.add('active');
        draw();
    }

    // ============ 绘制 ============
    function draw() {
        ctx.clearRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

        // ---- 绘制网格 ----
        ctx.strokeStyle = 'rgba(51, 65, 85, 0.25)';
        ctx.lineWidth = 0.5;
        for (let i = 0; i <= GRID_SIZE; i++) {
            ctx.beginPath();
            ctx.moveTo(i * CELL_SIZE, 0);
            ctx.lineTo(i * CELL_SIZE, CANVAS_SIZE);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(0, i * CELL_SIZE);
            ctx.lineTo(CANVAS_SIZE, i * CELL_SIZE);
            ctx.stroke();
        }

        // ---- 绘制食物 ----
        const fx = food.x * CELL_SIZE + CELL_SIZE / 2;
        const fy = food.y * CELL_SIZE + CELL_SIZE / 2;
        const pulse = Math.sin(Date.now() / 200) * 0.1 + 0.9;

        // 光晕
        const glow = ctx.createRadialGradient(fx, fy, 0, fx, fy, CELL_SIZE * pulse);
        glow.addColorStop(0, 'rgba(239, 68, 68, 0.4)');
        glow.addColorStop(1, 'rgba(239, 68, 68, 0)');
        ctx.fillStyle = glow;
        ctx.fillRect(food.x * CELL_SIZE - CELL_SIZE, food.y * CELL_SIZE - CELL_SIZE, CELL_SIZE * 3, CELL_SIZE * 3);

        // 食物主体
        const radius = (CELL_SIZE / 2 - 2) * pulse;
        ctx.beginPath();
        ctx.arc(fx, fy, radius, 0, Math.PI * 2);
        ctx.fillStyle = '#ef4444';
        ctx.fill();
        ctx.shadowColor = 'rgba(239, 68, 68, 0.5)';
        ctx.shadowBlur = 12;
        ctx.fill();
        ctx.shadowBlur = 0;

        // 高光
        ctx.beginPath();
        ctx.arc(fx - 3, fy - 3, radius * 0.3, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
        ctx.fill();

        // ---- 绘制蛇 ----
        for (let i = 0; i < snake.length; i++) {
            const s = snake[i];
            const sx = s.x * CELL_SIZE;
            const sy = s.y * CELL_SIZE;
            const isHead = (i === 0);
            const padding = isHead ? 1 : 2;

            // 蛇身颜色渐变
            const ratio = i / Math.max(snake.length - 1, 1);
            const green = Math.round(197 - ratio * 60);
            const blue  = Math.round(94 - ratio * 50);
            const color = `rgb(34, ${green}, ${blue})`;

            // 圆角矩形
            const cx = sx + padding;
            const cy = sy + padding;
            const cw = CELL_SIZE - padding * 2;
            const ch = CELL_SIZE - padding * 2;
            const cr = isHead ? 6 : 4;

            ctx.beginPath();
            ctx.moveTo(cx + cr, cy);
            ctx.lineTo(cx + cw - cr, cy);
            ctx.quadraticCurveTo(cx + cw, cy, cx + cw, cy + cr);
            ctx.lineTo(cx + cw, cy + ch - cr);
            ctx.quadraticCurveTo(cx + cw, cy + ch, cx + cw - cr, cy + ch);
            ctx.lineTo(cx + cr, cy + ch);
            ctx.quadraticCurveTo(cx, cy + ch, cx, cy + ch - cr);
            ctx.lineTo(cx, cy + cr);
            ctx.quadraticCurveTo(cx, cy, cx + cr, cy);
            ctx.closePath();

            if (isHead) {
                // 蛇头发光效果
                const grad = ctx.createLinearGradient(sx, sy, sx + CELL_SIZE, sy + CELL_SIZE);
                grad.addColorStop(0, '#22c55e');
                grad.addColorStop(1, '#16a34a');
                ctx.fillStyle = grad;
                ctx.shadowColor = 'rgba(34, 197, 94, 0.4)';
                ctx.shadowBlur = 10;
            } else {
                ctx.fillStyle = color;
                ctx.shadowBlur = 0;
            }
            ctx.fill();
            ctx.shadowBlur = 0;

            // 蛇头眼睛
            if (isHead) {
                const eyeSize = 3;
                let ex1, ey1, ex2, ey2;
                const cx2 = sx + CELL_SIZE / 2;
                const cy2 = sy + CELL_SIZE / 2;
                if (dir === DIR.RIGHT) {
                    ex1 = cx2 + 4; ey1 = cy2 - 5;
                    ex2 = cx2 + 4; ey2 = cy2 + 5;
                } else if (dir === DIR.LEFT) {
                    ex1 = cx2 - 4; ey1 = cy2 - 5;
                    ex2 = cx2 - 4; ey2 = cy2 + 5;
                } else if (dir === DIR.UP) {
                    ex1 = cx2 - 5; ey1 = cy2 - 4;
                    ex2 = cx2 + 5; ey2 = cy2 - 4;
                } else {
                    ex1 = cx2 - 5; ey1 = cy2 + 4;
                    ex2 = cx2 + 5; ey2 = cy2 + 4;
                }
                ctx.fillStyle = '#f0fdf4';
                ctx.beginPath();
                ctx.arc(ex1, ey1, eyeSize, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(ex2, ey2, eyeSize, 0, Math.PI * 2);
                ctx.fill();
                // 瞳孔
                ctx.fillStyle = '#052e16';
                ctx.beginPath();
                ctx.arc(ex1 + (dir.x || dir.y), ey1 + (dir.y || dir.x), 1.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(ex2 + (dir.x || dir.y), ey2 + (dir.y || dir.x), 1.5, 0, Math.PI * 2);
                ctx.fill();
            }
        }
    }

    // 动画帧用于食物脉冲
    let animFrameId = null;
    function startAnimLoop() {
        function loop() {
            if (active && !over) {
                draw();
            }
            animFrameId = requestAnimationFrame(loop);
        }
        loop();
    }

    // ============ 键盘控制 ============
    function handleKeyDown(e) {
        const key = e.key;

        // 空格重启
        if (key === ' ' || key === 'Space') {
            e.preventDefault();
            if (over || !active) {
                initGame();
            }
            return;
        }

        if (!active || over) return;

        let newDir = null;
        switch (key) {
            case 'ArrowUp':    case 'w': case 'W': newDir = DIR.UP;    break;
            case 'ArrowDown':  case 's': case 'S': newDir = DIR.DOWN;  break;
            case 'ArrowLeft':  case 'a': case 'A': newDir = DIR.LEFT;  break;
            case 'ArrowRight': case 'd': case 'D': newDir = DIR.RIGHT; break;
        }

        if (newDir) {
            e.preventDefault();
            // 不允许180度掉头
            if (dir.x + newDir.x === 0 && dir.y + newDir.y === 0) return;
            if (dirLocked) return;
            nextDir = newDir;
            dirLocked = true;
        }
    }

    // ============ 触摸控制 ============
    document.querySelectorAll('.touch-btn').forEach(btn => {
        btn.addEventListener('click', function () {
            const d = this.dataset.dir;
            const keyMap = {
                'up':    'ArrowUp',
                'down':  'ArrowDown',
                'left':  'ArrowLeft',
                'right': 'ArrowRight',
            };
            if (keyMap[d]) {
                handleKeyDown({ key: keyMap[d], preventDefault: () => {} });
            }
        });
    });

    // ============ 启动游戏 ============
    function startGame() {
        bestEl.textContent = bestScore;
        initGame();
        startAnimLoop();
    }

    // ============ 事件绑定 ============
    document.addEventListener('keydown', handleKeyDown);
    restartBtn.addEventListener('click', () => {
        if (over || !active) {
            initGame();
        } else {
            // 游戏中点击重启也重置
            initGame();
        }
    });

    // 窗口失焦时不定格，保持运行

    // ============ 启动！ ============
    startGame();

})();
</script>
</body>
