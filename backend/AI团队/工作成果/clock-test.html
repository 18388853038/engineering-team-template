<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实时时钟</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0a0f;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            overflow: hidden;
        }

        /* 背景动态粒子效果 */
        .bg-effect {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(0, 153, 255, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 50%, rgba(138, 43, 226, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 20%, rgba(0, 255, 200, 0.04) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 60px 80px;
            background: linear-gradient(135deg, rgba(18, 18, 30, 0.9), rgba(10, 10, 20, 0.95));
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow:
                0 30px 80px rgba(0, 0, 0, 0.6),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            min-width: 520px;
        }

        /* 日期显示 */
        .date-display {
            font-size: 22px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 3px;
            margin-bottom: 24px;
            text-transform: uppercase;
            font-variant-numeric: tabular-nums;
        }

        /* 时间显示 */
        .time-display {
            display: flex;
            justify-content: center;
            align-items: baseline;
            gap: 8px;
            user-select: none;
        }

        .time-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .time-number {
            font-size: 130px;
            font-weight: 700;
            line-height: 1;
            color: #ffffff;
            text-shadow:
                0 0 30px rgba(0, 153, 255, 0.3),
                0 0 60px rgba(0, 153, 255, 0.1);
            font-variant-numeric: tabular-nums;
            letter-spacing: 6px;
            transition: color 0.3s ease;
            min-width: 160px;
            text-align: center;
        }

        .time-label {
            font-size: 13px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.25);
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        /* 冒号分隔符 */
        .time-separator {
            font-size: 100px;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.15);
            line-height: 1;
            animation: blink 1s ease-in-out infinite;
            margin: 0 4px;
        }

        @keyframes blink {
            0%, 100% { opacity: 0.15; }
            50% { opacity: 0.05; }
        }

        /* 秒数特殊样式 */
        .seconds-number {
            font-size: 80px;
            color: rgba(255, 255, 255, 0.8);
            text-shadow:
                0 0 20px rgba(0, 200, 255, 0.2),
                0 0 40px rgba(0, 200, 255, 0.05);
            min-width: 100px;
        }

        /* 上午/下午指示 */
        .ampm {
            font-size: 28px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 2px;
            margin-left: 12px;
            align-self: flex-start;
            padding-top: 18px;
        }

        /* 底部装饰线 */
        .divider {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(0, 153, 255, 0.4), transparent);
            margin: 30px auto 20px;
            border-radius: 2px;
        }

        /* 星期几显示 */
        .day-of-week {
            font-size: 16px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.35);
            letter-spacing: 2px;
        }

        /* 底部信息 */
        .footer-info {
            margin-top: 32px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.15);
            letter-spacing: 1px;
        }

        /* 响应式设计 */
        @media (max-width: 640px) {
            .container {
                padding: 40px 30px;
                min-width: unset;
                width: calc(100% - 32px);
                border-radius: 18px;
            }

            .time-number {
                font-size: 64px;
                min-width: 80px;
                letter-spacing: 2px;
            }

            .time-separator {
                font-size: 50px;
                margin: 0 2px;
            }

            .seconds-number {
                font-size: 44px;
                min-width: 56px;
            }

            .date-display {
                font-size: 16px;
                letter-spacing: 2px;
                margin-bottom: 16px;
            }

            .ampm {
                font-size: 18px;
                padding-top: 8px;
            }

            .time-label {
                font-size: 10px;
                letter-spacing: 2px;
            }
        }

        @media (max-width: 400px) {
            .container {
                padding: 28px 16px;
            }

            .time-number {
                font-size: 44px;
                min-width: 56px;
            }

            .time-separator {
                font-size: 36px;
            }

            .seconds-number {
                font-size: 32px;
                min-width: 40px;
            }

            .date-display {
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-effect"></div>
    <div class="container">
        <!-- 日期 -->
        <div class="date-display" id="dateDisplay">----年--月--日</div>

        <!-- 时间 -->
        <div class="time-display">
            <div class="time-block">
                <div class="time-number" id="hours">00</div>
                <div class="time-label">小时</div>
            </div>
            <div class="time-separator">:</div>
            <div class="time-block">
                <div class="time-number" id="minutes">00</div>
                <div class="time-label">分钟</div>
            </div>
            <div class="time-separator">:</div>
            <div class="time-block">
                <div class="time-number seconds-number" id="seconds">00</div>
                <div class="time-label">秒数</div>
            </div>
            <div class="ampm" id="ampm">AM</div>
        </div>

        <div class="divider"></div>

        <div class="day-of-week" id="dayOfWeek">星期一</div>

        <div class="footer-info">
            · 实时时钟 · 自动刷新 ·
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            const DAY_NAMES = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];

            const hoursEl = document.getElementById('hours');
            const minutesEl = document.getElementById('minutes');
            const secondsEl = document.getElementById('seconds');
            const ampmEl = document.getElementById('ampm');
            const dateDisplayEl = document.getElementById('dateDisplay');
            const dayOfWeekEl = document.getElementById('dayOfWeek');

            /**
             * 数字补零
             * @param {number} num
             * @returns {string}
             */
            function padZero(num) {
                return num < 10 ? '0' + num : String(num);
            }

            /**
             * 更新时钟显示
             */
            function updateClock() {
                const now = new Date();

                // ---- 时间 ----
                let hours = now.getHours();
                const minutes = now.getMinutes();
                const seconds = now.getSeconds();

                const ampm = hours >= 12 ? 'PM' : 'AM';

                // 12小时制显示
                const displayHours = hours % 12 || 12;

                hoursEl.textContent = padZero(displayHours);
                minutesEl.textContent = padZero(minutes);
                secondsEl.textContent = padZero(seconds);
                ampmEl.textContent = ampm;

                // ---- 日期 ----
                const year = now.getFullYear();
                const month = padZero(now.getMonth() + 1);
                const day = padZero(now.getDate());

                dateDisplayEl.textContent = year + '年' + month + '月' + day + '日';

                // ---- 星期 ----
                const dayOfWeek = now.getDay();
                dayOfWeekEl.textContent = DAY_NAMES[dayOfWeek];
            }

            // 立即更新一次，避免初始空白
            updateClock();

            // 每秒自动刷新
            setInterval(updateClock, 1000);
        })();
    </script>
</body>
</html>
