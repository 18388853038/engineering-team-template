<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

<body>
<div class="game-container">
  <h1>🐍 贪吃蛇 <span class="status-badge">最终验证版 🏆</span></h1>
  <div class="info-bar">
    <span>🏆 分数: <span class="score" id="score">0</span></span>
    <span>👑 最高分: <span class="high-score" id="highScore">0</span></span>
    <span>📏 长度: <span id="length">3</span></span>
  </div>
  <div class="canvas-wrapper">
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div class="game-over-overlay" id="gameOverOverlay">
      <h2>💀 游戏结束</h2>
      <p>最终得分: <span class="final-score" id="finalScore">0</span></p>
      <button onclick="restartGame()">🔄 重新开始</button>
    </div>
  </div>
  <div class="controls">
    <button onclick="changeDirection('up')">⬆ 上</button>
    <button onclick="changeDirection('left')">⬅ 左</button>
    <button onclick="changeDirection('down')">⬇ 下</button>
    <button onclick="changeDirection('right')">➡ 右</button>
    <button onclick="restartGame()">🔄 重开</button>
  </div>
  <div class="tip">
    <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> 方向键控制 &nbsp;·&nbsp; <kbd>Space</kbd> 重新开始
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const highScoreEl = document.getElementById('highScore');
const lengthEl = document.getElementById('length');
const finalScoreEl = document.getElementById('finalScore');
const gameOverOverlay = document.getElementById('gameOverOverlay');

const GRID_SIZE = 20;
const CELL_SIZE = 20;
const COLS = GRID_SIZE;
const ROWS = GRID_SIZE;

let snake, direction, nextDirection, food, score, highScore, gameLoop, gameRunning;
let isGameOver = false;

// 从 localStorage 读取最高分
highScore = parseInt(localStorage.getItem('snakeHighScore') || '0');
highScoreEl.textContent = highScore;

function initGame() {
  const startX = Math.floor(COLS / 2);
  const startY = Math.floor(ROWS / 2);
  snake = [
    { x: startX, y: startY },
    { x: startX - 1, y: startY },
    { x: startX - 2, y: startY }
  ];
  direction = 'right';
  nextDirection = 'right';
  score = 0;
  isGameOver = false;
  gameRunning = true;
  gameOverOverlay.classList.remove('show');
  scoreEl.textContent = score;
  lengthEl.textContent = snake.length;
  spawnFood();
  draw();
}

function spawnFood() {
  let pos;
  while (true) {
    pos = {
      x: Math.floor(Math.random() * COLS),
      y: Math.floor(Math.random() * ROWS)
    };
    if (!snake.some(s => s.x === pos.x && s.y === pos.y)) break;
  }
  food = pos;
}

function changeDirection(dir) {
  const opposites = { up: 'down', down: 'up', left: 'right', right: 'left' };
  if (dir !== opposites[direction]) {
    nextDirection = dir;
  }
}

function moveSnake() {
  if (!gameRunning || isGameOver) return;

  direction = nextDirection;
  const head = { ...snake[0] };

  switch (direction) {
    case 'up': head.y--; break;
    case 'down': head.y++; break;
    case 'left': head.x--; break;
    case 'right': head.x++; break;
  }

  // 撞墙检测
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
    endGame();
    return;
  }

  // 撞自己检测
  if (snake.some(s => s.x === head.x && s.y === head.y)) {
    endGame();
    return;
  }

  snake.unshift(head);

  // 吃食物
  if (head.x === food.x && head.y === food.y) {
    score += 10;
    scoreEl.textContent = score;
    lengthEl.textContent = snake.length;
    spawnFood();
  } else {
    snake.pop();
  }

  draw();
}

function endGame() {
  gameRunning = false;
  isGameOver = true;
  if (score > highScore) {
    highScore = score;
    highScoreEl.textContent = highScore;
    localStorage.setItem('snakeHighScore', highScore.toString());
  }
  finalScoreEl.textContent = score;
  gameOverOverlay.classList.add('show');
}

function restartGame() {
  if (gameLoop) clearInterval(gameLoop);
  initGame();
  gameLoop = setInterval(moveSnake, 150);
}

function draw() {
  ctx.clearRect(0, 0, 400, 400);

  // 绘制网格
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= COLS; i++) {
    ctx.beginPath();
    ctx.moveTo(i * CELL_SIZE, 0);
    ctx.lineTo(i * CELL_SIZE, 400);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(0, i * CELL_SIZE);
    ctx.lineTo(400, i * CELL_SIZE);
    ctx.stroke();
  }

  // 绘制蛇
  snake.forEach((segment, index) => {
    const x = segment.x * CELL_SIZE;
    const y = segment.y * CELL_SIZE;
    const padding = 1;
    const radius = 3;

    if (index === 0) {
      // 蛇头 - 亮绿色
      ctx.fillStyle = '#00ff88';
      ctx.shadowColor = '#00ff88';
      ctx.shadowBlur = 12;
    } else {
      // 蛇身 - 渐变绿
      const ratio = 1 - (index / snake.length) * 0.5;
      ctx.fillStyle = `rgba(0, ${Math.floor(200 * ratio + 55)}, ${Math.floor(100 * ratio)}, 0.9)`;
      ctx.shadowColor = 'transparent';
      ctx.shadowBlur = 0;
    }

    ctx.beginPath();
    ctx.roundRect(x + padding, y + padding, CELL_SIZE - padding * 2, CELL_SIZE - padding * 2, radius);
    ctx.fill();
  });

  // 蛇头眼睛
  const head = snake[0];
  if (head) {
    const hx = head.x * CELL_SIZE;
    const hy = head.y * CELL_SIZE;
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#ffffff';
    let eye1x, eye1y, eye2x, eye2y;
    const eSize = 3;
    const eOff = 5;
    switch (direction) {
      case 'up':
        eye1x = hx + 5; eye1y = hy + 4;
        eye2x = hx + 13; eye2y = hy + 4;
        break;
      case 'down':
        eye1x = hx + 5; eye1y = hy + 14;
        eye2x = hx + 13; eye2y = hy + 14;
        break;
      case 'left':
        eye1x = hx + 4; eye1y = hy + 5;
        eye2x = hx + 4; eye2y = hy + 13;
        break;
      case 'right':
        eye1x = hx + 14; eye1y = hy + 5;
        eye2x = hx + 14; eye2y = hy + 13;
        break;
    }
    ctx.beginPath();
    ctx.arc(eye1x, eye1y, eSize, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(eye2x, eye2y, eSize, 0, Math.PI * 2);
    ctx.fill();
    // 瞳孔
    ctx.fillStyle = '#0a0a1a';
    ctx.beginPath();
    ctx.arc(eye1x, eye1y, 1.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(eye2x, eye2y, 1.5, 0, Math.PI * 2);
    ctx.fill();
  }

  // 绘制食物
  ctx.shadowColor = '#ff4466';
  ctx.shadowBlur = 15;
  ctx.fillStyle = '#ff4466';
  const fx = food.x * CELL_SIZE + CELL_SIZE / 2;
  const fy = food.y * CELL_SIZE + CELL_SIZE / 2;
  ctx.beginPath();
  ctx.arc(fx, fy, 7, 0, Math.PI * 2);
  ctx.fill();
  // 食物高光
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.beginPath();
  ctx.arc(fx - 2, fy - 2, 2.5, 0, Math.PI * 2);
  ctx.fill();

  ctx.shadowBlur = 0;
}

// roundRect polyfill for canvas
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    if (r > w / 2) r = w / 2;
    if (r > h / 2) r = h / 2;
    this.moveTo(x + r, y);
    this.arcTo(x + w, y, x + w, y + h, r);
    this.arcTo(x + w, y + h, x, y + h, r);
    this.arcTo(x, y + h, x, y, r);
    this.arcTo(x, y, x + w, y, r);
    return this;
  };
}

// 键盘控制
document.addEventListener('keydown', (e) => {
  const keyMap = {
    'ArrowUp': 'up', 'ArrowDown': 'down',
    'ArrowLeft': 'left', 'ArrowRight': 'right',
    'w': 'up', 's': 'down', 'a': 'left', 'd': 'right'
  };
  if (keyMap[e.key]) {
    e.preventDefault();
    changeDirection(keyMap[e.key]);
  }
  if (e.key === ' ' || e.key === 'Space') {
    e.preventDefault();
    if (isGameOver) restartGame();
  }
});

// 触屏滑动控制
let touchStartX = 0, touchStartY = 0;
canvas.addEventListener('touchstart', (e) => {
  const t = e.touches[0];
  touchStartX = t.clientX;
  touchStartY = t.clientY;
  e.preventDefault();
}, { passive: false });

canvas.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

canvas.addEventListener('touchend', (e) => {
  const rect = canvas.getBoundingClientRect();
  const endX = touchStartX;
  const endY = touchStartY;
  const dx = endX - touchStartX;
  const dy = endY - touchStartY;
  const absDx = Math.abs(dx);
  const absDy = Math.abs(dy);
  if (absDx > absDy && absDx > 20) {
    changeDirection(dx > 0 ? 'right' : 'left');
  } else if (absDy > 20) {
    changeDirection(dy > 0 ? 'down' : 'up');
  }
});

// 启动
initGame();
gameLoop = setInterval(moveSnake, 150);
</script>
</body>
