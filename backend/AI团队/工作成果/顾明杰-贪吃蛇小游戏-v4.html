<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐍 贪吃蛇 — 经典小游戏</title>
    <style>
        /* ========== 全局重置 & 深色主题 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0e1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            overflow: hidden;
            user-select: none;
        }

        /* ========== 游戏容器 ========== */
        .game-wrapper {
            background: linear-gradient(145deg, #111827, #0d1321);
            border-radius: 24px;
            padding: 30px 35px 35px 35px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8), 0 0 40px rgba(0, 255, 136, 0.06);
            border: 1px solid rgba(0, 255, 136, 0.08);
        }

        /* ========== 顶部栏 ========== */
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
            padding: 0 4px;
        }

        .game-title {
            color: #8affc0;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 1px;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.15);
        }

        .score-board {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .score-label {
            color: #6b7280;
            font-size: 14px;
            font-weight: 500;
        }

        .score-value {
            color: #ffffff;
            font-size: 28px;
            font-weight: 700;
            background: #1a2332;
            padding: 2px 18px;
            border-radius: 10px;
            min-width: 60px;
            text-align: center;
            box-shadow: inset 0 2px 6px rgba(0, 0, 0, 0.4);
            font-variant-numeric: tabular-nums;
            transition: color 0.2s;
        }

        .score-value.pop {
            color: #ffd43b;
        }

        /* ========== 画布容器 ========== */
        .canvas-container {
            position: relative;
            background: #0f172a;
            border-radius: 16px;
            padding: 8px;
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(0, 255, 136, 0.06);
        }

        #gameCanvas {
            display: block;
            width: 480px;
            height: 480px;
            border-radius: 10px;
            background: #0f172a;
            image-rendering: pixelated;
        }

        /* ========== 覆盖层（游戏结束） ========== */
        .overlay {
            position: absolute;
            top: 8px;
            left: 8px;
            right: 8px;
            bottom: 8px;
            border-radius: 10px;
            background: rgba(10, 14, 26, 0.88);
            backdrop-filter: blur(6px);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 12px;
            z-index: 10;
        }

        .overlay.show {
            display: flex;
        }

        .overlay-title {
            color: #ff4757;
            font-size: 38px;
            font-weight: 800;
            letter-spacing: 2px;
            text-shadow: 0 0 30px rgba(255, 71, 87, 0.3);
        }

        .overlay-score {
            color: #e5e7eb;
            font-size: 20px;
            margin-top: 4px;
        }

        .overlay-score span {
            color: #ffd43b;
            font-weight: 700;
            font-size: 28px;
        }

        .overlay-hint {
            color: #9ca3af;
            font-size: 15px;
            margin-top: 10px;
            padding: 10px 28px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            animation: pulse 1.8s ease-in-out infinite;
        }

        .overlay-hint kbd {
            background: #374151;
            color: #e5e7eb;
            padding: 1px 8px;
            border-radius: 4px;
            font-size: 13px;
            font-family: inherit;
            border: 1px solid #4b5563;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        /* ========== 底部信息 ========== */
        .game-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 16px;
            padding: 0 4px;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #6b7280;
            font-size: 13px;
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
            box-shadow: 0 0 10px rgba(34, 197, 94, 0.4);
            transition: background 0.3s;
        }

        .status-dot.paused {
            background: #f59e0b;
            box-shadow: 0 0 10px rgba(245, 158, 11, 0.4);
        }

        .status-dot.over {
            background: #ef4444;
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.4);
        }

        .status-text {
            transition: color 0.3s;
        }

        .controls-hint {
            color: #4b5563;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .controls-hint kbd {
            background: #1f2937;
            color: #d1d5db;
            padding: 2px 10px;
            border-radius: 5px;
            font-size: 12px;
            border: 1px solid #374151;
            box-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }

        /* ========== 移动端触控支持 ========== */
        .touch-controls {
            display: none;
            margin-top: 16px;
            justify-content: center;
            gap: 6px;
        }

        .touch-grid {
            display: grid;
            grid-template-columns: 70px 70px 70px;
            grid-template-rows: 70px 70px 70px;
            gap: 4px;
        }

        .touch-btn {
            background: #1f2937;
            border: 1px solid #374151;
            border-radius: 12px;
            color: #d1d5db;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
            -webkit-tap-highlight-color: transparent;
        }

        .touch-btn:active {
            background: #374151;
            transform: scale(0.92);
        }

        .touch-btn.empty {
            background: transparent;
            border: none;
            cursor: default;
        }

        @media (pointer: coarse) {
            .touch-controls {
                display: flex;
            }
        }

        @media (max-width: 540px) {
            .game-wrapper {
                padding: 16px;
                border-radius: 16px;
            }
            #gameCanvas {
                width: 320px;
                height: 320px;
            }
            .game-title { font-size: 18px; }
            .score-value { font-size: 22px; min-width: 50px; padding: 2px 12px; }
            .overlay-title { font-size: 28px; }
        }
    </style>
</head>
<body>

    <!-- ==================== 游戏主体 ==================== -->
    <div class="game-wrapper">
        <!-- 顶部：标题 + 计分 -->
        <div class="game-header">
            <div class="game-title">🐍 贪吃蛇</div>
            <div class="score-board">
                <span class="score-label">🏆 分数</span>
                <span class="score-value" id="scoreDisplay">0</span>
            </div>
        </div>

        <!-- 画布区域 -->
        <div class="canvas-container">
            <canvas id="gameCanvas" width="480" height="480"></canvas>
            <!-- 游戏结束覆盖层 -->
            <div class="overlay" id="gameOverlay">
                <div class="overlay-title">💀 游戏结束</div>
                <div class="overlay-score">最终得分：<span id="finalScore">0</span></div>
                <div class="overlay-hint">按 <kbd>空格</kbd> 重新开始</div>
            </div>
        </div>

        <!-- 底部：状态 + 操作提示 -->
        <div class="game-footer">
            <div class="status-indicator">
                <span class="status-dot" id="statusDot"></span>
                <span class="status-text" id="statusText">就绪</span>
            </div>
            <div class="controls-hint">
                <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> 移动
                <span style="margin:0 6px;color:#374151;">|</span>
                <kbd>空格</kbd> 开始 / 暂停
            </div>
        </div>

        <!-- 移动端触控按钮 -->
        <div class="touch-controls">
            <div class="touch-grid">
                <div class="touch-btn empty"></div>
                <div class="touch-btn" data-dir="UP">▲</div>
                <div class="touch-btn empty"></div>
                <div class="touch-btn" data-dir="LEFT">◀</div>
                <div class="touch-btn empty"></div>
                <div class="touch-btn" data-dir="RIGHT">▶</div>
                <div class="touch-btn empty"></div>
                <div class="touch-btn" data-dir="DOWN">▼</div>
                <div class="touch-btn empty"></div>
            </div>
        </div>
    </div>

    <!-- ==================== JavaScript 游戏逻辑 ==================== -->
    <script>
        (function() {
            'use strict';

            /* ---------- 常量配置 ---------- */
            const BOARD_SIZE = 20;            // 20×20 网格
            const CELL_SIZE = 24;             // 每个格子像素
            const TICK_INTERVAL = 150;        // 移动间隔（毫秒）

            /* ---------- DOM 元素 ---------- */
            const canvas  = document.getElementById('gameCanvas');
            const ctx     = canvas.getContext('2d');
            const scoreEl = document.getElementById('scoreDisplay');
            const finalScoreEl = document.getElementById('finalScore');
            const overlayEl = document.getElementById('gameOverlay');
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');

            /* ---------- 游戏状态 ---------- */
            let snake  = [];            // 蛇身坐标 [{x, y}, ...]
            let food   = { x: 8, y: 10 };
            let direction = 'RIGHT';    // 当前实际方向
            let nextDirection = 'RIGHT';// 缓冲方向
            let score  = 0;
            let gameState = 'IDLE';     // IDLE | PLAYING | PAUSED | GAME_OVER
            let animFrameId = null;
            let lastTick = 0;

            /* ---------- 辅助：方向取反 ---------- */
            const OPPOSITES = {
                'UP': 'DOWN', 'DOWN': 'UP', 'LEFT': 'RIGHT', 'RIGHT': 'LEFT'
            };

            /* ---------- 更新 UI 状态 ---------- */
            function updateStatus(state) {
                const map = {
                    'IDLE':      { dot: '',        text: '就绪',       cls: '' },
                    'PLAYING':   { dot: 'playing', text: '游戏中',     cls: '' },
                    'PAUSED':    { dot: 'paused',  text: '已暂停',     cls: 'paused' },
                    'GAME_OVER': { dot: 'over',    text: '游戏结束',   cls: 'over' }
                };
                const info = map[state] || map['IDLE'];
                statusDot.className = 'status-dot' + (info.cls ? ' ' + info.cls : '');
                statusText.textContent = info.text;
            }

            /* ---------- 分数动画 ---------- */
            function animateScore() {
                scoreEl.classList.add('pop');
                setTimeout(() => scoreEl.classList.remove('pop'), 200);
            }

            /* ---------- 更新分数显示 ---------- */
            function updateScoreUI() {
                scoreEl.textContent = score;
            }

            /* ---------- 生成食物（避开蛇身） ---------- */
            function spawnFood() {
                const snakeSet = new Set(snake.map(s => `${s.x},${s.y}`));
                const free = [];
                for (let x = 0; x < BOARD_SIZE; x++) {
                    for (let y = 0; y < BOARD_SIZE; y++) {
                        if (!snakeSet.has(`${x},${y}`)) {
                            free.push({ x, y });
                        }
                    }
                }
                if (free.length === 0) return; // 蛇占满棋盘（极端情况）
                food = free[Math.floor(Math.random() * free.length)];
            }

            /* ---------- 绘制游戏 ---------- */
            function draw() {
                const w = canvas.width;
                const h = canvas.height;

                // 清空背景
                ctx.fillStyle = '#0f172a';
                ctx.fillRect(0, 0, w, h);

                // 绘制网格线（极淡）
                ctx.strokeStyle = 'rgba(255,255,255,0.03)';
                ctx.lineWidth = 0.5;
                for (let i = 0; i <= BOARD_SIZE; i++) {
                    ctx.beginPath();
                    ctx.moveTo(i * CELL_SIZE, 0);
                    ctx.lineTo(i * CELL_SIZE, h);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(0, i * CELL_SIZE);
                    ctx.lineTo(w, i * CELL_SIZE);
                    ctx.stroke();
                }

                // 绘制食物（带发光效果）
                const fx = food.x * CELL_SIZE + CELL_SIZE / 2;
                const fy = food.y * CELL_SIZE + CELL_SIZE / 2;
                const glow = ctx.createRadialGradient(fx, fy, 2, fx, fy, 14);
                glow.addColorStop(0, 'rgba(255, 71, 87, 0.4)');
                glow.addColorStop(1, 'rgba(255, 71, 87, 0)');
                ctx.fillStyle = glow;
                ctx.fillRect(food.x * CELL_SIZE - 12, food.y * CELL_SIZE - 12, CELL_SIZE + 24, CELL_SIZE + 24);

                // 食物圆点
                ctx.shadowColor = '#ff4757';
                ctx.shadowBlur = 12;
                ctx.fillStyle = '#ff4757';
                ctx.beginPath();
                ctx.arc(fx, fy, CELL_SIZE / 2 - 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;

                // 绘制食物高光
                ctx.fillStyle = 'rgba(255,255,255,0.25)';
                ctx.beginPath();
                ctx.arc(fx - 3, fy - 3, 4, 0, Math.PI * 2);
                ctx.fill();

                // 绘制蛇身
                for (let i = 0; i < snake.length; i++) {
                    const seg = snake[i];
                    const px = seg.x * CELL_SIZE;
                    const py = seg.y * CELL_SIZE;
                    const padding = i === 0 ? 2 : 3;
                    const radius = 4;

                    // 蛇身颜色渐变：头部亮绿，尾部渐暗
                    const ratio = i / Math.max(snake.length - 1, 1);
                    const r = Math.round(34 + (74 - 34) * (1 - ratio));
                    const g = Math.round(197 + (170 - 197) * (1 - ratio));
                    const b = Math.round(94 + (80 - 94) * (1 - ratio));
                    const color = `rgb(${r},${g},${b})`;

                    ctx.shadowColor = i === 0 ? 'rgba(34, 197, 94, 0.4)' : 'transparent';
                    ctx.shadowBlur = i === 0 ? 10 : 0;

                    // 圆角矩形绘制
                    ctx.fillStyle = color;
                    ctx.beginPath();
                    ctx.moveTo(px + padding + radius, py + padding);
                    ctx.lineTo(px + CELL_SIZE - padding - radius, py + padding);
                    ctx.quadraticCurveTo(px + CELL_SIZE - padding, py + padding, px + CELL_SIZE - padding, py + padding + radius);
                    ctx.lineTo(px + CELL_SIZE - padding, py + CELL_SIZE - padding - radius);
                    ctx.quadraticCurveTo(px + CELL_SIZE - padding, py + CELL_SIZE - padding, px + CELL_SIZE - padding - radius, py + CELL_SIZE - padding);
                    ctx.lineTo(px + padding + radius, py + CELL_SIZE - padding);
                    ctx.quadraticCurveTo(px + padding, py + CELL_SIZE - padding, px + padding, py + CELL_SIZE - padding - radius);
                    ctx.lineTo(px + padding, py + padding + radius);
                    ctx.quadraticCurveTo(px + padding, py + padding, px + padding + radius, py + padding);
                    ctx.closePath();
                    ctx.fill();

                    // 蛇头眼睛
                    if (i === 0) {
                        ctx.shadowBlur = 0;
                        ctx.fillStyle = 'white';
                        let eyeX1, eyeY1, eyeX2, eyeY2;
                        const eyeOffset = 5;
                        const eyeSize = 3;
                        const cx = px + CELL_SIZE / 2;
                        const cy = py + CELL_SIZE / 2;
                        switch (direction) {
                            case 'UP':
                                eyeX1 = cx - eyeOffset; eyeY1 = cy - eyeOffset;
                                eyeX2 = cx + eyeOffset; eyeY2 = cy - eyeOffset;
                                break;
                            case 'DOWN':
                                eyeX1 = cx - eyeOffset; eyeY1 = cy + eyeOffset;
                                eyeX2 = cx + eyeOffset; eyeY2 = cy + eyeOffset;
                                break;
                            case 'LEFT':
                                eyeX1 = cx - eyeOffset; eyeY1 = cy - eyeOffset;
                                eyeX2 = cx - eyeOffset; eyeY2 = cy + eyeOffset;
                                break;
                            case 'RIGHT':
                                eyeX1 = cx + eyeOffset; eyeY1 = cy - eyeOffset;
                                eyeX2 = cx + eyeOffset; eyeY2 = cy + eyeOffset;
                                break;
                        }
                        ctx.beginPath();
                        ctx.arc(eyeX1, eyeY1, eyeSize, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(eyeX2, eyeY2, eyeSize, 0, Math.PI * 2);
                        ctx.fill();

                        // 瞳孔
                        ctx.fillStyle = '#0f172a';
                        ctx.beginPath();
                        ctx.arc(eyeX1, eyeY1, 1.5, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(eyeX2, eyeY2, 1.5, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
                ctx.shadowBlur = 0;
            }

            /* ---------- 蛇移动核心逻辑 ---------- */
            function tick() {
                if (gameState !== 'PLAYING') return;

                // 1) 方向更新（不允许反向）
                if (nextDirection && OPPOSITES[nextDirection] !== direction) {
                    direction = nextDirection;
                }

                // 2) 计算新头部
                const head = snake[0];
                let newHead = { x: head.x, y: head.y };
                switch (direction) {
                    case 'UP':    newHead.y -= 1; break;
                    case 'DOWN':  newHead.y += 1; break;
                    case 'LEFT':  newHead.x -= 1; break;
                    case 'RIGHT': newHead.x += 1; break;
                }

                // 3) 碰撞检测 — 撞墙
                if (newHead.x < 0 || newHead.x >= BOARD_SIZE ||
                    newHead.y < 0 || newHead.y >= BOARD_SIZE) {
                    gameOver();
                    return;
                }

                // 4) 碰撞检测 — 撞自己（新头部不能与蛇身重叠，除了尾部会在下一步移除）
                const willEat = (newHead.x === food.x && newHead.y === food.y);
                // 如果不吃东西，蛇尾会移除；吃东西时蛇尾不移除
                let bodyToCheck = snake;
                if (!willEat) {
                    bodyToCheck = snake.slice(0, -1); // 去掉尾部后再检查
                }
                for (let i = 0; i < bodyToCheck.length; i++) {
                    if (newHead.x === bodyToCheck[i].x && newHead.y === bodyToCheck[i].y) {
                        gameOver();
                        return;
                    }
                }

                // 5) 移动：插入新头部
                snake.unshift(newHead);

                // 6) 检查是否吃到食物
                if (willEat) {
                    score++;
                    updateScoreUI();
                    animateScore();
                    spawnFood();
                    // 蛇尾不删，蛇变长
                } else {
                    snake.pop(); // 移除尾部
                }

                // 7) 重绘
                draw();
            }

            /* ---------- 游戏主循环（requestAnimationFrame） ---------- */
            function gameLoop(timestamp) {
                if (gameState === 'GAME_OVER') return;

                if (timestamp - lastTick >= TICK_INTERVAL) {
                    lastTick = timestamp;
                    tick();
                }

                animFrameId = requestAnimationFrame(gameLoop);
            }

            /* ---------- 开始游戏 ---------- */
            function startGame() {
                if (gameState === 'GAME_OVER') {
                    resetGame();
                    return;
                }
                if (gameState === 'PLAYING') return;
                gameState = 'PLAYING';
                overlayEl.classList.remove('show');
                updateStatus('PLAYING');
                lastTick = performance.now();
                if (animFrameId) cancelAnimationFrame(animFrameId);
                animFrameId = requestAnimationFrame(gameLoop);
            }

            /* ---------- 暂停游戏 ---------- */
            function pauseGame() {
                if (gameState !== 'PLAYING') return;
                gameState = 'PAUSED';
                updateStatus('PAUSED');
                if (animFrameId) {
                    cancelAnimationFrame(animFrameId);
                    animFrameId = null;
                }
            }

            /* ---------- 切换暂停 ---------- */
            function togglePause() {
                if (gameState === 'IDLE') {
                    startGame();
                } else if (gameState === 'PLAYING') {
                    pauseGame();
                } else if (gameState === 'PAUSED') {
                    startGame();
                } else if (gameState === 'GAME_OVER') {
                    resetGame();
                }
            }

            /* ---------- 游戏结束 ---------- */
            function gameOver() {
                gameState = 'GAME_OVER';
                if (animFrameId) {
                    cancelAnimationFrame(animFrameId);
                    animFrameId = null;
                }
                finalScoreEl.textContent = score;
                overlayEl.classList.add('show');
                updateStatus('GAME_OVER');
                draw();
            }

            /* ---------- 重置游戏 ---------- */
            function resetGame() {
                // 停止循环
                if (animFrameId) {
                    cancelAnimationFrame(animFrameId);
                    animFrameId = null;
                }

                // 重置蛇
                snake = [
                    { x: 9, y: 10 },
                    { x: 8, y: 10 },
                    { x: 7, y: 10 }
                ];
                direction = 'RIGHT';
                nextDirection = 'RIGHT';
                score = 0;
                updateScoreUI();
                overlayEl.classList.remove('show');
                spawnFood();
                gameState = 'IDLE';
                updateStatus('IDLE');
                draw();
            }

            /* ---------- 键盘事件处理 ---------- */
            function handleKeyDown(e) {
                const key = e.key;

                // 方向键：仅在 IDLE / PLAYING / PAUSED 时有效
                if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(key)) {
                    e.preventDefault();
                    const map = {
                        'ArrowUp': 'UP',
                        'ArrowDown': 'DOWN',
                        'ArrowLeft': 'LEFT',
                        'ArrowRight': 'RIGHT'
                    };
                    const newDir = map[key];
                    if (gameState === 'IDLE' || gameState === 'PLAYING' || gameState === 'PAUSED') {
                        nextDirection = newDir;
                        // 如果在 IDLE 状态，按方向键自动开始游戏
                        if (gameState === 'IDLE') {
                            startGame();
                        } else if (gameState === 'PAUSED') {
                            startGame();
                        }
                    }
                    return;
                }

                // 空格键：开始 / 暂停 / 重启
                if (key === ' ' || key === 'Spacebar') {
                    e.preventDefault();
                    togglePause();
                    return;
                }

                // R键：快速重启
                if (key === 'r' || key === 'R') {
                    e.preventDefault();
                    resetGame();
                    return;
                }
            }

            /* ---------- 触控方向按钮 ---------- */
            function setupTouchControls() {
                const btns = document.querySelectorAll('.touch-btn[data-dir]');
                btns.forEach(btn => {
                    const handler = (e) => {
                        e.preventDefault();
                        const dir = btn.dataset.dir;
                        nextDirection = dir;
                        if (gameState === 'IDLE') {
                            startGame();
                        } else if (gameState === 'PAUSED') {
                            startGame();
                        }
                    };
                    btn.addEventListener('touchstart', handler, { passive: false });
                    btn.addEventListener('mousedown', handler);
                });
            }

            /* ---------- 初始化 ---------- */
            function init() {
                resetGame();
                document.addEventListener('keydown', handleKeyDown);
                setupTouchControls();
            }

            // 启动
            init();
        })();
    </script>
