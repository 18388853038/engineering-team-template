<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐍 贪吃蛇小游戏 | 彭子豪</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 50%, #0a0a1a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            overflow: hidden;
        }

        .game-wrapper {
            background: rgba(20, 20, 40, 0.9);
            border: 2px solid rgba(0, 255, 136, 0.3);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 0 60px rgba(0, 255, 136, 0.1), inset 0 0 30px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 0 5px;
        }

        .game-title {
            font-size: 24px;
            font-weight: 700;
            color: #00ff88;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
            letter-spacing: 2px;
        }

        .score-board {
            display: flex;
            gap: 30px;
            background: rgba(0, 0, 0, 0.4);
            padding: 8px 20px;
            border-radius: 12px;
            border: 1px solid rgba(0, 255, 136, 0.2);
        }

        .score-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .score-label {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
        }

        .score-value {
            color: #00ff88;
            font-size: 22px;
            font-weight: 700;
            min-width: 30px;
            text-align: center;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 12px;
            background: #0d0d1f;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8), inset 0 0 50px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 255, 136, 0.15);
        }

        .game-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 18px;
            padding: 0 5px;
        }

        .controls-hint {
            color: rgba(255, 255, 255, 0.4);
            font-size: 13px;
            letter-spacing: 1px;
        }

        .controls-hint kbd {
            background: rgba(0, 255, 136, 0.15);
            color: #00ff88;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            border: 1px solid rgba(0, 255, 136, 0.2);
            margin: 0 2px;
        }

        .btn-restart {
            background: linear-gradient(135deg, #00cc6a, #009955);
            border: none;
            color: white;
            padding: 10px 28px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(0, 255, 136, 0.2);
        }

        .btn-restart:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(0, 255, 136, 0.4);
            background: linear-gradient(135deg, #00e67a, #00aa55);
        }

        .btn-restart:active {
            transform: translateY(0);
        }

        /* 游戏结束遮罩层 */
        .game-over-overlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.75);
            border-radius: 12px;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 12px;
            backdrop-filter: blur(4px);
        }

        .game-over-overlay.show {
            display: flex;
        }

        .game-over-title {
            font-size: 42px;
            font-weight: 800;
            color: #ff4444;
            text-shadow: 0 0 30px rgba(255, 68, 68, 0.5);
            letter-spacing: 4px;
        }

        .game-over-score {
            font-size: 20px;
            color: #fff;
            opacity: 0.8;
        }

        .game-over-score span {
            color: #ffcc00;
            font-size: 28px;
            font-weight: 700;
        }

        .game-over-hint {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 8px;
        }

        .canvas-container {
            position: relative;
        }

        /* 暂停状态 */
        .pause-indicator {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 4px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        .pause-indicator.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <div class="game-header">
            <div class="game-title">🐍 贪吃蛇</div>
            <div class="score-board">
                <div class="score-item">
                    <span class="score-label">🍎</span>
                    <span class="score-value" id="score">0</span>
                </div>
                <div class="score-item">
                    <span class="score-label">🏆</span>
                    <span class="score-value" id="highScore">0</span>
                </div>
            </div>
        </div>

        <div class="canvas-container">
            <canvas id="gameCanvas"></canvas>
            <div class="game-over-overlay" id="gameOverlay">
                <div class="game-over-title">GAME OVER</div>
                <div class="game-over-score">得分: <span id="finalScore">0</span></div>
                <div class="game-over-hint">按「重新开始」或 空格键 再来一局</div>
            </div>
            <div class="pause-indicator" id="pauseIndicator">⏸ 暂停中</div>
        </div>

        <div class="game-footer">
            <div class="controls-hint">
                <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> 移动 · <kbd>Space</kbd> 暂停
            </div>
            <button class="btn-restart" id="restartBtn">🔄 重新开始</button>
        </div>
    </div>

    <script>
        (function() {
            // ===================== 配置 =====================
            const GRID_SIZE = 20;       // 网格大小
            const COLS = 25;            // 列数
            const ROWS = 20;            // 行数
            const CANVAS_WIDTH = COLS * GRID_SIZE;
            const CANVAS_HEIGHT = ROWS * GRID_SIZE;
            const INITIAL_SPEED = 150;  // 初始速度(ms)
            const SPEED_INCREASE = 3;   // 每次吃食物加速(ms)
            const MIN_SPEED = 60;       // 最快速度

            // ===================== DOM =====================
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = CANVAS_WIDTH;
            canvas.height = CANVAS_HEIGHT;

            const scoreEl = document.getElementById('score');
            const highScoreEl = document.getElementById('highScore');
            const finalScoreEl = document.getElementById('finalScore');
            const gameOverlay = document.getElementById('gameOverlay');
            const pauseIndicator = document.getElementById('pauseIndicator');
            const restartBtn = document.getElementById('restartBtn');

            // ===================== 游戏状态 =====================
            let snake = [];
            let food = {};
            let direction = 'RIGHT';
            let nextDirection = 'RIGHT';
            let score = 0;
            let highScore = parseInt(localStorage.getItem('snakeHighScore')) || 0;
            let gameRunning = false;
            let gamePaused = false;
            let gameLoop = null;
            let currentSpeed = INITIAL_SPEED;

            // ===================== 初始化 =====================
            highScoreEl.textContent = highScore;

            // ===================== 核心逻辑 =====================
            function initGame() {
                // 蛇：初始长度为3，从中间开始
                const startX = Math.floor(COLS / 2);
                const startY = Math.floor(ROWS / 2);
                snake = [
                    { x: startX, y: startY },
                    { x: startX - 1, y: startY },
                    { x: startX - 2, y: startY }
                ];
                direction = 'RIGHT';
                nextDirection = 'RIGHT';
                score = 0;
                currentSpeed = INITIAL_SPEED;
                scoreEl.textContent = '0';
                gameOverlay.classList.remove('show');
                pauseIndicator.classList.remove('show');
                gamePaused = false;
                spawnFood();
                draw();
            }

            function spawnFood() {
                let pos;
                let attempts = 0;
                const maxAttempts = 1000;
                do {
                    pos = {
                        x: Math.floor(Math.random() * COLS),
                        y: Math.floor(Math.random() * ROWS)
                    };
                    attempts++;
                } while (
                    snake.some(seg => seg.x === pos.x && seg.y === pos.y) &&
                    attempts < maxAttempts
                );
                food = pos;
            }

            function moveSnake() {
                // 应用方向
                direction = nextDirection;

                // 计算新蛇头位置
                const head = snake[0];
                let newHead = { ...head };
                switch (direction) {
                    case 'UP':    newHead.y--; break;
                    case 'DOWN':  newHead.y++; break;
                    case 'LEFT':  newHead.x--; break;
                    case 'RIGHT': newHead.x++; break;
                }

                // 检查是否吃到食物
                const ateFood = (newHead.x === food.x && newHead.y === food.y);

                // 构建新蛇
                let newSnake = [newHead, ...snake];

                if (!ateFood) {
                    newSnake.pop(); // 没吃到就去尾
                }

                // 碰撞检测
                const headCollision = (
                    newHead.x < 0 || newHead.x >= COLS ||
                    newHead.y < 0 || newHead.y >= ROWS ||
                    newSnake.slice(1).some(seg => seg.x === newHead.x && seg.y === newHead.y)
                );

                if (headCollision) {
                    gameOver();
                    return;
                }

                snake = newSnake;

                if (ateFood) {
                    score++;
                    scoreEl.textContent = score;
                    // 加速
                    currentSpeed = Math.max(MIN_SPEED, currentSpeed - SPEED_INCREASE);
                    spawnFood();
                    // 调整循环速度
                    resetGameLoop();
                }

                draw();
            }

            function gameOver() {
                gameRunning = false;
                if (gameLoop) {
                    clearTimeout(gameLoop);
                    gameLoop = null;
                }

                // 更新最高分
                if (score > highScore) {
                    highScore = score;
                    highScoreEl.textContent = highScore;
                    localStorage.setItem('snakeHighScore', highScore);
                }

                finalScoreEl.textContent = score;
                gameOverlay.classList.add('show');
            }

            function resetGameLoop() {
                if (gameLoop) {
                    clearTimeout(gameLoop);
                    gameLoop = null;
                }
                if (gameRunning && !gamePaused) {
                    gameLoop = setTimeout(gameTick, currentSpeed);
                }
            }

            function gameTick() {
                if (!gameRunning || gamePaused) return;
                moveSnake();
                if (gameRunning) {
                    gameLoop = setTimeout(gameTick, currentSpeed);
                }
            }

            function startGame() {
                initGame();
                gameRunning = true;
                if (gameLoop) clearTimeout(gameLoop);
                gameLoop = setTimeout(gameTick, currentSpeed);
            }

            function togglePause() {
                if (!gameRunning) return;
                gamePaused = !gamePaused;
                if (gamePaused) {
                    pauseIndicator.classList.add('show');
                    if (gameLoop) {
                        clearTimeout(gameLoop);
                        gameLoop = null;
                    }
                } else {
                    pauseIndicator.classList.remove('show');
                    if (gameRunning) {
                        gameLoop = setTimeout(gameTick, currentSpeed);
                    }
                }
            }

            // ===================== 绘制 =====================
            function draw() {
                ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

                // 绘制网格（暗线）
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
                ctx.lineWidth = 1;
                for (let i = 0; i <= COLS; i++) {
                    ctx.beginPath();
                    ctx.moveTo(i * GRID_SIZE, 0);
                    ctx.lineTo(i * GRID_SIZE, CANVAS_HEIGHT);
                    ctx.stroke();
                }
                for (let i = 0; i <= ROWS; i++) {
                    ctx.beginPath();
                    ctx.moveTo(0, i * GRID_SIZE);
                    ctx.lineTo(CANVAS_WIDTH, i * GRID_SIZE);
                    ctx.stroke();
                }

                // 绘制食物
                const fx = food.x * GRID_SIZE;
                const fy = food.y * GRID_SIZE;
                const pad = 2;

                // 发光光晕
                const glow = ctx.createRadialGradient(
                    fx + GRID_SIZE/2, fy + GRID_SIZE/2, 2,
                    fx + GRID_SIZE/2, fy + GRID_SIZE/2, GRID_SIZE * 1.2
                );
                glow.addColorStop(0, 'rgba(255, 50, 50, 0.4)');
                glow.addColorStop(1, 'rgba(255, 50, 50, 0)');
                ctx.fillStyle = glow;
                ctx.fillRect(fx - GRID_SIZE*0.5, fy - GRID_SIZE*0.5, GRID_SIZE*2, GRID_SIZE*2);

                // 食物主体
                ctx.shadowColor = '#ff3333';
                ctx.shadowBlur = 12;
                ctx.fillStyle = '#ff4444';
                ctx.beginPath();
                ctx.arc(fx + GRID_SIZE/2, fy + GRID_SIZE/2, GRID_SIZE/2 - pad, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;

                // 高光
                ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.beginPath();
                ctx.arc(fx + GRID_SIZE/2 - 3, fy + GRID_SIZE/2 - 3, 3, 0, Math.PI * 2);
                ctx.fill();

                // 绘制蛇
                snake.forEach((seg, index) => {
                    const sx = seg.x * GRID_SIZE;
                    const sy = seg.y * GRID_SIZE;
                    const isHead = index === 0;

                    if (isHead) {
                        // 蛇头 - 发光效果
                        ctx.shadowColor = '#00ff88';
                        ctx.shadowBlur = 15;
                        ctx.fillStyle = '#00ff88';
                        roundRect(ctx, sx + 1, sy + 1, GRID_SIZE - 2, GRID_SIZE - 2, 5);
                        ctx.fill();
                        ctx.shadowBlur = 0;

                        // 蛇头眼睛
                        ctx.fillStyle = '#0a0a1a';
                        let eyeX1, eyeY1, eyeX2, eyeY2;
                        const eyeSize = 3;
                        const offset = 5;
                        switch (direction) {
                            case 'RIGHT':
                                eyeX1 = sx + GRID_SIZE - offset; eyeY1 = sy + offset;
                                eyeX2 = sx + GRID_SIZE - offset; eyeY2 = sy + GRID_SIZE - offset;
                                break;
                            case 'LEFT':
                                eyeX1 = sx + offset; eyeY1 = sy + offset;
                                eyeX2 = sx + offset; eyeY2 = sy + GRID_SIZE - offset;
                                break;
                            case 'UP':
                                eyeX1 = sx + offset; eyeY1 = sy + offset;
                                eyeX2 = sx + GRID_SIZE - offset; eyeY2 = sy + offset;
                                break;
                            case 'DOWN':
                                eyeX1 = sx + offset; eyeY1 = sy + GRID_SIZE - offset;
                                eyeX2 = sx + GRID_SIZE - offset; eyeY2 = sy + GRID_SIZE - offset;
                                break;
                        }
                        ctx.beginPath();
                        ctx.arc(eyeX1, eyeY1, eyeSize, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(eyeX2, eyeY2, eyeSize, 0, Math.PI * 2);
                        ctx.fill();

                        // 眼睛高光
                        ctx.fillStyle = '#fff';
                        ctx.beginPath();
                        ctx.arc(eyeX1 - 1, eyeY1 - 1, 1.2, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(eyeX2 - 1, eyeY2 - 1, 1.2, 0, Math.PI * 2);
                        ctx.fill();
                    } else {
                        // 蛇身 - 渐变颜色（从亮绿到深绿）
                        const ratio = 1 - (index / snake.length) * 0.5;
                        const g = Math.floor(200 * ratio + 55 * (1 - ratio));
                        const r = Math.floor(0 * ratio);
                        const b = Math.floor(80 * (1 - ratio));
                        ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;
                        ctx.shadowColor = 'rgba(0, 255, 136, 0.1)';
                        ctx.shadowBlur = 4;
                        roundRect(ctx, sx + 1.5, sy + 1.5, GRID_SIZE - 3, GRID_SIZE - 3, 3);
                        ctx.fill();
                        ctx.shadowBlur = 0;
                    }
                });
            }

            // 辅助：绘制圆角矩形
            function roundRect(ctx, x, y, w, h, r) {
                ctx.beginPath();
                ctx.moveTo(x + r, y);
                ctx.lineTo(x + w - r, y);
                ctx.quadraticCurveTo(x + w, y, x + w, y + r);
                ctx.lineTo(x + w, y + h - r);
                ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
                ctx.lineTo(x + r, y + h);
                ctx.quadraticCurveTo(x, y + h, x, y + h - r);
                ctx.lineTo(x, y + r);
                ctx.quadraticCurveTo(x, y, x + r, y);
                ctx.closePath();
            }

            // ===================== 键盘控制 =====================
            document.addEventListener('keydown', (e) => {
                const key = e.key;

                // 阻止箭头键滚动和空格翻页
                if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(key)) {
                    e.preventDefault();
                }

                // 方向控制
                if (key === 'ArrowUp' && direction !== 'DOWN') {
                    nextDirection = 'UP';
                } else if (key === 'ArrowDown' && direction !== 'UP') {
                    nextDirection = 'DOWN';
                } else if (key === 'ArrowLeft' && direction !== 'RIGHT') {
                    nextDirection = 'LEFT';
                } else if (key === 'ArrowRight' && direction !== 'LEFT') {
                    nextDirection = 'RIGHT';
                }

                // 空格暂停/继续
                if (key === ' ') {
                    togglePause();
                }

                // 游戏结束后空格重新开始
                if (key === ' ' && !gameRunning && gameOverlay.classList.contains('show')) {
                    startGame();
                }
            });

            // ===================== 按钮事件 =====================
            restartBtn.addEventListener('click', startGame);

            // 触屏滑动支持
            let touchStartX = 0;
            let touchStartY = 0;
            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const touch = e.touches[0];
                touchStartX = touch.clientX;
                touchStartY = touch.clientY;
            }, { passive: false });

            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
            }, { passive: false });

            canvas.addEventListener('touchend', (e) => {
                e.preventDefault();
                if (!touchStartX || !touchStartY) return;
                const rect = canvas.getBoundingClientRect();
                const touch = e.changedTouches[0];
                const dx = touch.clientX - touchStartX;
                const dy = touch.clientY - touchStartY;
                const absDx = Math.abs(dx);
                const absDy = Math.abs(dy);

                if (Math.max(absDx, absDy) < 20) return; // 太短忽略

                if (absDx > absDy) {
                    if (dx > 0 && direction !== 'LEFT') nextDirection = 'RIGHT';
                    else if (dx < 0 && direction !== 'RIGHT') nextDirection = 'LEFT';
                } else {
                    if (dy > 0 && direction !== 'UP') nextDirection = 'DOWN';
                    else if (dy < 0 && direction !== 'DOWN') nextDirection = 'UP';
                }
            }, { passive: false });

            // ===================== 启动游戏 =====================
            // 先画初始画面
            initGame();
            // 显示提示-按空格或点重新开始
            // 直接开始游戏
            setTimeout(() => {
                startGame();
            }, 300);
        })();
    </script>
</body>
</html>
