<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🐍 贪吃蛇 - 刘思远</title>
    <style>
        /* ==================== 全局重置 & 深色主题 ==================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0f0f1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', 'PingFang SC', Roboto, system-ui, sans-serif;
            user-select: none;
        }

        /* ==================== 游戏容器 ==================== */
        .game-wrapper {
            background: linear-gradient(145deg, #1a1a2e, #16213e);
            border-radius: 28px;
            padding: 32px 40px 40px 40px;
            box-shadow:
                0 25px 50px -12px rgba(0, 0, 0, 0.8),
                inset 0 1px 0 rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        /* ==================== 顶部信息栏 ==================== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 0 4px;
        }

        .game-title {
            color: #e2e8f0;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .game-title span {
            color: #4ade80;
        }

        .score-board {
            display: flex;
            gap: 28px;
        }

        .score-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .score-label {
            font-size: 11px;
            text-transform: uppercase;
            color: #64748b;
            letter-spacing: 2px;
            font-weight: 600;
        }

        .score-value {
            font-size: 26px;
            font-weight: 800;
            color: #e2e8f0;
            line-height: 1.2;
        }
        .score-value.current {
            color: #4ade80;
        }
        .score-value.best {
            color: #fbbf24;
        }

        /* ==================== Canvas 游戏画布 ==================== */
        .canvas-wrapper {
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            background: #0a0a14;
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.6);
        }

        #gameCanvas {
            display: block;
            width: 480px;
            height: 480px;
            background: #0a0a14;
        }

        /* ==================== 游戏结束覆盖层 ==================== */
        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.78);
            backdrop-filter: blur(6px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.35s ease;
        }

        .overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .overlay-icon {
            font-size: 54px;
            margin-bottom: 8px;
        }

        .overlay-title {
            font-size: 36px;
            font-weight: 800;
            color: #f87171;
            letter-spacing: 2px;
        }

        .overlay-score {
            font-size: 18px;
            color: #cbd5e1;
            margin-top: 10px;
        }
        .overlay-score strong {
            color: #4ade80;
            font-size: 24px;
        }

        .overlay-hint {
            margin-top: 22px;
            color: #94a3b8;
            font-size: 14px;
            letter-spacing: 1px;
            animation: pulse 1.8s ease-in-out infinite;
        }
        .overlay-hint kbd {
            display: inline-block;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 6px;
            padding: 2px 12px;
            color: #e2e8f0;
            font-family: inherit;
            font-weight: 600;
            font-size: 15px;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* ==================== 底部控制提示 ==================== */
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 16px;
            padding: 0 4px;
        }

        .controls-hint {
            display: flex;
            gap: 6px;
            align-items: center;
            color: #475569;
            font-size: 12px;
        }
        .controls-hint kbd {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            min-width: 30px;
            height: 28px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 6px;
            color: #94a3b8;
            font-size: 12px;
            font-family: inherit;
            font-weight: 600;
            padding: 0 6px;
        }

        .status-badge {
            font-size: 12px;
            color: #4ade80;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .status-badge .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #4ade80;
            animation: blink 1.2s ease-in-out infinite;
        }
        .status-badge.paused .dot {
            background: #fbbf24;
        }
        .status-badge.over .dot {
            background: #f87171;
            animation: none;
        }
        .status-badge.paused {
            color: #fbbf24;
        }
        .status-badge.over {
            color: #f87171;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* ==================== 移动端触摸控制 ==================== */
        .touch-controls {
            display: none;
            margin-top: 20px;
            justify-content: center;
        }

        .touch-grid {
            display: grid;
            grid-template-columns: 72px 72px 72px;
            grid-template-rows: 72px 72px 72px;
            gap: 4px;
        }

        .touch-btn {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            color: #94a3b8;
            font-size: 28px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            touch-action: manipulation;
            transition: background 0.15s;
            -webkit-tap-highlight-color: transparent;
        }
        .touch-btn:active {
            background: rgba(255, 255, 255, 0.14);
        }
        .touch-btn.empty {
            background: transparent;
            border: none;
            pointer-events: none;
        }
        .touch-btn.up    { grid-column: 2; grid-row: 1; }
        .touch-btn.down  { grid-column: 2; grid-row: 3; }
        .touch-btn.left  { grid-column: 1; grid-row: 2; }
        .touch-btn.right { grid-column: 3; grid-row: 2; }

        @media (pointer: coarse) {
            .touch-controls {
                display: flex;
            }
            .controls-hint kbd {
                display: none;
            }
        }

        @media (max-width: 560px) {
            .game-wrapper {
                padding: 16px;
                border-radius: 20px;
            }
            #gameCanvas {
                width: 320px;
                height: 320px;
            }
            .game-title {
                font-size: 17px;
            }
            .score-value {
                font-size: 20px;
            }
            .header {
                flex-wrap: wrap;
                gap: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <!-- 顶部信息栏 -->
        <div class="header">
            <div class="game-title">🐍 <span>贪吃蛇</span></div>
            <div class="score-board">
                <div class="score-item">
                    <span class="score-label">分数</span>
                    <span class="score-value current" id="scoreDisplay">0</span>
                </div>
                <div class="score-item">
                    <span class="score-label">最高</span>
                    <span class="score-value best" id="bestDisplay">0</span>
                </div>
            </div>
        </div>

        <!-- Canvas 画布 + 覆盖层 -->
        <div class="canvas-wrapper">
            <canvas id="gameCanvas" width="480" height="480"></canvas>

            <!-- 游戏结束 / 开始覆盖层 -->
            <div class="overlay active" id="overlay">
                <div class="overlay-icon">🐍</div>
                <div class="overlay-title" id="overlayTitle">贪吃蛇</div>
                <div class="overlay-score" id="overlayScore">
                    按 <kbd>空格</kbd> 开始游戏
                </div>
                <div class="overlay-hint">
                    使用 <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> 控制方向
                </div>
            </div>
        </div>

        <!-- 底部状态 -->
        <div class="footer">
            <div class="controls-hint">
                <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> 移动 
                <kbd>空格</kbd> 暂停/开始
            </div>
            <div class="status-badge" id="statusBadge">
                <span class="dot"></span>
                <span id="statusText">等待开始</span>
            </div>
        </div>

        <!-- 移动端触摸按键 -->
        <div class="touch-controls">
            <div class="touch-grid">
                <div class="touch-btn empty"></div>
                <div class="touch-btn up" data-dir="up">↑</div>
                <div class="touch-btn empty"></div>
                <div class="touch-btn left" data-dir="left">←</div>
                <div class="touch-btn empty"></div>
                <div class="touch-btn right" data-dir="right">→</div>
                <div class="touch-btn empty"></div>
                <div class="touch-btn down" data-dir="down">↓</div>
                <div class="touch-btn empty"></div>
            </div>
        </div>
    </div>

    <script>
        (function () {
            'use strict';

            /* ================================================================
             *  常量 & DOM 引用
             * ================================================================ */
            const BOARD_SIZE  = 20;          // 20×20 网格
            const CELL_SIZE   = 480 / BOARD_SIZE; // 24px
            const TICK_MS     = 150;         // 移动间隔 (ms)

            const canvas      = document.getElementById('gameCanvas');
            const ctx         = canvas.getContext('2d');
            const scoreEl     = document.getElementById('scoreDisplay');
            const bestEl      = document.getElementById('bestDisplay');
            const overlay     = document.getElementById('overlay');
            const overlayTitle = document.getElementById('overlayTitle');
            const overlayScore = document.getElementById('overlayScore');
            const statusBadge = document.getElementById('statusBadge');
            const statusText  = document.getElementById('statusText');

            /* ================================================================
             *  游戏状态
             * ================================================================ */
            let snake     = [];       // [{x, y}, ...]
            let food      = { x: 8, y: 10 };
            let direction = 'right';  // 当前移动方向
            let nextDir   = 'right';  // 下一次移动方向
            let score     = 0;
            let bestScore = 0;

            let gameState = 'idle';   // idle | running | paused | over
            let timerId   = null;

            // 读取本地最高分
            try {
                const saved = localStorage.getItem('snake_best');
                if (saved) bestScore = parseInt(saved, 10) || 0;
            } catch (_) { /* ignore */ }
            bestEl.textContent = bestScore;

            /* ================================================================
             *  工具函数
             * ================================================================ */
            function randomInt(min, max) {
                return Math.floor(Math.random() * (max - min + 1)) + min;
            }

            /** 生成不重叠的食物坐标 */
            function generateFood() {
                const occupied = new Set(snake.map(p => `${p.x},${p.y}`));
                if (occupied.size >= BOARD_SIZE * BOARD_SIZE) return null; // 棋盘满了
                let pos;
                do {
                    pos = { x: randomInt(0, BOARD_SIZE - 1), y: randomInt(0, BOARD_SIZE - 1) };
                } while (occupied.has(`${pos.x},${pos.y}`));
                return pos;
            }

            /* ================================================================
             *  核心游戏逻辑
             * ================================================================ */

            /** 重置游戏（不清除最高分） */
            function resetGame() {
                snake = [
                    { x: 10, y: 10 },
                    { x:  9, y: 10 },
                    { x:  8, y: 10 },
                ];
                direction = 'right';
                nextDir   = 'right';
                score     = 0;
                scoreEl.textContent = '0';

                const newFood = generateFood();
                if (newFood) food = newFood;
            }

            /** 开始一局新游戏 */
            function startGame() {
                resetGame();
                gameState = 'running';
                overlay.classList.remove('active');
                updateStatus('running');
                clearTimer();
                timerId = setInterval(gameTick, TICK_MS);
                draw();
            }

            /** 暂停 / 继续 */
            function togglePause() {
                if (gameState === 'running') {
                    gameState = 'paused';
                    clearTimer();
                    updateStatus('paused');
                } else if (gameState === 'paused') {
                    gameState = 'running';
                    timerId = setInterval(gameTick, TICK_MS);
                    updateStatus('running');
                }
                draw();
            }

            /** 游戏结束 */
            function gameOver() {
                gameState = 'over';
                clearTimer();

                // 更新最高分
                if (score > bestScore) {
                    bestScore = score;
                    bestEl.textContent = bestScore;
                    try { localStorage.setItem('snake_best', String(bestScore)); } catch (_) {}
                }

                // 显示覆盖层
                overlayTitle.textContent = '💀 游戏结束';
                overlayScore.innerHTML = `得分：<strong>${score}</strong>`;
                overlay.classList.add('active');
                updateStatus('over');
                draw();
            }

            /** 每一个 tick 更新 */
            function gameTick() {
                if (gameState !== 'running') return;

                // 1. 生效方向
                direction = nextDir;

                // 2. 计算新蛇头
                const head = snake[0];
                let newHead = { ...head };
                switch (direction) {
                    case 'up':    newHead.y -= 1; break;
                    case 'down':  newHead.y += 1; break;
                    case 'left':  newHead.x -= 1; break;
                    case 'right': newHead.x += 1; break;
                }

                // 3. 碰撞检测：墙壁
                if (newHead.x < 0 || newHead.x >= BOARD_SIZE ||
                    newHead.y < 0 || newHead.y >= BOARD_SIZE) {
                    gameOver();
                    return;
                }

                // 4. 碰撞检测：自身（注意：如果吃到了食物尾部会先移除，所以要先判断食物）
                const willEat = (newHead.x === food.x && newHead.y === food.y);

                // 检查是否撞到自己（排除尾部——如果吃到了食物尾部会缩短不用管；否则尾部会移除）
                const checkBody = willEat ? snake : snake.slice(0, -1);
                if (checkBody.some(p => p.x === newHead.x && p.y === newHead.y)) {
                    gameOver();
                    return;
                }

                // 5. 移动蛇
                snake.unshift(newHead);

                if (willEat) {
                    // 吃到了：分数 +1，生成新食物
                    score += 1;
                    scoreEl.textContent = score;

                    const newFood = generateFood();
                    if (newFood) {
                        food = newFood;
                    } else {
                        // 棋盘满了 -> 通关！
                        gameState = 'over';
                        clearTimer();
                        if (score > bestScore) {
                            bestScore = score;
                            bestEl.textContent = bestScore;
                            try { localStorage.setItem('snake_best', String(bestScore)); } catch (_) {}
                        }
                        overlayTitle.textContent = '🏆 你赢了！';
                        overlayScore.innerHTML = `满分通关！<strong>${score}</strong>`;
                        overlay.classList.add('active');
                        updateStatus('over');
                        draw();
                        return;
                    }
                } else {
                    // 没吃到：移除尾部
                    snake.pop();
                }

                draw();
            }

            /* ================================================================
             *  渲染
             * ================================================================ */
            function draw() {
                ctx.clearRect(0, 0, 480, 480);

                // ---- 网格线（淡） ----
                ctx.strokeStyle = 'rgba(255,255,255,0.03)';
                ctx.lineWidth = 0.5;
                for (let i = 0; i <= BOARD_SIZE; i++) {
                    ctx.beginPath();
                    ctx.moveTo(i * CELL_SIZE, 0);
                    ctx.lineTo(i * CELL_SIZE, 480);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(0, i * CELL_SIZE);
                    ctx.lineTo(480, i * CELL_SIZE);
                    ctx.stroke();
                }

                // ---- 食物 ----
                const fx = food.x * CELL_SIZE + CELL_SIZE / 2;
                const fy = food.y * CELL_SIZE + CELL_SIZE / 2;
                const pulse = 1 + 0.08 * Math.sin(Date.now() / 200);

                // 光晕
                const glow = ctx.createRadialGradient(fx, fy, 0, fx, fy, CELL_SIZE * 0.8);
                glow.addColorStop(0, 'rgba(248, 113, 113, 0.4)');
                glow.addColorStop(1, 'rgba(248, 113, 113, 0)');
                ctx.fillStyle = glow;
                ctx.beginPath();
                ctx.arc(fx, fy, CELL_SIZE * 0.8, 0, Math.PI * 2);
                ctx.fill();

                // 食物本体
                ctx.fillStyle = '#f87171';
                ctx.shadowColor = '#f87171';
                ctx.shadowBlur = 12;
                ctx.beginPath();
                ctx.arc(fx, fy, (CELL_SIZE / 2 - 2) * pulse, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;

                // 高光
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.beginPath();
                ctx.arc(fx - 3, fy - 3, 4, 0, Math.PI * 2);
                ctx.fill();

                // ---- 蛇 ----
                for (let i = 0; i < snake.length; i++) {
                    const p = snake[i];
                    const x = p.x * CELL_SIZE;
                    const y = p.y * CELL_SIZE;
                    const padding = i === 0 ? 1 : 2;
                    const radius = 4;

                    // 蛇身渐变
                    const ratio = i / snake.length;
                    const r = Math.round(74 + ratio * 30);
                    const g = Math.round(222 - ratio * 60);
                    const b = Math.round(128 - ratio * 40);
                    const color = `rgb(${r}, ${g}, ${b})`;

                    ctx.fillStyle = color;

                    // 圆角矩形
                    const w = CELL_SIZE - padding * 2;
                    ctx.beginPath();
                    ctx.moveTo(x + padding + radius, y + padding);
                    ctx.lineTo(x + padding + w - radius, y + padding);
                    ctx.quadraticCurveTo(x + padding + w, y + padding, x + padding + w, y + padding + radius);
                    ctx.lineTo(x + padding + w, y + padding + w - radius);
                    ctx.quadraticCurveTo(x + padding + w, y + padding + w, x + padding + w - radius, y + padding + w);
                    ctx.lineTo(x + padding + radius, y + padding + w);
                    ctx.quadraticCurveTo(x + padding, y + padding + w, x + padding, y + padding + w - radius);
                    ctx.lineTo(x + padding, y + padding + radius);
                    ctx.quadraticCurveTo(x + padding, y + padding, x + padding + radius, y + padding);
                    ctx.closePath();
                    ctx.fill();

                    // 蛇头高光 / 眼睛
                    if (i === 0) {
                        // 眼睛
                        ctx.fillStyle = '#fff';
                        let ex1, ey1, ex2, ey2;
                        const cx = x + CELL_SIZE / 2;
                        const cy = y + CELL_SIZE / 2;
                        switch (direction) {
                            case 'right':
                                ex1 = cx + 3; ey1 = cy - 4;
                                ex2 = cx + 3; ey2 = cy + 4;
                                break;
                            case 'left':
                                ex1 = cx - 3; ey1 = cy - 4;
                                ex2 = cx - 3; ey2 = cy + 4;
                                break;
                            case 'up':
                                ex1 = cx - 4; ey1 = cy - 3;
                                ex2 = cx + 4; ey2 = cy - 3;
                                break;
                            case 'down':
                                ex1 = cx - 4; ey1 = cy + 3;
                                ex2 = cx + 4; ey2 = cy + 3;
                                break;
                            default:
                                ex1 = cx + 3; ey1 = cy - 4;
                                ex2 = cx + 3; ey2 = cy + 4;
                        }
                        ctx.beginPath();
                        ctx.arc(ex1, ey1, 3, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(ex2, ey2, 3, 0, Math.PI * 2);
                        ctx.fill();

                        // 瞳孔
                        ctx.fillStyle = '#0a0a14';
                        ctx.beginPath();
                        ctx.arc(ex1, ey1, 1.5, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(ex2, ey2, 1.5, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }

                // ---- 暂停状态半透明蒙层 ----
                if (gameState === 'paused') {
                    ctx.fillStyle = 'rgba(0,0,0,0.4)';
                    ctx.fillRect(0, 0, 480, 480);
                    ctx.fillStyle = '#fbbf24';
                    ctx.font = 'bold 36px "Segoe UI", sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('⏸ 暂停中', 240, 240);
                }
            }

            // 食物呼吸动画循环
            let animFrame;
            function animateLoop() {
                draw();
                animFrame = requestAnimationFrame(animateLoop);
            }

            /* ================================================================
             *  状态栏更新
             * ================================================================ */
            function updateStatus(state) {
                statusBadge.className = 'status-badge';
                switch (state) {
                    case 'running':
                        statusBadge.classList.add('running');
                        statusText.textContent = '游戏中';
                        break;
                    case 'paused':
                        statusBadge.classList.add('paused');
                        statusText.textContent = '已暂停';
                        break;
                    case 'over':
                        statusBadge.classList.add('over');
                        statusText.textContent = '游戏结束';
                        break;
                    default:
                        statusText.textContent = '等待开始';
                }
            }

            function clearTimer() {
                if (timerId !== null) {
                    clearInterval(timerId);
                    timerId = null;
                }
            }

            /* ================================================================
             *  方向控制
             * ================================================================ */
            const OPPOSITE = {
                up: 'down', down: 'up', left: 'right', right: 'left'
            };

            function setDirection(dir) {
                if (gameState !== 'running') return;
                // 不允许掉头
                if (dir === OPPOSITE[direction]) return;
                nextDir = dir;
            }

            /* ================================================================
             *  事件绑定
             * ================================================================ */

            // ---- 键盘 ----
            document.addEventListener('keydown', (e) => {
                const key = e.key;

                // 方向键
                const dirMap = {
                    'ArrowUp': 'up',
                    'ArrowDown': 'down',
                    'ArrowLeft': 'left',
                    'ArrowRight': 'right',
                };
                if (dirMap[key]) {
                    e.preventDefault();
                    setDirection(dirMap[key]);
                    return;
                }

                // 空格：开始 / 暂停 / 重启
                if (key === ' ' || key === 'Spacebar') {
                    e.preventDefault();
                    if (gameState === 'idle' || gameState === 'over') {
                        startGame();
                    } else if (gameState === 'running' || gameState === 'paused') {
                        togglePause();
                    }
                }
            });

            // ---- 触摸方向按钮 ----
            document.querySelectorAll('.touch-btn[data-dir]').forEach(btn => {
                btn.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    const dir = btn.dataset.dir;
                    setDirection(dir);
                });
                btn.addEventListener('mousedown', (e) => {
                    e.preventDefault();
                    const dir = btn.dataset.dir;
                    setDirection(dir);
                });
            });

            // ---- 窗口失焦时自动暂停 ----
            document.addEventListener('visibilitychange', () => {
                if (document.hidden && gameState === 'running') {
                    togglePause();
                }
            });

            /* ================================================================
             *  初始化
             * ================================================================ */
            resetGame();
            draw();
            animateLoop();

            // 显示初始覆盖
            overlayTitle.textContent = '🐍 贪吃蛇';
            overlayScore.innerHTML = '按 <kbd>空格</kbd> 开始游戏';
            overlay.classList.add('active');
            updateStatus('idle');
        })();
    </script>
</body>
</html>
