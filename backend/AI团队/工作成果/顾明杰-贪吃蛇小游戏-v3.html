<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐍 贪吃蛇 — 经典小游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0e1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            overflow: hidden;
        }

        .game-wrapper {
            background: linear-gradient(145deg, #111827, #0d1321);
            border-radius: 24px;
            padding: 30px 35px 35px 35px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8), 0 0 40px rgba(0, 255, 136, 0.06);
            border: 1px solid rgba(0, 255, 136, 0.08);
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
            padding: 0 4px;
        }

        .game-title {
            color: #8affc0;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 1px;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
        }

        .score-board {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .score-label {
            color: #6b7280;
            font-size: 14px;
            font-weight: 500;
        }

        .score-value {
            color: #ffffff;
            font-size: 28px;
            font-weight: 700;
            background: #1a2332;
            padding: 2px 18px;
            border-radius: 10px;
            min-width: 60px;
            text-align: center;
            box-shadow: inset 0 2px 6px rgba(0, 0, 0, 0.4);
            font-variant-numeric: tabular-nums;
        }

        .canvas-container {
            position: relative;
            background: #0f172a;
            border-radius: 16px;
            padding: 8px;
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(0, 255, 136, 0.06);
        }

        #gameCanvas {
            display: block;
            width: 480px;
            height: 480px;
            border-radius: 10px;
            background: #0f172a;
            image-rendering: pixelated;
        }

        /* 覆盖层 - 游戏结束 */
        .overlay {
            position: absolute;
            top: 8px;
            left: 8px;
            right: 8px;
            bottom: 8px;
            border-radius: 10px;
            background: rgba(10, 14, 26, 0.88);
            backdrop-filter: blur(6px);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 12px;
            z-index: 10;
        }

        .overlay.show {
            display: flex;
        }

        .overlay-title {
            color: #ff4757;
            font-size: 38px;
            font-weight: 800;
            letter-spacing: 2px;
            text-shadow: 0 0 30px rgba(255, 71, 87, 0.3);
        }

        .overlay-score {
            color: #e5e7eb;
            font-size: 20px;
            margin-top: 4px;
        }

        .overlay-score span {
            color: #ffd43b;
            font-weight: 700;
            font-size: 28px;
        }

        .overlay-hint {
            color: #9ca3af;
            font-size: 15px;
            margin-top: 10px;
            padding: 10px 28px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            animation: pulse 1.8s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        .game-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 16px;
            padding: 0 4px;
        }

        .controls-hint {
            color: #4b5563;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .controls-hint kbd {
            background: #1f2937;
            color: #d1d5db;
            padding: 2px 10px;
            border-radius: 5px;
            font-size: 12px;
            border: 1px solid #374151;
            box-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
            box-shadow: 0 0 10px rgba(34, 197, 94, 0.4);
            margin-right: 4px;
            animation: blink 1.5s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <div class="game-header">
            <div class="game-title">🐍 贪吃蛇</div>
            <div class="score-board">
                <span class="score-label">🏆 分数</span>
                <span class="score-value" id="scoreDisplay">0</span>
            </div>
        </div>

        <div class="canvas-container">
            <canvas id="gameCanvas" width="480" height="480"></canvas>
            <div class="overlay" id="gameOverlay">
                <div class="overlay-title">💀 游戏结束</div>
                <div class="overlay-score">最终得分：<span id="finalScore">0</span></div>
                <div class="overlay-hint">按 <kbd>空格</kbd> 重新开始</div>
            </div>
        </div>

        <div class="game-footer">
            <div class="status-dot"></div>
            <div class="controls-hint">
                <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> 方向移动
                <span style="margin:0 6px;color:#374151;">|</span>
                <kbd>空格</kbd> 暂停/继续
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ---------- 常量配置 ----------
            const BOARD_SIZE = 20;            // 20x20 网格
            const CELL_SIZE = 24;             // 像素
            const CANVAS_SIZE = BOARD_SIZE * CELL_SIZE; // 480

            const TICK_INTERVAL_MS = 160;     // 蛇移动间隔 (ms)

            // ---------- DOM 引用 ----------
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const scoreDisplay = document.getElementById('scoreDisplay');
            const finalScore = document.getElementById('finalScore');
            const overlay = document.getElementById('gameOverlay');

            // ---------- 游戏状态 ----------
            let snake = [];              // 蛇身坐标数组 [x,y]
            let food = { x: 8, y: 10 };  // 食物坐标
            let direction = 'RIGHT';     // 当前移动方向
            let nextDirection = 'RIGHT'; // 下次移动实际方向
            let score = 0;
            let gameState = 'IDLE';      // IDLE | PLAYING | PAUSED | GAME_OVER
            let gameLoopId = null;
            let lastTickTime = 0;

            // ---------- 初始化 ----------
            function initGame() {
                // 蛇：初始长度为3，水平放置
                snake = [
                    { x: 9, y: 10 },
                    { x: 8, y: 10 },
                    { x: 7, y: 10 }
                ];
                direction = 'RIGHT';
                nextDirection = 'RIGHT';
                score = 0;
                updateScore();
                spawnFood();
                overlay.classList.remove('show');
                gameState = 'IDLE';   // 等待首次按键开始
                draw();
            }

            // ---------- 食物生成（避开蛇身） ----------
            function spawnFood() {
                const totalCells = BOARD_SIZE * BOARD_SIZE;
                if (snake.length >= totalCells) {
                    // 蛇占满棋盘 → 胜利！（罕见情况，但处理一下）
                    return;
                }

                // 将蛇身坐标转为 Set 加速查找
                const snakeSet = new Set(snake.map(s => `${s.x},${s.y}`));
                const freeCells = [];
                for (let x = 0; x < BOARD_SIZE; x++) {
                    for (let y = 0; y < BOARD_SIZE; y++) {
                        if (!snakeSet.has(`${x},${y}`)) {
                            freeCells.push({ x, y });
                        }
                    }
                }
                if (freeCells.length === 0) return;
                const rand = Math.floor(Math.random() * freeCells.length);
                food = freeCells[rand];
            }

            // ---------- 更新分数显示 ----------
            function updateScore() {
                scoreDisplay.textContent = score;
            }

            // ---------- 游戏结束 ----------
            function gameOver() {
                gameState = 'GAME_OVER';
                if (gameLoopId) {
                    cancelAnimationFrame(gameLoopId);
                    gameLoopId = null;
                }
                finalScore.textContent = score;
                overlay.classList.add('show');
                draw();
            }

            // ---------- 蛇的移动逻辑 ----------
            function moveSnake() {
                // 1. 更新方向（不允许反向）
                const opposites = {
                    'UP': 'DOWN', 'DOWN': 'UP', 'LEFT': 'RIGHT', 'RIGHT': 'LEFT'
                };
                if (nextDirection && opposites[nextDirection] !== direction) {
                    direction = nextDirection;
                }

                // 2. 计算新头部
                const head = snake[0];
                let newHead = { ...head };
                switch (direction) {
                    case 'UP':    newHead.y -= 1; break;
                    case 'DOWN':  newHead.y += 1; break;
                    case 'LEFT':  newHead.x -= 1; break;
                    case 'RIGHT': newHead.x += 1; break;
                }

                // 3. 检查是否吃到食物
                const isEating = (newHead.x === food.x && newHead.y === food.y);

                // 4. 移动蛇：先加头
                snake.unshift(newHead);
                if (!isEating) {
                    snake.pop(); // 没吃到就去尾
                } else {
                    // 吃到食物 → 加分、生成新食物
                    score += 10;
                    updateScore();
                    spawnFood();
                }

                // 5. 碰撞检测（撞墙 / 撞自己）
                const headPos = snake[0];
                // 撞墙
                if (headPos.x < 0 || headPos.x >= BOARD_SIZE || headPos.y < 0 || headPos.y >= BOARD_SIZE) {
                    gameOver();
                    return false;
                }
                // 撞自己（检查头部是否与身体其他部分重叠）
                for (let i = 1; i < snake.length; i++) {
                    if (snake[i].x === headPos.x && snake[i].y === headPos.y) {
                        gameOver();
                        return false;
                    }
                }

                return true; // 移动成功
            }

            // ---------- 绘图 ----------
            function draw() {
                ctx.clearRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

                // 1. 绘制网格线（极淡）
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
                ctx.lineWidth = 1;
                for (let i = 0; i <= BOARD_SIZE; i++) {
                    const pos = i * CELL_SIZE;
                    ctx.beginPath();
                    ctx.moveTo(pos, 0);
                    ctx.lineTo(pos, CANVAS_SIZE);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(0, pos);
                    ctx.lineTo(CANVAS_SIZE, pos);
                    ctx.stroke();
                }

                // 2. 绘制食物（发光红点）
                const fx = food.x * CELL_SIZE + CELL_SIZE / 2;
                const fy = food.y * CELL_SIZE + CELL_SIZE / 2;
                const gradient = ctx.createRadialGradient(fx, fy, 2, fx, fy, CELL_SIZE * 0.7);
                gradient.addColorStop(0, '#ff6b6b');
                gradient.addColorStop(0.5, '#ff2d2d');
                gradient.addColorStop(1, 'rgba(255, 0, 0, 0)');
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(fx, fy, CELL_SIZE * 0.7, 0, Math.PI * 2);
                ctx.fill();

                // 食物核心
                ctx.fillStyle = '#ffd43b';
                ctx.shadowColor = '#ff6b6b';
                ctx.shadowBlur = 12;
                ctx.beginPath();
                ctx.arc(fx, fy, CELL_SIZE * 0.28, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;

                // 3. 绘制蛇身
                for (let i = 0; i < snake.length; i++) {
                    const seg = snake[i];
                    const px = seg.x * CELL_SIZE;
                    const py = seg.y * CELL_SIZE;
                    const padding = i === 0 ? 1 : 2.5; // 头部稍大
                    const radius = i === 0 ? 5 : 3.5;

                    // 蛇身颜色：头部鲜绿，身体渐变
                    let color;
                    if (i === 0) {
                        color = '#4ade80';
                    } else {
                        const ratio = i / snake.length;
                        const g = Math.floor(180 - ratio * 60);
                        const r = Math.floor(30 + ratio * 40);
                        color = `rgb(${r}, ${g}, 100)`;
                    }

                    ctx.fillStyle = color;
                    ctx.shadowColor = i === 0 ? 'rgba(74, 222, 128, 0.4)' : 'rgba(0, 255, 100, 0.15)';
                    ctx.shadowBlur = i === 0 ? 14 : 6;

                    // 圆角矩形
                    const x = px + padding;
                    const y = py + padding;
                    const w = CELL_SIZE - padding * 2;
                    const h = CELL_SIZE - padding * 2;
                    ctx.beginPath();
                    ctx.roundRect(x, y, w, h, radius);
                    ctx.fill();

                    // 蛇头眼睛
                    if (i === 0) {
                        ctx.shadowBlur = 0;
                        ctx.fillStyle = '#ffffff';
                        let eyeOffsets = [];
                        switch (direction) {
                            case 'UP':    eyeOffsets = [[-3, -3], [3, -3]]; break;
                            case 'DOWN':  eyeOffsets = [[-3, 3], [3, 3]]; break;
                            case 'LEFT':  eyeOffsets = [[-3, -3], [-3, 3]]; break;
                            case 'RIGHT': eyeOffsets = [[3, -3], [3, 3]]; break;
                            default:      eyeOffsets = [[3, -3], [3, 3]];
                        }
                        for (const [dx, dy] of eyeOffsets) {
                            ctx.beginPath();
                            ctx.arc(px + CELL_SIZE / 2 + dx, py + CELL_SIZE / 2 + dy, 2.5, 0, Math.PI * 2);
                            ctx.fill();
                        }
                        // 瞳孔
                        ctx.fillStyle = '#0f172a';
                        for (const [dx, dy] of eyeOffsets) {
                            ctx.beginPath();
                            ctx.arc(px + CELL_SIZE / 2 + dx + (direction === 'LEFT' ? -1 : direction === 'RIGHT' ? 1 : 0), 
                                    py + CELL_SIZE / 2 + dy + (direction === 'UP' ? -1 : direction === 'DOWN' ? 1 : 0), 1.2, 0, Math.PI * 2);
                            ctx.fill();
                        }
                    }
                }
                ctx.shadowBlur = 0;

                // 4. 如果游戏结束，在画布上叠加一层暗色（覆盖层已通过DOM实现）
            }

            // Canvas roundRect 辅助方法
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (w < 2 * r) r = w / 2;
                if (h < 2 * r) r = h / 2;
                this.moveTo(x + r, y);
                this.lineTo(x + w - r, y);
                this.quadraticCurveTo(x + w, y, x + w, y + r);
                this.lineTo(x + w, y + h - r);
                this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
                this.lineTo(x + r, y + h);
                this.quadraticCurveTo(x, y + h, x, y + h - r);
                this.lineTo(x, y + r);
                this.quadraticCurveTo(x, y, x + r, y);
                this.closePath();
                return this;
            };

            // ---------- 游戏循环 (requestAnimationFrame 驱动) ----------
            function gameLoop(timestamp) {
                if (gameState !== 'PLAYING') {
                    // 暂停或结束状态只绘制不更新逻辑
                    gameLoopId = requestAnimationFrame(gameLoop);
                    return;
                }

                // 按时间间隔推进
                if (timestamp - lastTickTime >= TICK_INTERVAL_MS) {
                    lastTickTime = timestamp;
                    const alive = moveSnake();
                    draw();
                    if (!alive) {
                        // gameOver 已在 moveSnake 中被调用
                        return;
                    }
                }

                gameLoopId = requestAnimationFrame(gameLoop);
            }

            // ---------- 开始/恢复游戏 ----------
            function startGame() {
                if (gameState === 'GAME_OVER') {
                    initGame();
                    // fall through to start playing
                }
                if (gameState === 'IDLE' || gameState === 'PAUSED') {
                    gameState = 'PLAYING';
                    overlay.classList.remove('show');
                    lastTickTime = performance.now();
                    if (gameLoopId) cancelAnimationFrame(gameLoopId);
                    gameLoopId = requestAnimationFrame(gameLoop);
                }
            }

            function pauseGame() {
                if (gameState === 'PLAYING') {
                    gameState = 'PAUSED';
                }
            }

            function togglePause() {
                if (gameState === 'PLAYING') {
                    pauseGame();
                } else if (gameState === 'PAUSED' || gameState === 'IDLE') {
                    startGame();
                }
            }

            // ---------- 键盘控制 ----------
            function handleKeyDown(e) {
                const key = e.key;

                // 空格：暂停/继续 / 重启
                if (key === ' ' || key === 'Spacebar') {
                    e.preventDefault();
                    if (gameState === 'GAME_OVER') {
                        initGame();
                        startGame();
                    } else {
                        togglePause();
                    }
                    return;
                }

                // 方向键
                const keyMap = {
                    'ArrowUp': 'UP',
                    'ArrowDown': 'DOWN',
                    'ArrowLeft': 'LEFT',
                    'ArrowRight': 'RIGHT'
                };
                if (key in keyMap) {
                    e.preventDefault();
                    const newDir = keyMap[key];
                    const opposites = {
                        'UP': 'DOWN', 'DOWN': 'UP', 'LEFT': 'RIGHT', 'RIGHT': 'LEFT'
                    };
                    // 不允许反向
                    if (opposites[newDir] !== direction) {
                        nextDirection = newDir;
                    }
                    // 如果是 IDLE 状态，首次按键启动游戏
                    if (gameState === 'IDLE') {
                        startGame();
                    }
                }
            }

            // ---------- 启动 ----------
            window.addEventListener('keydown', handleKeyDown);

            // 点击画布也可以开始（方便触屏设备参考）
            canvas.addEventListener('click', () => {
                if (gameState === 'IDLE' || gameState === 'PAUSED') {
                    startGame();
                } else if (gameState === 'GAME_OVER') {
                    initGame();
                    startGame();
                }
            });

            // 初始化并绘制初始状态
            initGame();

            // 兼容性：防止页面滚动
            window.addEventListener('keydown', (e) => {
                if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) {
                    e.preventDefault();
                }
            });

            console.log('🐍 贪吃蛇游戏已加载 — 按方向键开始游戏！');
            console.log('🎮 控制：方向键移动 | 空格暂停/继续');
        })();
    </script>
</body>
</html>
