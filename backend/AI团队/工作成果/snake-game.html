<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇小游戏</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', 'PingFang SC', sans-serif;
        }
        .game-container {
            background: #16213e;
            border-radius: 20px;
            padding: 30px 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            text-align: center;
        }
        h1 {
            color: #e94560;
            font-size: 28px;
            margin-bottom: 20px;
            letter-spacing: 4px;
            text-shadow: 0 0 10px rgba(233,69,96,0.3);
        }
        .score-board {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            color: #a0a0b8;
            font-size: 18px;
            font-weight: 500;
        }
        .score-board span { color: #f5f5f5; font-weight: 700; }
        canvas {
            background: #0f3460;
            border-radius: 12px;
            border: 2px solid #1a4a7a;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.3);
            display: block;
            margin: 0 auto;
        }
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .controls button {
            background: #e94560;
            color: white;
            border: none;
            padding: 10px 28px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 2px;
        }
        .controls button:hover { background: #c23152; transform: translateY(-2px); }
        .controls button.secondary { background: #533483; }
        .controls button.secondary:hover { background: #6a4c9a; }
        .tip {
            color: #7a7a9a;
            margin-top: 15px;
            font-size: 14px;
        }
        .tip kbd {
            background: #0f3460;
            padding: 2px 10px;
            border-radius: 4px;
            color: #e94560;
            font-size: 13px;
            border: 1px solid #1a4a7a;
        }
        .game-over-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            border-radius: 12px;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
        }
        .game-over-overlay.show { display: flex; }
        .game-over-overlay h2 { font-size: 36px; color: #e94560; margin-bottom: 10px; }
        .game-over-overlay p { font-size: 18px; color: #ccc; }
        .canvas-wrapper {
            position: relative;
            display: inline-block;
        }
    </style>
</head>
<body>
<div class="game-container">
    <h1>🐍 贪吃蛇</h1>
    <div class="score-board">
        <div>分数 <span id="score">0</span></div>
        <div>最高 <span id="highScore">0</span></div>
    </div>
    <div class="canvas-wrapper">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div class="game-over-overlay" id="gameOverOverlay">
            <h2>游戏结束</h2>
            <p>最终得分: <span id="finalScore">0</span></p>
        </div>
    </div>
    <div class="controls">
        <button id="startBtn">开始游戏</button>
        <button id="restartBtn" class="secondary">重新开始</button>
    </div>
    <div class="tip">
        方向键 <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> 或 WASD 控制
    </div>
</div>
<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const highScoreEl = document.getElementById('highScore');
    const finalScoreEl = document.getElementById('finalScore');
    const gameOverOverlay = document.getElementById('gameOverOverlay');

    const GRID_SIZE = 20;
    const CELL_SIZE = canvas.width / GRID_SIZE;
    let snake, direction, nextDirection, food, score, highScore, gameLoop, gameRunning;
    let pendingDirection = null;

    function init() {
        snake = [
            {x: 10, y: 10},
            {x: 9, y: 10},
            {x: 8, y: 10}
        ];
        direction = 'RIGHT';
        nextDirection = 'RIGHT';
        pendingDirection = null;
        score = 0;
        gameRunning = false;
        scoreEl.textContent = '0';
        highScore = parseInt(localStorage.getItem('snakeHighScore')) || 0;
        highScoreEl.textContent = highScore;
        gameOverOverlay.classList.remove('show');
        spawnFood();
        draw();
    }

    function spawnFood() {
        let pos;
        do {
            pos = {
                x: Math.floor(Math.random() * GRID_SIZE),
                y: Math.floor(Math.random() * GRID_SIZE)
            };
        } while (snake.some(seg => seg.x === pos.x && seg.y === pos.y));
        food = pos;
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        // Draw grid
        ctx.strokeStyle = '#1a4a7a';
        ctx.lineWidth = 0.5;
        for (let i = 0; i <= GRID_SIZE; i++) {
            ctx.beginPath();
            ctx.moveTo(i * CELL_SIZE, 0);
            ctx.lineTo(i * CELL_SIZE, canvas.height);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(0, i * CELL_SIZE);
            ctx.lineTo(canvas.width, i * CELL_SIZE);
            ctx.stroke();
        }
        // Draw food
        ctx.fillStyle = '#e94560';
        ctx.shadowColor = '#e94560';
        ctx.shadowBlur = 10;
        ctx.beginPath();
        ctx.arc(food.x * CELL_SIZE + CELL_SIZE/2, food.y * CELL_SIZE + CELL_SIZE/2, CELL_SIZE/2 - 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
        // Draw snake
        snake.forEach((seg, i) => {
            const ratio = i / snake.length;
            const r = Math.floor(57 + 136 * ratio);
            const g = Math.floor(173 + 82 * ratio);
            const b = Math.floor(80 + 175 * ratio);
            ctx.fillStyle = i === 0 ? '#39ff14' : `rgb(${r},${g},${b})`;
            ctx.shadowColor = i === 0 ? '#39ff14' : 'transparent';
            ctx.shadowBlur = i === 0 ? 15 : 0;
            ctx.beginPath();
            ctx.roundRect(seg.x * CELL_SIZE + 2, seg.y * CELL_SIZE + 2, CELL_SIZE - 4, CELL_SIZE - 4, 4);
            ctx.fill();
            // Eyes on head
            if (i === 0) {
                ctx.fillStyle = '#000';
                ctx.shadowBlur = 0;
                const cx = seg.x * CELL_SIZE + CELL_SIZE/2;
                const cy = seg.y * CELL_SIZE + CELL_SIZE/2;
                const off = 4;
                if (direction === 'RIGHT') {
                    ctx.beginPath(); ctx.arc(cx + off, cy - 3, 2.5, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(cx + off, cy + 3, 2.5, 0, Math.PI*2); ctx.fill();
                } else if (direction === 'LEFT') {
                    ctx.beginPath(); ctx.arc(cx - off, cy - 3, 2.5, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(cx - off, cy + 3, 2.5, 0, Math.PI*2); ctx.fill();
                } else if (direction === 'UP') {
                    ctx.beginPath(); ctx.arc(cx - 3, cy - off, 2.5, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(cx + 3, cy - off, 2.5, 0, Math.PI*2); ctx.fill();
                } else {
                    ctx.beginPath(); ctx.arc(cx - 3, cy + off, 2.5, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(cx + 3, cy + off, 2.5, 0, Math.PI*2); ctx.fill();
                }
                ctx.fillStyle = '#fff';
                ctx.shadowBlur = 5;
                ctx.shadowColor = '#39ff14';
            }
        });
        ctx.shadowBlur = 0;
    }

    // roundRect polyfill
    if (!CanvasRenderingContext2D.prototype.roundRect) {
        CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
            if (r > w/2) r = w/2; if (r > h/2) r = h/2;
            this.moveTo(x + r, y);
            this.lineTo(x + w - r, y);
            this.quadraticCurveTo(x + w, y, x + w, y + r);
            this.lineTo(x + w, y + h - r);
            this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            this.lineTo(x + r, y + h);
            this.quadraticCurveTo(x, y + h, x, y + h - r);
            this.lineTo(x, y + r);
            this.quadraticCurveTo(x, y, x + r, y);
            this.closePath();
            return this;
        };
    }

    function move() {
        if (pendingDirection) {
            const opposite = {UP:'DOWN',DOWN:'UP',LEFT:'RIGHT',RIGHT:'LEFT'};
            if (opposite[pendingDirection] !== direction) {
                nextDirection = pendingDirection;
            }
            pendingDirection = null;
        }
        direction = nextDirection;
        const head = {...snake[0]};
        switch(direction) {
            case 'RIGHT': head.x += 1; break;
            case 'LEFT': head.x -= 1; break;
            case 'UP': head.y -= 1; break;
            case 'DOWN': head.y += 1; break;
        }
        // Check wall collision
        if (head.x < 0 || head.x >= GRID_SIZE || head.y < 0 || head.y >= GRID_SIZE) {
            gameOver();
            return;
        }
        // Check self collision
        if (snake.some(seg => seg.x === head.x && seg.y === head.y)) {
            gameOver();
            return;
        }
        snake.unshift(head);
        if (head.x === food.x && head.y === food.y) {
            score += 10;
            scoreEl.textContent = score;
            spawnFood();
        } else {
            snake.pop();
        }
        draw();
    }

    function gameOver() {
        gameRunning = false;
        clearInterval(gameLoop);
        if (score > highScore) {
            highScore = score;
            highScoreEl.textContent = highScore;
            localStorage.setItem('snakeHighScore', highScore);
        }
        finalScoreEl.textContent = score;
        gameOverOverlay.classList.add('show');
    }

    function startGame() {
        if (gameRunning) return;
        init();
        gameRunning = true;
        gameLoop = setInterval(move, 120);
    }

    function restartGame() {
        clearInterval(gameLoop);
        init();
        startGame();
    }

    document.addEventListener('keydown', (e) => {
        const keyMap = {
            'ArrowUp': 'UP', 'ArrowDown': 'DOWN', 'ArrowLeft': 'LEFT', 'ArrowRight': 'RIGHT',
            'w': 'UP', 'W': 'UP', 's': 'DOWN', 'S': 'DOWN', 'a': 'LEFT', 'A': 'LEFT', 'd': 'RIGHT', 'D': 'RIGHT'
        };
        if (keyMap[e.key] && gameRunning) {
            e.preventDefault();
            pendingDirection = keyMap[e.key];
        }
        if (e.key === ' ' || e.key === 'Enter') {
            if (!gameRunning) startGame();
        }
    });

    document.getElementById('startBtn').addEventListener('click', startGame);
    document.getElementById('restartBtn').addEventListener('click', restartGame);

    // Touch support for mobile
    let touchStartX = 0, touchStartY = 0;
    canvas.addEventListener('touchstart', (e) => {
        const touch = e.touches[0];
        touchStartX = touch.clientX;
        touchStartY = touch.clientY;
    });
    canvas.addEventListener('touchend', (e) => {
        if (!gameRunning) return;
        const touch = e.changedTouches[0];
        const dx = touch.clientX - touchStartX;
        const dy = touch.clientY - touchStartY;
        if (Math.abs(dx) > Math.abs(dy)) {
            pendingDirection = dx > 0 ? 'RIGHT' : 'LEFT';
        } else {
            pendingDirection = dy > 0 ? 'DOWN' : 'UP';
        }
    });

    init();
</script>
</body>
</html>
