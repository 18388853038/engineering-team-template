<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐍 贪吃蛇小游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }
        .game-wrapper {
            background: linear-gradient(145deg, #12122a, #1a1a3e);
            border-radius: 24px;
            padding: 30px 40px 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.06);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 0 4px;
        }
        .title {
            color: #7cf9c0;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 1px;
            text-shadow: 0 0 20px rgba(124,249,192,0.3);
        }
        .title span {
            display: inline-block;
            animation: bounce 2s ease-in-out infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }
        .score-box {
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(124,249,192,0.2);
            border-radius: 12px;
            padding: 8px 20px;
            text-align: center;
        }
        .score-label {
            color: #8899bb;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .score-value {
            color: #7cf9c0;
            font-size: 28px;
            font-weight: 700;
        }
        .canvas-container {
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.5);
            border: 2px solid rgba(124,249,192,0.15);
        }
        #gameCanvas {
            display: block;
            background: #0d0d24;
            width: 480px;
            height: 480px;
        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(6px);
        }
        .overlay.active {
            display: flex;
        }
        .overlay-title {
            color: #ff6b6b;
            font-size: 42px;
            font-weight: 800;
            margin-bottom: 8px;
            text-shadow: 0 0 30px rgba(255,107,107,0.5);
        }
        .overlay-score {
            color: #ffd93d;
            font-size: 20px;
            margin-bottom: 24px;
        }
        .overlay-score span {
            font-size: 32px;
            font-weight: 700;
        }
        .btn-restart {
            background: linear-gradient(135deg, #7cf9c0, #3dd9a0);
            border: none;
            color: #0a0a1a;
            font-size: 18px;
            font-weight: 700;
            padding: 14px 40px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(124,249,192,0.3);
            letter-spacing: 1px;
        }
        .btn-restart:hover {
            transform: translateY(-2px) scale(1.03);
            box-shadow: 0 8px 30px rgba(124,249,192,0.5);
        }
        .btn-restart:active {
            transform: translateY(0) scale(0.98);
        }
        .controls-hint {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 16px;
        }
        .controls-hint kbd {
            background: rgba(124,249,192,0.1);
            border: 1px solid rgba(124,249,192,0.25);
            border-radius: 6px;
            padding: 4px 12px;
            color: #7cf9c0;
            font-size: 13px;
            font-family: inherit;
        }
        .controls-hint span {
            color: #556688;
            font-size: 13px;
            line-height: 28px;
        }
        .start-hint {
            color: #aabbdd;
            font-size: 14px;
            margin-top: 12px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>

<div class="game-wrapper">
    <div class="header">
        <div class="title">🐍 贪吃蛇</div>
        <div class="score-box">
            <div class="score-label">得分</div>
            <div class="score-value" id="scoreDisplay">0</div>
        </div>
    </div>

    <div class="canvas-container">
        <canvas id="gameCanvas" width="480" height="480"></canvas>
        <div class="overlay" id="startOverlay">
            <div style="color:#7cf9c0;font-size:48px;margin-bottom:12px;">🐍</div>
            <div style="color:#eef;font-size:22px;font-weight:600;margin-bottom:8px;">贪吃蛇</div>
            <div class="start-hint">按 空格键 / Enter 开始游戏</div>
            <div style="margin-top:16px;display:flex;gap:16px;color:#7788aa;font-size:13px;">
                <span>↑ ↓ ← → 控制方向</span>
            </div>
        </div>
        <div class="overlay" id="gameOverOverlay">
            <div class="overlay-title">💀 游戏结束</div>
            <div class="overlay-score">得分：<span id="finalScore">0</span></div>
            <button class="btn-restart" id="restartBtn">🔄 再来一局</button>
            <div style="color:#7788aa;font-size:12px;margin-top:12px;">或按 空格键 重新开始</div>
        </div>
    </div>

    <div class="controls-hint">
        <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd>
        <span>方向控制</span>
        <kbd style="margin-left:8px;">␣</kbd> <span>开始 / 暂停 / 重开</span>
    </div>
</div>

<script>
    (function() {
        // ---------- DOM 元素 ----------
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const finalScore = document.getElementById('finalScore');
        const startOverlay = document.getElementById('startOverlay');
        const gameOverOverlay = document.getElementById('gameOverOverlay');
        const restartBtn = document.getElementById('restartBtn');

        // ---------- 游戏配置 ----------
        const GRID_SIZE = 20;          // 20x20 网格
        const CELL_SIZE = canvas.width / GRID_SIZE; // 24px

        // ---------- 游戏状态 ----------
        let snake = [];                // 蛇身坐标 [x,y]
        let food = { x: 0, y: 0 };
        let direction = 'right';       // 当前移动方向
        let nextDirection = 'right';   // 下一个方向（防反方向）
        let score = 0;
        let gameState = 'idle';        // idle | playing | paused | gameover
        let gameLoopId = null;
        let moveTimer = 0;
        const MOVE_INTERVAL = 140;     // 毫秒，控制速度

        // ---------- 初始化 ----------
        function initGame() {
            // 蛇初始长度3，水平放置在第10行
            snake = [
                { x: 9, y: 10 },
                { x: 8, y: 10 },
                { x: 7, y: 10 }
            ];
            direction = 'right';
            nextDirection = 'right';
            score = 0;
            scoreDisplay.textContent = '0';
            spawnFood();
            gameState = 'idle';
            startOverlay.classList.add('active');
            gameOverOverlay.classList.remove('active');
            draw();
        }

        // ---------- 食物生成 ----------
        function spawnFood() {
            const maxAttempts = 1000;
            for (let i = 0; i < maxAttempts; i++) {
                const fx = Math.floor(Math.random() * GRID_SIZE);
                const fy = Math.floor(Math.random() * GRID_SIZE);
                if (!snake.some(seg => seg.x === fx && seg.y === fy)) {
                    food = { x: fx, y: fy };
                    return;
                }
            }
            // 极端情况：蛇几乎占满，线性扫描
            for (let y = 0; y < GRID_SIZE; y++) {
                for (let x = 0; x < GRID_SIZE; x++) {
                    if (!snake.some(seg => seg.x === x && seg.y === y)) {
                        food = { x, y };
                        return;
                    }
                }
            }
            // 真的占满了 → 胜利！
            gameWin();
        }

        // ---------- 游戏胜利（理论上蛇满格） ----------
        function gameWin() {
            if (gameState === 'playing' || gameState === 'idle') {
                gameState = 'gameover';
                cancelAnimationFrame(gameLoopId);
                finalScore.textContent = score + ' 🏆 完美通关！';
                gameOverOverlay.classList.add('active');
            }
        }

        // ---------- 游戏逻辑更新 ----------
        function update() {
            if (gameState !== 'playing') return;

            // 应用方向
            direction = nextDirection;

            // 计算新头位置
            const head = snake[0];
            let newHead = { ...head };
            switch (direction) {
                case 'up':    newHead.y--; break;
                case 'down':  newHead.y++; break;
                case 'left':  newHead.x--; break;
                case 'right': newHead.x++; break;
                default: return;
            }

            // 撞墙检测
            if (newHead.x < 0 || newHead.x >= GRID_SIZE || newHead.y < 0 || newHead.y >= GRID_SIZE) {
                gameOver();
                return;
            }

            // 撞自己检测（新头不能与当前蛇身重叠，尾部除外——尾部会移除，但如果吃到食物尾部不移除）
            const willEat = (newHead.x === food.x && newHead.y === food.y);
            const checkBody = willEat ? snake : snake.slice(0, -1);
            if (checkBody.some(seg => seg.x === newHead.x && seg.y === newHead.y)) {
                gameOver();
                return;
            }

            // 插入新头
            snake.unshift(newHead);

            if (willEat) {
                // 吃到食物 → 不删除尾部，加分，生成新食物
                score++;
                scoreDisplay.textContent = score;
                spawnFood();
            } else {
                // 没吃到 → 删除尾部
                snake.pop();
            }

            draw();
        }

        // ---------- 游戏结束 ----------
        function gameOver() {
            if (gameState !== 'playing') return;
            gameState = 'gameover';
            cancelAnimationFrame(gameLoopId);
            gameLoopId = null;
            finalScore.textContent = score;
            gameOverOverlay.classList.add('active');
            draw(); // 显示最终状态
        }

        // ---------- 绘制 ----------
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 绘制网格（淡）
            ctx.strokeStyle = 'rgba(255,255,255,0.03)';
            ctx.lineWidth = 1;
            for (let i = 1; i < GRID_SIZE; i++) {
                const pos = i * CELL_SIZE;
                ctx.beginPath();
                ctx.moveTo(pos, 0);
                ctx.lineTo(pos, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, pos);
                ctx.lineTo(canvas.width, pos);
                ctx.stroke();
            }

            // 绘制食物
            const fx = food.x * CELL_SIZE + CELL_SIZE / 2;
            const fy = food.y * CELL_SIZE + CELL_SIZE / 2;
            const glow = ctx.createRadialGradient(fx, fy, 2, fx, fy, CELL_SIZE * 0.7);
            glow.addColorStop(0, '#ff6b6b');
            glow.addColorStop(0.4, '#ff4444');
            glow.addColorStop(1, 'rgba(255,68,68,0)');
            ctx.fillStyle = glow;
            ctx.beginPath();
            ctx.arc(fx, fy, CELL_SIZE * 0.7, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#ff3333';
            ctx.shadowColor = '#ff3333';
            ctx.shadowBlur = 12;
            ctx.beginPath();
            ctx.arc(fx, fy, CELL_SIZE * 0.35, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;

            // 绘制蛇身
            for (let i = 0; i < snake.length; i++) {
                const seg = snake[i];
                const x = seg.x * CELL_SIZE;
                const y = seg.y * CELL_SIZE;
                const padding = 1;
                const radius = 4;

                // 蛇身渐变
                const ratio = 1 - (i / snake.length) * 0.5;
                const r = Math.round(60 + 120 * ratio);
                const g = Math.round(200 + 40 * ratio);
                const b = Math.round(140 + 60 * ratio);
                const color = `rgb(${r}, ${g}, ${b})`;

                ctx.fillStyle = color;
                ctx.shadowColor = `rgba(${r}, ${g}, ${b}, 0.3)`;
                ctx.shadowBlur = 8;

                // 绘制圆角矩形
                const cx = x + padding;
                const cy = y + padding;
                const cw = CELL_SIZE - padding * 2;
                const ch = CELL_SIZE - padding * 2;
                ctx.beginPath();
                ctx.moveTo(cx + radius, cy);
                ctx.lineTo(cx + cw - radius, cy);
                ctx.quadraticCurveTo(cx + cw, cy, cx + cw, cy + radius);
                ctx.lineTo(cx + cw, cy + ch - radius);
                ctx.quadraticCurveTo(cx + cw, cy + ch, cx + cw - radius, cy + ch);
                ctx.lineTo(cx + radius, cy + ch);
                ctx.quadraticCurveTo(cx, cy + ch, cx, cy + ch - radius);
                ctx.lineTo(cx, cy + radius);
                ctx.quadraticCurveTo(cx, cy, cx + radius, cy);
                ctx.closePath();
                ctx.fill();
                ctx.shadowBlur = 0;

                // 蛇头眼睛
                if (i === 0) {
                    ctx.fillStyle = 'white';
                    let ex1, ey1, ex2, ey2;
                    const eyeOff = CELL_SIZE * 0.2;
                    const eyeSize = 3.5;
                    switch (direction) {
                        case 'up':
                            ex1 = x + CELL_SIZE * 0.3; ey1 = y + CELL_SIZE * 0.25;
                            ex2 = x + CELL_SIZE * 0.7; ey2 = y + CELL_SIZE * 0.25;
                            break;
                        case 'down':
                            ex1 = x + CELL_SIZE * 0.3; ey1 = y + CELL_SIZE * 0.75;
                            ex2 = x + CELL_SIZE * 0.7; ey2 = y + CELL_SIZE * 0.75;
                            break;
                        case 'left':
                            ex1 = x + CELL_SIZE * 0.25; ey1 = y + CELL_SIZE * 0.3;
                            ex2 = x + CELL_SIZE * 0.25; ey2 = y + CELL_SIZE * 0.7;
                            break;
                        case 'right':
                            ex1 = x + CELL_SIZE * 0.75; ey1 = y + CELL_SIZE * 0.3;
                            ex2 = x + CELL_SIZE * 0.75; ey2 = y + CELL_SIZE * 0.7;
                            break;
                        default:
                            ex1 = x + CELL_SIZE * 0.75; ey1 = y + CELL_SIZE * 0.3;
                            ex2 = x + CELL_SIZE * 0.75; ey2 = y + CELL_SIZE * 0.7;
                    }
                    ctx.beginPath();
                    ctx.arc(ex1, ey1, eyeSize, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(ex2, ey2, eyeSize, 0, Math.PI * 2);
                    ctx.fill();

                    // 瞳孔
                    ctx.fillStyle = '#111';
                    ctx.beginPath();
                    ctx.arc(ex1, ey1, 1.8, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(ex2, ey2, 1.8, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        // ---------- 游戏循环（requestAnimationFrame 计时） ----------
        let lastTime = 0;

        function gameLoop(timestamp) {
            if (gameState !== 'playing') {
                gameLoopId = null;
                return;
            }
            if (!lastTime) lastTime = timestamp;
            const delta = timestamp - lastTime;
            if (delta >= MOVE_INTERVAL) {
                lastTime = timestamp;
                update();
            }
            if (gameState === 'playing') {
                gameLoopId = requestAnimationFrame(gameLoop);
            }
        }

        // ---------- 开始游戏 ----------
        function startGame() {
            initGame();
            gameState = 'playing';
            startOverlay.classList.remove('active');
            gameOverOverlay.classList.remove('active');
            lastTime = 0;
            if (gameLoopId) cancelAnimationFrame(gameLoopId);
            gameLoopId = requestAnimationFrame(gameLoop);
        }

        // ---------- 重新开始 ----------
        function restartGame() {
            startGame();
        }

        // ---------- 方向控制 ----------
        function setDirection(newDir) {
            const opposites = { up: 'down', down: 'up', left: 'right', right: 'left' };
            if (newDir !== opposites[direction] && newDir !== direction) {
                nextDirection = newDir;
            }
        }

        // ---------- 键盘事件 ----------
        function handleKeydown(e) {
            const key = e.key;

            // 方向键
            const dirMap = {
                'ArrowUp': 'up',
                'ArrowDown': 'down',
                'ArrowLeft': 'left',
                'ArrowRight': 'right'
            };
            if (key in dirMap && (gameState === 'playing' || gameState === 'idle')) {
                e.preventDefault();
                if (gameState === 'idle') {
                    startGame();
                }
                setDirection(dirMap[key]);
                return;
            }

            // 空格键
            if (key === ' ' || key === 'Spacebar') {
                e.preventDefault();
                if (gameState === 'idle' || gameState === 'gameover') {
                    startGame();
                } else if (gameState === 'playing') {
                    // 暂停（可选功能）
                }
                return;
            }

            // Enter 键
            if (key === 'Enter') {
                if (gameState === 'idle' || gameState === 'gameover') {
                    e.preventDefault();
                    startGame();
                }
                return;
            }
        }

        // ---------- 事件绑定 ----------
        document.addEventListener('keydown', handleKeydown);

        restartBtn.addEventListener('click', () => {
            startGame();
        });

        // ---------- 启动 ----------
        initGame();
        draw();

        // 清理（防止内存泄漏，但页面关闭即销毁，留作规范）
        window.addEventListener('beforeunload', function() {
            if (gameLoopId) cancelAnimationFrame(gameLoopId);
            document.removeEventListener('keydown', handleKeydown);
        });

        console.log('🐍 贪吃蛇游戏已加载！按空格键开始。');
    })();
</script>

</body>
</html>
