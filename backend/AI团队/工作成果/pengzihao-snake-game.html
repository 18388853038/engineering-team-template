<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐍 贪吃蛇小游戏 - 彭子豪</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; font-family: 'Segoe UI', sans-serif;
        }
        .game-container {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 24px; padding: 32px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .game-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; color: #fff;
        }
        .game-header h1 { font-size: 24px; background: linear-gradient(90deg, #00d2ff, #3a7bd5); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .score-box {
            background: rgba(255,255,255,0.1); padding: 8px 20px;
            border-radius: 12px; font-size: 18px; font-weight: bold;
            color: #00d2ff;
        }
        canvas {
            display: block; margin: 0 auto;
            border-radius: 12px; background: #1a1a2e;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.5);
        }
        .controls {
            display: flex; justify-content: center; gap: 12px; margin-top: 20px;
        }
        .controls button {
            padding: 10px 28px; border: none; border-radius: 12px;
            font-size: 16px; font-weight: 600; cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-start { background: linear-gradient(135deg, #00b4db, #0083b0); color: #fff; }
        .btn-start:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,180,219,0.4); }
        .btn-pause { background: linear-gradient(135deg, #f093fb, #f5576c); color: #fff; }
        .btn-pause:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(245,87,108,0.4); }
        .btn-reset { background: linear-gradient(135deg, #4facfe, #00f2fe); color: #fff; }
        .btn-reset:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(79,172,254,0.4); }
        .game-status {
            text-align: center; margin-top: 16px; font-size: 14px; color: rgba(255,255,255,0.6);
        }
        .tips {
            display: flex; justify-content: center; gap: 20px; margin-top: 12px;
            color: rgba(255,255,255,0.4); font-size: 13px;
        }
        .tips span { display: flex; align-items: center; gap: 6px; }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <h1>🐍 贪吃蛇</h1>
            <div class="score-box">分数: <span id="scoreDisplay">0</span></div>
        </div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div class="controls">
            <button class="btn-start" id="startBtn">▶ 开始</button>
            <button class="btn-pause" id="pauseBtn">⏸ 暂停</button>
            <button class="btn-reset" id="resetBtn">🔄 重置</button>
        </div>
        <div class="game-status" id="gameStatus">按「开始」启动游戏，方向键控制移动</div>
        <div class="tips">
            <span>⬆⬇⬅➡ 方向键移动</span>
            <span>␣ 暂停/继续</span>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreSpan = document.getElementById('scoreDisplay');
        const statusDiv = document.getElementById('gameStatus');

        const GRID_SIZE = 20;
        const CELL_SIZE = canvas.width / GRID_SIZE;

        let snake = [{x: 10, y: 10}];
        let food = {x: 15, y: 15};
        let direction = {x: 0, y: 0};
        let nextDirection = {x: 0, y: 0};
        let score = 0;
        let gameRunning = false;
        let gamePaused = false;
        let gameLoop = null;
        let speed = 150;

        // 初始化
        function init() {
            snake = [{x: 10, y: 10}, {x: 9, y: 10}, {x: 8, y: 10}];
            direction = {x: 1, y: 0};
            nextDirection = {x: 1, y: 0};
            score = 0;
            gamePaused = false;
            scoreSpan.textContent = '0';
            generateFood();
            draw();
        }

        function generateFood() {
            let pos;
            do {
                pos = {
                    x: Math.floor(Math.random() * GRID_SIZE),
                    y: Math.floor(Math.random() * GRID_SIZE)
                };
            } while (snake.some(s => s.x === pos.x && s.y === pos.y));
            food = pos;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 绘制网格线
            ctx.strokeStyle = 'rgba(255,255,255,0.03)';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= GRID_SIZE; i++) {
                ctx.beginPath();
                ctx.moveTo(i * CELL_SIZE, 0);
                ctx.lineTo(i * CELL_SIZE, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * CELL_SIZE);
                ctx.lineTo(canvas.width, i * CELL_SIZE);
                ctx.stroke();
            }

            // 绘制食物
            const fx = food.x * CELL_SIZE, fy = food.y * CELL_SIZE;
            const gradient = ctx.createRadialGradient(fx + CELL_SIZE/2, fy + CELL_SIZE/2, 0, fx + CELL_SIZE/2, fy + CELL_SIZE/2, CELL_SIZE/2);
            gradient.addColorStop(0, '#ff6b6b');
            gradient.addColorStop(1, '#ee5a24');
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#ff6b6b';
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(fx + CELL_SIZE/2, fy + CELL_SIZE/2, CELL_SIZE/2 - 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;

            // 绘制蛇
            snake.forEach((seg, i) => {
                const x = seg.x * CELL_SIZE, y = seg.y * CELL_SIZE;
                const padding = 1;
                const radius = 4;
                
                // 蛇身渐变
                const ratio = i / snake.length;
                const r = Math.floor(0 + ratio * 0);
                const g = Math.floor(200 - ratio * 100);
                const b = Math.floor(255 - ratio * 150);
                
                ctx.shadowBlur = i === 0 ? 15 : 5;
                ctx.shadowColor = i === 0 ? '#00d2ff' : 'rgba(0,210,255,0.3)';
                
                ctx.fillStyle = i === 0 ? '#00d2ff' : `rgb(${r + 50}, ${g + 50}, ${b + 200})`;
                ctx.beginPath();
                ctx.roundRect(x + padding, y + padding, CELL_SIZE - padding*2, CELL_SIZE - padding*2, radius);
                ctx.fill();

                // 蛇头眼睛
                if (i === 0) {
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = '#fff';
                    let ex1, ey1, ex2, ey2;
                    const eyeOff = 4;
                    if (direction.x === 1) { ex1 = x + 14; ey1 = y + 5; ex2 = x + 14; ey2 = y + 13; }
                    else if (direction.x === -1) { ex1 = x + 5; ey1 = y + 5; ex2 = x + 5; ey2 = y + 13; }
                    else if (direction.y === -1) { ex1 = x + 5; ey1 = y + 5; ex2 = x + 13; ey2 = y + 5; }
                    else { ex1 = x + 5; ey1 = y + 14; ex2 = x + 13; ey2 = y + 14; }
                    ctx.beginPath(); ctx.arc(ex1, ey1, 2.5, 0, 2*Math.PI); ctx.fill();
                    ctx.beginPath(); ctx.arc(ex2, ey2, 2.5, 0, 2*Math.PI); ctx.fill();
                    ctx.fillStyle = '#111';
                    ctx.beginPath(); ctx.arc(ex1, ey1, 1.2, 0, 2*Math.PI); ctx.fill();
                    ctx.beginPath(); ctx.arc(ex2, ey2, 1.2, 0, 2*Math.PI); ctx.fill();
                }
            });
            ctx.shadowBlur = 0;
        }

        function update() {
            direction = {...nextDirection};

            const head = {x: snake[0].x + direction.x, y: snake[0].y + direction.y};

            // 碰墙检测
            if (head.x < 0 || head.x >= GRID_SIZE || head.y < 0 || head.y >= GRID_SIZE) {
                gameOver('撞墙了！😵');
                return;
            }

            // 碰自身检测
            if (snake.some(s => s.x === head.x && s.y === head.y)) {
                gameOver('咬到自己了！😨');
                return;
            }

            snake.unshift(head);

            // 吃食物
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreSpan.textContent = score;
                generateFood();
                // 加速
                if (speed > 60) speed -= 2;
            } else {
                snake.pop();
            }

            draw();
        }

        function gameOver(msg) {
            stopGame();
            statusDiv.textContent = `💀 游戏结束！${msg} 最终得分: ${score}`;
        }

        function startGame() {
            if (gameRunning && !gamePaused) return;
            if (!gameRunning || gamePaused) {
                if (!gameRunning) {
                    init();
                    gameRunning = true;
                }
                gamePaused = false;
                statusDiv.textContent = '🎮 游戏进行中...';
                gameLoop = setInterval(update, speed);
            }
        }

        function pauseGame() {
            if (!gameRunning) return;
            if (gamePaused) {
                gamePaused = false;
                statusDiv.textContent = '🎮 游戏进行中...';
                gameLoop = setInterval(update, speed);
            } else {
                gamePaused = true;
                clearInterval(gameLoop);
                statusDiv.textContent = '⏸ 已暂停';
            }
        }

        function stopGame() {
            clearInterval(gameLoop);
            gameRunning = false;
            gamePaused = false;
            gameLoop = null;
            speed = 150;
        }

        function resetGame() {
            stopGame();
            init();
            statusDiv.textContent = '🔄 已重置，按「开始」启动';
        }

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (!gameRunning) {
                if (e.key === 'Enter' || e.key === ' ') startGame();
                return;
            }
            switch (e.key) {
                case 'ArrowUp': if (direction.y !== 1) nextDirection = {x: 0, y: -1}; e.preventDefault(); break;
                case 'ArrowDown': if (direction.y !== -1) nextDirection = {x: 0, y: 1}; e.preventDefault(); break;
                case 'ArrowLeft': if (direction.x !== 1) nextDirection = {x: -1, y: 0}; e.preventDefault(); break;
                case 'ArrowRight': if (direction.x !== -1) nextDirection = {x: 1, y: 0}; e.preventDefault(); break;
                case ' ': pauseGame(); e.preventDefault(); break;
            }
        });

        // 按钮绑定
        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('pauseBtn').addEventListener('click', pauseGame);
        document.getElementById('resetBtn').addEventListener('click', resetGame);

        // 初始绘制
        init();
    </script>
</body>
</html>
