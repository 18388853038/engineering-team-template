<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐍 贪吃蛇小游戏</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            overflow: hidden;
        }

        /* 背景动态粒子效果 */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(2px 2px at 20% 30%, rgba(74, 222, 128, 0.15), transparent),
                radial-gradient(2px 2px at 40% 70%, rgba(74, 222, 128, 0.1), transparent),
                radial-gradient(2px 2px at 60% 20%, rgba(250, 204, 21, 0.1), transparent),
                radial-gradient(2px 2px at 80% 80%, rgba(74, 222, 128, 0.12), transparent);
            pointer-events: none;
            z-index: 0;
        }

        .game-wrapper {
            position: relative;
            z-index: 1;
            background: linear-gradient(160deg, #12122a, #0d0d20);
            border-radius: 28px;
            padding: 30px;
            box-shadow: 
                0 25px 80px rgba(0, 0, 0, 0.8),
                0 0 40px rgba(74, 222, 128, 0.05),
                inset 0 1px 0 rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(74, 222, 128, 0.1);
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
            padding: 0 4px;
        }

        .game-title {
            font-size: 26px;
            font-weight: 800;
            background: linear-gradient(135deg, #4ade80, #22d3ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 1px;
        }

        .score-board {
            display: flex;
            gap: 28px;
        }

        .score-item {
            text-align: center;
        }

        .score-label {
            font-size: 10px;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 2px;
        }

        .score-value {
            font-size: 24px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }

        .score-value.score { color: #4ade80; }
        .score-value.best  { color: #facc15; }
        .score-value.level { color: #22d3ee; }

        .canvas-container {
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            background: #08081a;
            box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.6);
            border: 2px solid rgba(74, 222, 128, 0.12);
        }

        #gameCanvas {
            display: block;
            width: 600px;
            height: 600px;
            background: #0a0a1e;
        }

        /* ===== Overlay 通用 ===== */
        .overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.78);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            transition: opacity 0.35s ease, transform 0.35s ease;
            opacity: 0;
            transform: scale(1.05);
            pointer-events: none;
        }
        .overlay.active {
            opacity: 1;
            transform: scale(1);
            pointer-events: all;
        }

        .overlay-icon { font-size: 56px; margin-bottom: 8px; }
        .overlay-title {
            font-size: 42px;
            font-weight: 800;
            color: #fff;
            margin-bottom: 6px;
            text-shadow: 0 4px 30px rgba(0,0,0,0.6);
        }
        .overlay-subtitle {
            font-size: 16px;
            color: #94a3b8;
            margin-bottom: 28px;
            letter-spacing: 0.5px;
        }
        .overlay-score-text {
            font-size: 22px;
            color: #facc15;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .overlay-best-text {
            font-size: 15px;
            color: #94a3b8;
            margin-bottom: 24px;
        }

        .btn {
            padding: 14px 44px;
            font-size: 18px;
            font-weight: 700;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.25s ease;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
        }
        .btn:active { transform: scale(0.96); }

        .btn-green {
            background: linear-gradient(135deg, #4ade80, #22c55e);
            color: #000;
            box-shadow: 0 4px 25px rgba(74, 222, 128, 0.3);
        }
        .btn-green:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 35px rgba(74, 222, 128, 0.45);
        }

        .btn-yellow {
            background: linear-gradient(135deg, #facc15, #eab308);
            color: #000;
            box-shadow: 0 4px 25px rgba(250, 204, 21, 0.3);
        }
        .btn-yellow:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 35px rgba(250, 204, 21, 0.45);
        }

        .game-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 14px;
            padding: 0 4px;
        }

        .hints {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
        }
        .hint-tag {
            display: flex;
            align-items: center;
            gap: 4px;
            color: #64748b;
            font-size: 12px;
        }
        .hint-tag kbd {
            background: #1e293b;
            padding: 2px 7px;
            border-radius: 4px;
            font-size: 11px;
            color: #cbd5e1;
            border: 1px solid #334155;
            font-family: inherit;
        }

        .speed-selector {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #64748b;
            font-size: 12px;
        }
        .speed-selector select {
            background: #1e293b;
            color: #e2e8f0;
            border: 1px solid #334155;
            border-radius: 6px;
            padding: 5px 10px;
            font-size: 12px;
            cursor: pointer;
            outline: none;
        }
        .speed-selector select:focus {
            border-color: #4ade80;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 680px) {
            .game-wrapper { padding: 16px; border-radius: 18px; }
            #gameCanvas { width: 340px; height: 340px; }
            .game-title { font-size: 20px; }
            .overlay-title { font-size: 28px; }
            .overlay-icon { font-size: 38px; }
            .game-header { flex-direction: column; gap: 8px; }
            .score-board { gap: 18px; }
            .score-value { font-size: 20px; }
            .game-footer { flex-direction: column; gap: 8px; }
            .hints { justify-content: center; }
            .btn { padding: 12px 32px; font-size: 16px; }
        }
        @media (max-width: 400px) {
            #gameCanvas { width: 280px; height: 280px; }
        }
    </style>
</head>
<body>

<div class="game-wrapper">
    <!-- 头部 -->
    <div class="game-header">
        <div class="game-title">🐍 贪吃蛇</div>
        <div class="score-board">
            <div class="score-item">
                <div class="score-label">🍎 分数</div>
                <div class="score-value score" id="scoreDisplay">0</div>
            </div>
            <div class="score-item">
                <div class="score-label">🏆 最高</div>
                <div class="score-value best" id="bestDisplay">0</div>
            </div>
            <div class="score-item">
                <div class="score-label">📊 等级</div>
                <div class="score-value level" id="levelDisplay">1</div>
            </div>
        </div>
    </div>

    <!-- 画布 -->
    <div class="canvas-container">
        <canvas id="gameCanvas" width="600" height="600"></canvas>

        <!-- 开始覆盖层 -->
        <div class="overlay active" id="startOverlay">
            <div class="overlay-icon">🐍</div>
            <div class="overlay-title" style="color:#4ade80;">贪吃蛇</div>
            <div class="overlay-subtitle">键盘 ↑ ↓ ← → 控制移动 · 按 P 暂停</div>
            <button class="btn btn-green" id="startBtn">🎮 开始游戏</button>
        </div>

        <!-- 游戏结束覆盖层 -->
        <div class="overlay" id="gameOverOverlay">
            <div class="overlay-icon">💀</div>
            <div class="overlay-title" style="color:#ef4444;">游戏结束</div>
            <div class="overlay-score-text" id="finalScoreDisplay">得分：0</div>
            <div class="overlay-best-text" id="finalBestDisplay">最高记录：0</div>
            <button class="btn btn-yellow" id="restartBtn">🔄 再来一局</button>
            <div style="margin-top:12px; color:#475569; font-size:13px;">按 <kbd style="background:#1e293b;padding:2px 6px;border-radius:3px;border:1px solid #334155;color:#94a3b8;">空格</kbd> 快速重新开始</div>
        </div>

        <!-- 暂停覆盖层 -->
        <div class="overlay" id="pauseOverlay">
            <div class="overlay-icon">⏸️</div>
            <div class="overlay-title" style="color:#facc15;">暂停中</div>
            <div class="overlay-subtitle">按 <kbd style="background:#1e293b;padding:2px 8px;border-radius:4px;border:1px solid #334155;color:#94a3b8;">P</kbd> 或 <kbd style="background:#1e293b;padding:2px 8px;border-radius:4px;border:1px solid #334155;color:#94a3b8;">空格</kbd> 继续</div>
        </div>
    </div>

    <!-- 底部 -->
    <div class="game-footer">
        <div class="hints">
            <span class="hint-tag"><kbd>↑</kbd><kbd>↓</kbd><kbd>←</kbd><kbd>→</kbd> 移动</span>
            <span class="hint-tag"><kbd>P</kbd> 暂停</span>
            <span class="hint-tag"><kbd>空格</kbd> 重新开始</span>
        </div>
        <div class="speed-selector">
            <span>⚡</span>
            <select id="speedSelect">
                <option value="180">慢速</option>
                <option value="130" selected>正常</option>
                <option value="85">快速</option>
                <option value="50">极速</option>
            </select>
        </div>
    </div>
</div>

<script>
(function() {
    'use strict';

    // ============= 配置 =============
    const GRID_SIZE   = 20;       // 20x20 网格
    const CELL_SIZE   = 600 / GRID_SIZE; // 30px

    // ============= DOM =============
    const canvas      = document.getElementById('gameCanvas');
    const ctx         = canvas.getContext('2d');
    const scoreEl     = document.getElementById('scoreDisplay');
    const bestEl      = document.getElementById('bestDisplay');
    const levelEl     = document.getElementById('levelDisplay');
    const finalScore  = document.getElementById('finalScoreDisplay');
    const finalBest   = document.getElementById('finalBestDisplay');
    const startO      = document.getElementById('startOverlay');
    const gameOverO   = document.getElementById('gameOverOverlay');
    const pauseO      = document.getElementById('pauseOverlay');
    const startBtn    = document.getElementById('startBtn');
    const restartBtn  = document.getElementById('restartBtn');
    const speedSelect = document.getElementById('speedSelect');

    // ============= 状态 =============
    let snake     = [];        // 坐标数组 [{x,y}]
    let food      = { x: 8, y: 10 };
    let direction = 'right';   // 当前方向
    let nextDir   = 'right';   // 缓冲方向
    let score     = 0;
    let best      = parseInt(localStorage.getItem('snakeBest')) || 0;
    let level     = 1;
    let speed     = 130;       // ms
    let running   = false;
    let paused    = false;
    let gameLoop  = null;
    let isGameOver = false;

    // 防止连续转向
    let dirLocked = false;

    bestEl.textContent = best;

    // ============= 工具函数 =============
    function randomFood() {
        const occupied = new Set(snake.map(s => `${s.x},${s.y}`));
        let free = [];
        for (let x = 0; x < GRID_SIZE; x++) {
            for (let y = 0; y < GRID_SIZE; y++) {
                if (!occupied.has(`${x},${y}`)) free.push({x, y});
            }
        }
        if (free.length === 0) return null; // 胜利！
        return free[Math.floor(Math.random() * free.length)];
    }

    function resetGame() {
        // 初始蛇：3节，向右
        snake = [
            { x: 9, y: 10 },
            { x: 8, y: 10 },
            { x: 7, y: 10 }
        ];
        direction = 'right';
        nextDir   = 'right';
        score     = 0;
        level     = 1;
        speed     = parseInt(speedSelect.value);
        isGameOver = false;
        paused    = false;
        dirLocked = false;
        scoreEl.textContent = '0';
        levelEl.textContent = '1';
        speedSelect.disabled = false;

        const newFood = randomFood();
        if (newFood) food = newFood;

        showOverlay('none');
        draw();
    }

    // ============= 覆盖层控制 =============
    function showOverlay(type) {
        startO.classList.toggle('active',   type === 'start');
        gameOverO.classList.toggle('active', type === 'gameover');
        pauseO.classList.toggle('active',   type === 'pause');
    }

    // ============= 绘制 =============
    function draw() {
        ctx.clearRect(0, 0, 600, 600);

        // ---- 网格 ----
        ctx.strokeStyle = 'rgba(74, 222, 128, 0.04)';
        ctx.lineWidth = 0.5;
        for (let i = 0; i <= GRID_SIZE; i++) {
            ctx.beginPath();
            ctx.moveTo(i * CELL_SIZE, 0);
            ctx.lineTo(i * CELL_SIZE, 600);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(0, i * CELL_SIZE);
            ctx.lineTo(600, i * CELL_SIZE);
            ctx.stroke();
        }

        // ---- 食物 ----
        // 发光效果
        const fx = food.x * CELL_SIZE + CELL_SIZE/2;
        const fy = food.y * CELL_SIZE + CELL_SIZE/2;
        const foodGrad = ctx.createRadialGradient(fx, fy, 2, fx, fy, CELL_SIZE);
        foodGrad.addColorStop(0, 'rgba(239, 68, 68, 0.4)');
        foodGrad.addColorStop(1, 'rgba(239, 68, 68, 0)');
        ctx.fillStyle = foodGrad;
        ctx.fillRect(food.x * CELL_SIZE - CELL_SIZE/2, food.y * CELL_SIZE - CELL_SIZE/2, CELL_SIZE, CELL_SIZE);

        // 食物本体（苹果形）
        ctx.shadowColor = '#ef4444';
        ctx.shadowBlur = 12;
        ctx.beginPath();
        ctx.arc(fx, fy, CELL_SIZE/2 - 3, 0, Math.PI * 2);
        ctx.fillStyle = '#ef4444';
        ctx.fill();
        // 高光
        ctx.shadowBlur = 0;
        ctx.beginPath();
        ctx.arc(fx - 4, fy - 4, 4, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.fill();

        // ---- 蛇 ----
        for (let i = 0; i < snake.length; i++) {
            const seg = snake[i];
            const sx = seg.x * CELL_SIZE;
            const sy = seg.y * CELL_SIZE;
            const isHead = i === 0;
            const size = CELL_SIZE - 2;

            // 身体渐变
            const ratio = 1 - (i / snake.length) * 0.5;
            const r = Math.round(74 * ratio);
            const g = Math.round(222 * ratio);
            const b = Math.round(128 * ratio);

            if (isHead) {
                // 蛇头 - 圆角矩形 + 眼睛
                ctx.shadowColor = '#4ade80';
                ctx.shadowBlur = 15;
                const radius = 6;
                ctx.beginPath();
                ctx.moveTo(sx + radius + 1, sy + 1);
                ctx.lineTo(sx + CELL_SIZE - radius - 1, sy + 1);
                ctx.quadraticCurveTo(sx + CELL_SIZE - 1, sy + 1, sx + CELL_SIZE - 1, sy + radius + 1);
                ctx.lineTo(sx + CELL_SIZE - 1, sy + CELL_SIZE - radius - 1);
                ctx.quadraticCurveTo(sx + CELL_SIZE - 1, sy + CELL_SIZE - 1, sx + CELL_SIZE - radius - 1, sy + CELL_SIZE - 1);
                ctx.lineTo(sx + radius + 1, sy + CELL_SIZE - 1);
                ctx.quadraticCurveTo(sx + 1, sy + CELL_SIZE - 1, sx + 1, sy + CELL_SIZE - radius - 1);
                ctx.lineTo(sx + 1, sy + radius + 1);
                ctx.quadraticCurveTo(sx + 1, sy + 1, sx + radius + 1, sy + 1);
                ctx.closePath();
                ctx.fillStyle = '#22c55e';
                ctx.fill();
                ctx.shadowBlur = 0;

                // 眼睛
                ctx.fillStyle = '#fff';
                let eye1x = sx + 8, eye1y = sy + 8;
                let eye2x = sx + 20, eye2y = sy + 8;
                if (direction === 'down')  { eye1x = sx+8;  eye1y = sy+20; eye2x = sx+20; eye2y = sy+20; }
                if (direction === 'left')  { eye1x = sx+8;  eye1y = sy+8;  eye2x = sx+8;  eye2y = sy+20; }
                if (direction === 'up')    { eye1x = sx+8;  eye1y = sy+8;  eye2x = sx+20; eye2y = sy+8; }
                ctx.beginPath();
                ctx.arc(eye1x, eye1y, 4, 0, Math.PI*2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(eye2x, eye2y, 4, 0, Math.PI*2);
                ctx.fill();
                // 瞳孔
                ctx.fillStyle = '#0a0a1a';
                ctx.beginPath();
                ctx.arc(eye1x + (direction==='right'?1.5: direction==='left'?-1.5:0), eye1y + (direction==='down'?1.5: direction==='up'?-1.5:0), 2, 0, Math.PI*2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(eye2x + (direction==='right'?1.5: direction==='left'?-1.5:0), eye2y + (direction==='down'?1.5: direction==='up'?-1.5:0), 2, 0, Math.PI*2);
                ctx.fill();
            } else {
                // 身体 - 圆角
                ctx.shadowColor = 'rgba(74, 222, 128, 0.2)';
                ctx.shadowBlur = 6;
                const radius2 = 5;
                ctx.beginPath();
                ctx.moveTo(sx + radius2 + 1, sy + 1);
                ctx.lineTo(sx + CELL_SIZE - radius2 - 1, sy + 1);
                ctx.quadraticCurveTo(sx + CELL_SIZE - 1, sy + 1, sx + CELL_SIZE - 1, sy + radius2 + 1);
                ctx.lineTo(sx + CELL_SIZE - 1, sy + CELL_SIZE - radius2 - 1);
                ctx.quadraticCurveTo(sx + CELL_SIZE - 1, sy + CELL_SIZE - 1, sx + CELL_SIZE - radius2 - 1, sy + CELL_SIZE - 1);
                ctx.lineTo(sx + radius2 + 1, sy + CELL_SIZE - 1);
                ctx.quadraticCurveTo(sx + 1, sy + CELL_SIZE - 1, sx + 1, sy + CELL_SIZE - radius2 - 1);
                ctx.lineTo(sx + 1, sy + radius2 + 1);
                ctx.quadraticCurveTo(sx + 1, sy + 1, sx + radius2 + 1, sy + 1);
                ctx.closePath();
                ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        // ---- 边框装饰 ----
        ctx.strokeStyle = 'rgba(74, 222, 128, 0.06)';
        ctx.lineWidth = 1;
        ctx.strokeRect(0, 0, 600, 600);
    }

    // ============= 游戏循环 =============
    function step() {
        if (!running || paused || isGameOver) {
            dirLocked = false;
            return;
        }

        // 应用缓冲方向
        const opposites = {
            'up': 'down', 'down': 'up', 'left': 'right', 'right': 'left'
        };
        if (nextDir && opposites[nextDir] !== direction) {
            direction = nextDir;
        }
        dirLocked = false;

        // 计算新蛇头
        const head = snake[0];
        let newHead = { ...head };
        switch (direction) {
            case 'right': newHead.x++; break;
            case 'left':  newHead.x--; break;
            case 'up':    newHead.y--; break;
            case 'down':  newHead.y++; break;
        }

        // 撞墙检测
        if (newHead.x < 0 || newHead.x >= GRID_SIZE || newHead.y < 0 || newHead.y >= GRID_SIZE) {
            gameOver();
            return;
        }

        // 撞自己检测（除尾巴外——尾巴即将移除）
        for (let i = 0; i < snake.length - 1; i++) {
            if (snake[i].x === newHead.x && snake[i].y === newHead.y) {
                gameOver();
                return;
            }
        }

        // 移动蛇
        snake.unshift(newHead);
        let ate = false;

        // 吃食物？
        if (newHead.x === food.x && newHead.y === food.y) {
            ate = true;
            score++;
            scoreEl.textContent = score;

            // 等级提升（每5分升一级）
            const newLevel = Math.floor(score / 5) + 1;
            if (newLevel > level) {
                level = newLevel;
                levelEl.textContent = level;
                // 加快速度
                const baseSpeed = parseInt(speedSelect.value);
                speed = Math.max(40, baseSpeed - (level - 1) * 8);
            }

            // 更新最高分
            if (score > best) {
                best = score;
                localStorage.setItem('snakeBest', best);
                bestEl.textContent = best;
            }

            // 生成新食物
            const newFood = randomFood();
            if (!newFood) {
                // 赢了！
                running = false;
                showOverlay('gameover');
                finalScore.textContent = `🎉 你赢了！得分：${score}`;
                finalBest.textContent  = `🏆 最高记录：${best}`;
                document.getElementById('gameOverOverlay').querySelector('.overlay-title').textContent = '🏆 胜利！';
                document.getElementById('gameOverOverlay').querySelector('.overlay-title').style.color = '#4ade80';
                return;
            }
            food = newFood;
        }

        if (!ate) {
            snake.pop(); // 没吃到就删尾巴
        }

        draw();

        // 调度下一步
        gameLoop = setTimeout(step, speed);
    }

    function startGame() {
        if (running) return;
        resetGame();
        running = true;
        showOverlay('none');
        speedSelect.disabled = true;
        step();
    }

    function gameOver() {
        running = false;
        isGameOver = true;
        if (gameLoop) { clearTimeout(gameLoop); gameLoop = null; }

        // 更新最高分
        if (score > best) {
            best = score;
            localStorage.setItem('snakeBest', best);
            bestEl.textContent = best;
        }

        finalScore.textContent = `🍎 得分：${score}`;
        finalBest.textContent  = `🏆 最高记录：${best}`;
        document.getElementById('gameOverOverlay').querySelector('.overlay-title').textContent = '💀 游戏结束';
        document.getElementById('gameOverOverlay').querySelector('.overlay-title').style.color = '#ef4444';
        showOverlay('gameover');
        draw();
    }

    function togglePause() {
        if (!running || isGameOver) return;
        paused = !paused;
        if (paused) {
            showOverlay('pause');
        } else {
            showOverlay('none');
            step();
        }
    }

    function restartGame() {
        if (gameLoop) { clearTimeout(gameLoop); gameLoop = null; }
        running = false;
        startGame();
    }

    // ============= 键盘事件 =============
    document.addEventListener('keydown', (e) => {
        const key = e.key;

        // 方向键
        const dirMap = {
            'ArrowUp': 'up', 'ArrowDown': 'down', 'ArrowLeft': 'left', 'ArrowRight': 'right',
            'w': 'up', 'W': 'up', 's': 'down', 'S': 'down',
            'a': 'left', 'A': 'left', 'd': 'right', 'D': 'right'
        };

        if (key in dirMap) {
            e.preventDefault();
            if (!running && !isGameOver) return;
            if (paused) return;
            const newDir = dirMap[key];
            const opposites = { 'up':'down','down':'up','left':'right','right':'left' };
            // 不能180度掉头
            if (newDir !== opposites[direction] && !dirLocked) {
                nextDir = newDir;
                dirLocked = true;
            }
        }

        // 暂停 P
        if (key === 'p' || key === 'P') {
            e.preventDefault();
            togglePause();
        }

        // 空格：开始/继续/重开
        if (key === ' ' || key === 'Spacebar') {
            e.preventDefault();
            if (isGameOver) {
                restartGame();
            } else if (paused) {
                togglePause();
            } else if (!running) {
                startGame();
            }
        }

        // Enter 开始
        if (key === 'Enter') {
            if (!running && !isGameOver) {
                e.preventDefault();
                startGame();
            }
        }
    });

    // ============= 按钮事件 =============
    startBtn.addEventListener('click', startGame);
    restartBtn.addEventListener('click', restartGame);

    // 速度切换
    speedSelect.addEventListener('change', () => {
        if (!running) {
            speed = parseInt(speedSelect.value);
        }
    });

    // ============= 初始绘制 =============
    resetGame();
    showOverlay('start');
    draw();

})();
</script>
</body>
</html>
