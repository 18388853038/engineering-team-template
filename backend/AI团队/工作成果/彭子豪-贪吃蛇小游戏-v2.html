<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐍 贪吃蛇小游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            overflow: hidden;
        }

        /* 背景动态粒子效果 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(2px 2px at 20% 30%, rgba(0, 255, 136, 0.15), transparent),
                radial-gradient(2px 2px at 40% 70%, rgba(0, 200, 255, 0.1), transparent),
                radial-gradient(2px 2px at 60% 40%, rgba(255, 200, 0, 0.1), transparent),
                radial-gradient(2px 2px at 80% 10%, rgba(0, 255, 136, 0.12), transparent),
                radial-gradient(2px 2px at 10% 80%, rgba(0, 200, 255, 0.08), transparent);
            pointer-events: none;
            z-index: 0;
        }

        .game-container {
            position: relative;
            z-index: 1;
            background: linear-gradient(145deg, #111122, #0d0d1a);
            border-radius: 24px;
            padding: 30px 35px 35px 35px;
            box-shadow: 
                0 0 60px rgba(0, 255, 136, 0.06),
                0 20px 60px rgba(0, 0, 0, 0.6),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
            padding: 0 4px;
        }

        .game-title {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .game-title h1 {
            font-size: 22px;
            font-weight: 700;
            color: #00ff88;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
            letter-spacing: 1px;
        }

        .game-title .snake-icon {
            font-size: 26px;
            animation: snakeBounce 2s ease-in-out infinite;
        }

        @keyframes snakeBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }

        .score-board {
            display: flex;
            align-items: center;
            gap: 24px;
            background: rgba(255, 255, 255, 0.03);
            padding: 8px 18px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .score-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .score-item .label {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.4);
            font-weight: 500;
        }

        .score-item .value {
            font-size: 20px;
            font-weight: 700;
            color: #ffffff;
            min-width: 30px;
            text-align: center;
        }

        .score-item .value.high-score {
            color: #ffd700;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
        }

        .canvas-wrapper {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 
                inset 0 0 30px rgba(0, 0, 0, 0.5),
                0 0 40px rgba(0, 255, 136, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        #gameCanvas {
            display: block;
            background: #0f0f23;
            width: 500px;
            height: 500px;
        }

        /* 网格线 - 通过canvas绘制，这里保持干净 */

        .game-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 16px;
            border-radius: 12px;
            z-index: 10;
        }

        .game-overlay.active {
            display: flex;
        }

        .game-overlay .overlay-title {
            font-size: 38px;
            font-weight: 800;
            color: #ff4757;
            text-shadow: 0 0 30px rgba(255, 71, 87, 0.3);
        }

        .game-overlay .overlay-score {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 4px;
        }

        .game-overlay .overlay-score span {
            color: #00ff88;
            font-weight: 700;
            font-size: 24px;
        }

        .game-overlay .overlay-best {
            font-size: 15px;
            color: rgba(255, 215, 0, 0.7);
            margin-bottom: 8px;
        }

        .game-overlay .overlay-best span {
            color: #ffd700;
            font-weight: 700;
        }

        .btn-restart {
            padding: 12px 40px;
            font-size: 17px;
            font-weight: 600;
            color: #ffffff;
            background: linear-gradient(135deg, #00ff88, #00cc6a);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(0, 255, 136, 0.25);
            letter-spacing: 0.5px;
        }

        .btn-restart:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(0, 255, 136, 0.35);
        }

        .btn-restart:active {
            transform: translateY(0);
        }

        .game-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 16px;
            padding: 0 4px;
        }

        .game-footer .hint {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.25);
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .game-footer .hint kbd {
            background: rgba(255, 255, 255, 0.08);
            padding: 2px 10px;
            border-radius: 4px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.08);
            font-family: inherit;
        }

        .game-footer .speed-control {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .game-footer .speed-control .label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.3);
        }

        .speed-btn {
            padding: 4px 14px;
            font-size: 12px;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.5);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .speed-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.8);
        }

        .speed-btn.active {
            background: rgba(0, 255, 136, 0.15);
            border-color: rgba(0, 255, 136, 0.3);
            color: #00ff88;
        }

        /* 移动端触摸控制 */
        .touch-controls {
            display: none;
            grid-template-columns: 50px 50px 50px;
            grid-template-rows: 50px 50px 50px;
            gap: 4px;
            margin-top: 16px;
            justify-content: center;
        }

        .touch-btn {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
            transition: background 0.15s;
        }

        .touch-btn:active {
            background: rgba(0, 255, 136, 0.15);
        }

        .touch-btn.up    { grid-column: 2; grid-row: 1; }
        .touch-btn.left  { grid-column: 1; grid-row: 2; }
        .touch-btn.right { grid-column: 3; grid-row: 2; }
        .touch-btn.down  { grid-column: 2; grid-row: 3; }

        @media (max-width: 560px) {
            .game-container {
                padding: 16px;
                border-radius: 16px;
            }
            #gameCanvas {
                width: 100%;
                height: auto;
                aspect-ratio: 1;
            }
            .game-title h1 {
                font-size: 17px;
            }
            .score-board {
                gap: 12px;
                padding: 5px 12px;
            }
            .score-item .value {
                font-size: 16px;
                min-width: 20px;
            }
            .game-footer .hint {
                font-size: 11px;
            }
            .touch-controls {
                display: grid;
            }
            .game-overlay .overlay-title {
                font-size: 28px;
            }
            .btn-restart {
                padding: 10px 30px;
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- 头部 -->
        <div class="game-header">
            <div class="game-title">
                <span class="snake-icon">🐍</span>
                <h1>贪吃蛇</h1>
            </div>
            <div class="score-board">
                <div class="score-item">
                    <span class="label">分数</span>
                    <span class="value" id="scoreDisplay">0</span>
                </div>
                <div class="score-item">
                    <span class="label">最高</span>
                    <span class="value high-score" id="highScoreDisplay">0</span>
                </div>
            </div>
        </div>

        <!-- Canvas -->
        <div class="canvas-wrapper">
            <canvas id="gameCanvas" width="500" height="500"></canvas>
            <!-- 游戏结束遮罩 -->
            <div class="game-overlay" id="gameOverlay">
                <div class="overlay-title">💀 游戏结束</div>
                <div class="overlay-score">得分：<span id="finalScore">0</span></div>
                <div class="overlay-best">🏆 最高纪录：<span id="finalBest">0</span></div>
                <button class="btn-restart" id="restartBtn">🔄 重新开始</button>
            </div>
        </div>

        <!-- 底部 -->
        <div class="game-footer">
            <div class="hint">
                <span>方向键 <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> 控制</span>
                <span>空格键 暂停/继续</span>
            </div>
            <div class="speed-control">
                <span class="label">速度</span>
                <button class="speed-btn" data-speed="150">快</button>
                <button class="speed-btn active" data-speed="200">中</button>
                <button class="speed-btn" data-speed="300">慢</button>
            </div>
        </div>

        <!-- 触摸方向键（移动端） -->
        <div class="touch-controls" id="touchControls">
            <button class="touch-btn up" data-dir="up">↑</button>
            <button class="touch-btn left" data-dir="left">←</button>
            <button class="touch-btn right" data-dir="right">→</button>
            <button class="touch-btn down" data-dir="down">↓</button>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // ========== DOM 引用 ==========
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const scoreDisplay = document.getElementById('scoreDisplay');
            const highScoreDisplay = document.getElementById('highScoreDisplay');
            const finalScore = document.getElementById('finalScore');
            const finalBest = document.getElementById('finalBest');
            const overlay = document.getElementById('gameOverlay');
            const restartBtn = document.getElementById('restartBtn');
            const speedBtns = document.querySelectorAll('.speed-btn');
            const touchBtns = document.querySelectorAll('.touch-btn');

            // ========== 游戏配置 ==========
            const GRID_SIZE = 20;          // 20x20 网格
            const CELL_SIZE = canvas.width / GRID_SIZE;
            const TICK_BASE = 200;          // 基础速度(ms)

            // ========== 游戏状态 ==========
            let snake = [];                 // 蛇身坐标数组 [x,y]
            let food = { x: 0, y: 0 };      // 食物坐标
            let direction = 'right';        // 当前移动方向
            let nextDirection = 'right';    // 下次移动方向（防一帧内多次转向）
            let score = 0;
            let highScore = parseInt(localStorage.getItem('snakeHighScore')) || 0;
            let gameRunning = false;
            let gamePaused = false;
            let gameOver = false;
            let gameLoopId = null;
            let currentSpeed = 200;         // 当前速度(ms)
            let isFirstRun = true;

            // 防止在单帧内连续转向
            let directionChangedThisTick = false;

            // ========== 初始化 ==========
            highScoreDisplay.textContent = highScore;

            // ========== 核心游戏函数 ==========

            // 生成新食物（避开蛇身）
            function generateFood() {
                const totalCells = GRID_SIZE * GRID_SIZE;
                if (snake.length >= totalCells) {
                    // 蛇占满网格 → 胜利！
                    return null;
                }

                const snakeSet = new Set(snake.map(seg => `${seg.x},${seg.y}`));
                const freeCells = [];
                for (let i = 0; i < GRID_SIZE; i++) {
                    for (let j = 0; j < GRID_SIZE; j++) {
                        if (!snakeSet.has(`${i},${j}`)) {
                            freeCells.push({ x: i, y: j });
                        }
                    }
                }
                if (freeCells.length === 0) return null;
                const idx = Math.floor(Math.random() * freeCells.length);
                return freeCells[idx];
            }

            // 重置游戏
            function resetGame() {
                // 停止旧循环
                if (gameLoopId) {
                    clearTimeout(gameLoopId);
                    gameLoopId = null;
                }

                // 初始化蛇: 长度3, 水平放置
                snake = [
                    { x: 10, y: 10 },
                    { x: 9, y: 10 },
                    { x: 8, y: 10 }
                ];
                direction = 'right';
                nextDirection = 'right';
                score = 0;
                gameOver = false;
                gamePaused = false;
                gameRunning = true;
                directionChangedThisTick = false;

                scoreDisplay.textContent = '0';

                // 生成食物
                const newFood = generateFood();
                if (newFood) {
                    food = newFood;
                }

                overlay.classList.remove('active');
                draw();
            }

            // 游戏结束
            function handleGameOver() {
                gameRunning = false;
                gameOver = true;
                if (gameLoopId) {
                    clearTimeout(gameLoopId);
                    gameLoopId = null;
                }

                // 更新最高分
                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('snakeHighScore', highScore);
                    highScoreDisplay.textContent = highScore;
                }

                // 显示结算界面
                finalScore.textContent = score;
                finalBest.textContent = highScore;
                overlay.classList.add('active');
                draw();
            }

            // 游戏胜利（蛇占满网格）
            function handleWin() {
                gameRunning = false;
                gameOver = true;
                if (gameLoopId) {
                    clearTimeout(gameLoopId);
                    gameLoopId = null;
                }
                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('snakeHighScore', highScore);
                    highScoreDisplay.textContent = highScore;
                }
                finalScore.textContent = score + ' 🎉 完美通关！';
                finalBest.textContent = highScore;
                overlay.classList.add('active');
                draw();
            }

            // 移动蛇
            function moveSnake() {
                if (!gameRunning || gamePaused || gameOver) return false;

                // 应用方向
                direction = nextDirection;
                directionChangedThisTick = false;

                // 计算新蛇头位置
                const head = snake[0];
                let newHead = { ...head };
                switch (direction) {
                    case 'up':    newHead.y -= 1; break;
                    case 'down':  newHead.y += 1; break;
                    case 'left':  newHead.x -= 1; break;
                    case 'right': newHead.x += 1; break;
                    default: return false;
                }

                // 检测是否吃到食物
                const ateFood = (newHead.x === food.x && newHead.y === food.y);

                // 构建新蛇
                let newSnake = [newHead, ...snake];
                if (!ateFood) {
                    newSnake.pop();  // 没吃到食物，移除尾部
                }

                // 碰撞检测
                const headPos = newSnake[0];
                // 撞墙
                if (headPos.x < 0 || headPos.x >= GRID_SIZE || headPos.y < 0 || headPos.y >= GRID_SIZE) {
                    handleGameOver();
                    return false;
                }
                // 撞自己（从索引1开始检查）
                for (let i = 1; i < newSnake.length; i++) {
                    if (newSnake[i].x === headPos.x && newSnake[i].y === headPos.y) {
                        handleGameOver();
                        return false;
                    }
                }

                // 更新蛇
                snake = newSnake;

                // 如果吃到食物
                if (ateFood) {
                    score += 10;
                    scoreDisplay.textContent = score;
                    const newFood = generateFood();
                    if (newFood === null) {
                        // 蛇占满网格 → 胜利
                        handleWin();
                        return false;
                    }
                    food = newFood;
                }

                return true;
            }

            // ========== 绘制 ==========
            function draw() {
                const w = canvas.width;
                const h = canvas.height;

                // --- 背景 ---
                ctx.fillStyle = '#0f0f23';
                ctx.fillRect(0, 0, w, h);

                // --- 网格线（暗色） ---
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
                ctx.lineWidth = 1;
                for (let i = 0; i <= GRID_SIZE; i++) {
                    const pos = i * CELL_SIZE;
                    ctx.beginPath();
                    ctx.moveTo(pos, 0);
                    ctx.lineTo(pos, h);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(0, pos);
                    ctx.lineTo(w, pos);
                    ctx.stroke();
                }

                // --- 食物 ---
                if (food) {
                    const fx = food.x * CELL_SIZE;
                    const fy = food.y * CELL_SIZE;
                    const padding = 2;

                    // 外发光
                    const glow = ctx.createRadialGradient(
                        fx + CELL_SIZE/2, fy + CELL_SIZE/2, 0,
                        fx + CELL_SIZE/2, fy + CELL_SIZE/2, CELL_SIZE
                    );
                    glow.addColorStop(0, 'rgba(255, 50, 50, 0.3)');
                    glow.addColorStop(1, 'rgba(255, 50, 50, 0)');
                    ctx.fillStyle = glow;
                    ctx.fillRect(fx - CELL_SIZE/2, fy - CELL_SIZE/2, CELL_SIZE*2, CELL_SIZE*2);

                    // 食物本体（圆形）
                    const cx = fx + CELL_SIZE / 2;
                    const cy = fy + CELL_SIZE / 2;
                    const radius = CELL_SIZE / 2 - padding;

                    ctx.shadowColor = 'rgba(255, 50, 50, 0.5)';
                    ctx.shadowBlur = 12;

                    // 渐变填充
                    const grad = ctx.createRadialGradient(cx - 2, cy - 2, 0, cx, cy, radius);
                    grad.addColorStop(0, '#ff6b6b');
                    grad.addColorStop(0.6, '#ff3333');
                    grad.addColorStop(1, '#cc0000');
                    ctx.fillStyle = grad;
                    ctx.beginPath();
                    ctx.arc(cx, cy, radius, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.shadowBlur = 0;

                    // 高光
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.25)';
                    ctx.beginPath();
                    ctx.arc(cx - 3, cy - 3, radius * 0.3, 0, Math.PI * 2);
                    ctx.fill();
                }

                // --- 蛇 ---
                for (let i = 0; i < snake.length; i++) {
                    const seg = snake[i];
                    const sx = seg.x * CELL_SIZE;
                    const sy = seg.y * CELL_SIZE;
                    const padding = 1;

                    // 蛇身颜色渐变：头部亮绿 → 尾部深绿
                    const t = i / Math.max(snake.length - 1, 1);
                    const r = Math.round(0 + t * 0);
                    const g = Math.round(255 - t * 120);
                    const b = Math.round(136 - t * 80);
                    const a = 1 - t * 0.2;

                    if (i === 0) {
                        // 蛇头 - 带发光
                        ctx.shadowColor = 'rgba(0, 255, 136, 0.3)';
                        ctx.shadowBlur = 15;
                        const grad = ctx.createRadialGradient(
                            sx + CELL_SIZE/2, sy + CELL_SIZE/2, 0,
                            sx + CELL_SIZE/2, sy + CELL_SIZE/2, CELL_SIZE/2
                        );
                        grad.addColorStop(0, '#66ffaa');
                        grad.addColorStop(1, '#00ff88');
                        ctx.fillStyle = grad;
                    } else if (i === 1) {
                        ctx.shadowBlur = 0;
                        ctx.fillStyle = `rgba(0, ${g + 20}, ${b + 20}, ${a})`;
                    } else {
                        ctx.shadowBlur = 0;
                        ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${a})`;
                    }

                    // 圆角矩形
                    const radius = i === 0 ? 6 : 4;
                    const x = sx + padding;
                    const y = sy + padding;
                    const cw = CELL_SIZE - padding * 2;
                    const ch = CELL_SIZE - padding * 2;

                    ctx.beginPath();
                    ctx.moveTo(x + radius, y);
                    ctx.lineTo(x + cw - radius, y);
                    ctx.quadraticCurveTo(x + cw, y, x + cw, y + radius);
                    ctx.lineTo(x + cw, y + ch - radius);
                    ctx.quadraticCurveTo(x + cw, y + ch, x + cw - radius, y + ch);
                    ctx.lineTo(x + radius, y + ch);
                    ctx.quadraticCurveTo(x, y + ch, x, y + ch - radius);
                    ctx.lineTo(x, y + radius);
                    ctx.quadraticCurveTo(x, y, x + radius, y);
                    ctx.closePath();
                    ctx.fill();

                    ctx.shadowBlur = 0;

                    // 蛇头 - 眼睛
                    if (i === 0) {
                        const eyeSize = 3;
                        let ex1, ey1, ex2, ey2;
                        switch (direction) {
                            case 'up':
                                ex1 = sx + 6; ey1 = sy + 5;
                                ex2 = sx + 13; ey2 = sy + 5;
                                break;
                            case 'down':
                                ex1 = sx + 6; ey1 = sy + 14;
                                ex2 = sx + 13; ey2 = sy + 14;
                                break;
                            case 'left':
                                ex1 = sx + 5; ey1 = sy + 6;
                                ex2 = sx + 5; ey2 = sy + 13;
                                break;
                            case 'right':
                                ex1 = sx + 14; ey1 = sy + 6;
                                ex2 = sx + 14; ey2 = sy + 13;
                                break;
                            default:
                                ex1 = sx + 14; ey1 = sy + 6;
                                ex2 = sx + 14; ey2 = sy + 13;
                        }
                        // 白底
                        ctx.fillStyle = 'white';
                        ctx.beginPath();
                        ctx.arc(ex1, ey1, eyeSize, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(ex2, ey2, eyeSize, 0, Math.PI * 2);
                        ctx.fill();
                        // 瞳孔
                        ctx.fillStyle = '#111';
                        ctx.beginPath();
                        ctx.arc(ex1, ey1, 1.5, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(ex2, ey2, 1.5, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }

                // --- 暂停提示 ---
                if (gamePaused && gameRunning) {
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                    ctx.fillRect(0, 0, w, h);
                    ctx.fillStyle = '#ffffff';
                    ctx.font = 'bold 32px "Segoe UI", sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('⏸ 已暂停', w/2, h/2);
                    ctx.font = '16px "Segoe UI", sans-serif';
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                    ctx.fillText('按空格键继续', w/2, h/2 + 40);
                }

                // --- 提示"按空格开始"（首次） ---
                if (isFirstRun && !gameOver) {
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
                    ctx.fillRect(0, 0, w, h);
                    ctx.fillStyle = '#ffffff';
                    ctx.font = 'bold 24px "Segoe UI", sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('🐍 按 空格键 开始游戏', w/2, h/2);
                    ctx.font = '15px "Segoe UI", sans-serif';
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.35)';
                    ctx.fillText('方向键 ↑ ↓ ← → 控制移动', w/2, h/2 + 40);
                }
            }

            // ========== 游戏主循环 ==========
            function gameTick() {
                if (!gameRunning || gameOver) {
                    return;
                }

                if (!gamePaused) {
                    moveSnake();
                    draw();
                }

                gameLoopId = setTimeout(gameTick, currentSpeed);
            }

            // ========== 开始游戏 ==========
            function startGame() {
                if (gameLoopId) {
                    clearTimeout(gameLoopId);
                    gameLoopId = null;
                }
                resetGame();
                isFirstRun = false;
                gameRunning = true;
                gameTick();
                draw();
            }

            // ========== 键盘事件 ==========
            function handleKeydown(e) {
                const key = e.key;
                const isGameOverActive = overlay.classList.contains('active');

                // 空格：开始 / 重开 / 暂停切换
                if (key === ' ' || key === 'Spacebar') {
                    e.preventDefault();
                    if (isFirstRun) {
                        startGame();
                        return;
                    }
                    if (isGameOverActive) {
                        startGame();
                        return;
                    }
                    if (gameRunning) {
                        gamePaused = !gamePaused;
                        draw();
                        if (!gamePaused) {
                            // 如果取消暂停，确保循环在跑
                            if (!gameLoopId) {
                                gameTick();
                            }
                        }
                        return;
                    }
                }

                // 方向键
                const dirMap = {
                    'ArrowUp': 'up',
                    'ArrowDown': 'down',
                    'ArrowLeft': 'left',
                    'ArrowRight': 'right'
                };
                if (key in dirMap) {
                    e.preventDefault();
                    if (!gameRunning || gamePaused || gameOver || isFirstRun) return;

                    const newDir = dirMap[key];
                    // 禁止原地掉头
                    const opposites = { up: 'down', down: 'up', left: 'right', right: 'left' };
                    if (newDir === opposites[direction]) return;
                    // 防在同一帧内多次转向
                    if (directionChangedThisTick) return;
                    nextDirection = newDir;
                    directionChangedThisTick = true;
                }
            }

            // ========== 速度控制 ==========
            speedBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    speedBtns.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    const speed = parseInt(this.dataset.speed);
                    currentSpeed = speed;
                    // 如果游戏正在运行，重启循环以应用新速度
                    if (gameRunning && !gameOver) {
                        if (gameLoopId) {
                            clearTimeout(gameLoopId);
                            gameLoopId = null;
                        }
                        if (!gamePaused) {
                            gameTick();
                        }
                    }
                });
            });

            // ========== 触摸按钮 ==========
            touchBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    if (!gameRunning || gamePaused || gameOver || isFirstRun) return;
                    const newDir = this.dataset.dir;
                    const opposites = { up: 'down', down: 'up', left: 'right', right: 'left' };
                    if (newDir === opposites[direction]) return;
                    if (directionChangedThisTick) return;
                    nextDirection = newDir;
                    directionChangedThisTick = true;
                });
                // 移动端也要阻止默认事件
                btn.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    if (!gameRunning || gamePaused || gameOver || isFirstRun) return;
                    const newDir = btn.dataset.dir;
                    const opposites = { up: 'down', down: 'up', left: 'right', right: 'left' };
                    if (newDir === opposites[direction]) return;
                    if (directionChangedThisTick) return;
                    nextDirection = newDir;
                    directionChangedThisTick = true;
                });
            });

            // ========== 重新开始按钮 ==========
            restartBtn.addEventListener('click', startGame);

            // ========== 注册事件 ==========
            window.addEventListener('keydown', handleKeydown);

            // ========== 初始绘制 ==========
            resetGame();
            isFirstRun = true;
            gameRunning = false;
            draw();

            // ========== 窗口resize适配 ==========
            function handleResize() {
                // 移动端触摸控制显示
                const isMobile = window.innerWidth <= 560;
                const tc = document.getElementById('touchControls');
                if (tc) {
                    tc.style.display = isMobile ? 'grid' : 'none';
                }
            }
            window.addEventListener('resize', handleResize);
            handleResize();

        })();
    </script>
</body>
</html>
