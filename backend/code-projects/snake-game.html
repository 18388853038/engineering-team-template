<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐍 贪吃蛇 — 经典版</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0e17;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; font-family: 'Segoe UI', 'PingFang SC', Roboto, sans-serif;
    overflow: hidden;
  }
  /* 背景动态网格 */
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,255,170,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,170,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none; z-index: 0;
  }

  .game-wrapper {
    position: relative; z-index: 1;
    background: linear-gradient(145deg, #111827, #0f172a);
    border-radius: 24px; padding: 30px;
    box-shadow:
      0 0 40px rgba(0,255,170,0.08),
      inset 0 1px 0 rgba(0,255,170,0.1);
    border: 1px solid rgba(0,255,170,0.12);
  }

  .game-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 20px; padding: 0 4px;
  }
  .game-title {
    font-size: 22px; font-weight: 700;
    background: linear-gradient(135deg, #00ffaa, #00cc88);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: 1px;
  }
  .score-area { display: flex; gap: 24px; }
  .score-item { text-align: center; }
  .score-label {
    font-size: 11px; color: #64748b; text-transform: uppercase;
    letter-spacing: 1px; margin-bottom: 2px;
  }
  .score-value {
    font-size: 22px; font-weight: 700; color: #00ffaa;
    font-variant-numeric: tabular-nums;
  }
  .best-score .score-value { color: #f59e0b; }

  canvas {
    display: block; margin: 0 auto;
    border-radius: 12px;
    background: #0d1520;
    box-shadow: inset 0 0 30px rgba(0,0,0,0.5);
    border: 1px solid rgba(0,255,170,0.08);
    width: 480px; height: 480px;
  }

  .game-footer {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 16px; padding: 0 4px;
  }
  .controls-hint {
    color: #475569; font-size: 13px;
    display: flex; align-items: center; gap: 12px;
  }
  .controls-hint kbd {
    background: #1e293b; color: #94a3b8; padding: 2px 8px;
    border-radius: 4px; font-size: 11px;
    border: 1px solid #334155; font-family: inherit;
  }
  .controls-hint .dot { color: #334155; }

  .btn {
    background: linear-gradient(135deg, #00ffaa, #00cc88);
    border: none; color: #0a0e17; font-weight: 700; font-size: 14px;
    padding: 10px 28px; border-radius: 10px; cursor: pointer;
    transition: all 0.2s; letter-spacing: 0.5px;
    box-shadow: 0 4px 15px rgba(0,255,170,0.2);
  }
  .btn:hover {
    transform: translateY(-2px); box-shadow: 0 6px 25px rgba(0,255,170,0.3);
  }
  .btn:active { transform: translateY(0); }
  .btn-outline {
    background: transparent; color: #00ffaa;
    border: 1px solid rgba(0,255,170,0.3); box-shadow: none;
    padding: 10px 20px;
  }
  .btn-outline:hover {
    background: rgba(0,255,170,0.08); box-shadow: none;
  }

  /* 游戏结束遮罩 */
  .overlay {
    display: none;
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(8px);
    border-radius: 12px;
    justify-content: center; align-items: center;
    flex-direction: column; gap: 16px;
    z-index: 10;
  }
  .overlay.show { display: flex; }
  .overlay-title {
    font-size: 36px; font-weight: 800; color: #fff;
    margin-bottom: 4px;
  }
  .overlay-sub {
    font-size: 16px; color: #94a3b8;
  }
  .overlay-score {
    font-size: 48px; font-weight: 800;
    background: linear-gradient(135deg, #00ffaa, #f59e0b);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin: 8px 0;
  }
  .overlay-best {
    font-size: 14px; color: #f59e0b; margin-bottom: 8px;
  }
  .overlay .btn { font-size: 16px; padding: 12px 36px; margin-top: 8px; }

  /* 移动端触摸按钮 */
  .touch-controls {
    display: none; gap: 6px;
    margin-top: 16px; justify-content: center;
  }
  .touch-btn {
    width: 56px; height: 56px; border-radius: 12px;
    background: rgba(0,255,170,0.08);
    border: 1px solid rgba(0,255,170,0.15);
    color: #00ffaa; font-size: 22px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: 0.15s; user-select: none;
  }
  .touch-btn:active { background: rgba(0,255,170,0.2); transform: scale(0.92); }
  .touch-grid {
    display: grid; gap: 6px;
    grid-template-areas:
      ". up ."
      "left down right";
    grid-template-columns: repeat(3, 56px);
    grid-template-rows: repeat(2, 56px);
  }
  .touch-up    { grid-area: up; }
  .touch-down  { grid-area: down; }
  .touch-left  { grid-area: left; }
  .touch-right { grid-area: right; }

  @media (max-width: 540px) {
    .game-wrapper { padding: 16px; border-radius: 16px; }
    canvas { width: 100%; height: auto; aspect-ratio: 1/1; max-width: 360px; }
    .game-title { font-size: 18px; }
    .score-value { font-size: 18px; }
    .touch-controls { display: flex; }
    .controls-hint { font-size: 11px; }
    .btn { padding: 8px 20px; font-size: 13px; }
  }
</style>
</head>
<body>

<div class="game-wrapper" style="position:relative">
  <!-- 头部 -->
  <div class="game-header">
    <div class="game-title">🐍 贪吃蛇</div>
    <div class="score-area">
      <div class="score-item">
        <div class="score-label">分数</div>
        <div class="score-value" id="scoreDisplay">0</div>
      </div>
      <div class="score-item best-score">
        <div class="score-label">最高</div>
        <div class="score-value" id="bestScoreDisplay">0</div>
      </div>
    </div>
  </div>

  <!-- 画布 + 遮罩层 -->
  <div style="position:relative; display:inline-block; width:100%;">
    <canvas id="gameCanvas" width="480" height="480"></canvas>
    <div class="overlay" id="gameOverOverlay">
      <div class="overlay-title">💀 游戏结束</div>
      <div class="overlay-sub">最终得分</div>
      <div class="overlay-score" id="finalScore">0</div>
      <div class="overlay-best" id="finalBest">🏆 最高记录: 0</div>
      <div style="color:#64748b; font-size:13px;">按 <kbd style="background:#1e293b;color:#94a3b8;padding:2px 8px;border-radius:4px;border:1px solid #334155;font-family:inherit;">空格</kbd> 重新开始</div>
      <button class="btn" id="restartBtn">🔄 再来一局</button>
    </div>
  </div>

  <!-- 底部 -->
  <div class="game-footer">
    <div class="controls-hint">
      <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd>
      <span class="dot">·</span>
      <kbd>空格</kbd> 暂停
    </div>
    <button class="btn btn-outline" id="pauseBtn">⏸️ 暂停</button>
  </div>

  <!-- 移动端触摸按钮 -->
  <div class="touch-controls">
    <div class="touch-grid">
      <button class="touch-btn touch-up" data-dir="up">↑</button>
      <button class="touch-btn touch-left" data-dir="left">←</button>
      <button class="touch-btn touch-down" data-dir="down">↓</button>
      <button class="touch-btn touch-right" data-dir="right">→</button>
    </div>
  </div>
</div>

<script>
(function(){
  // ===== 配置 =====
  const GRID_SIZE = 20;       // 20x20 网格
  const CELL_SIZE = 24;       // 每格 24px
  const TICK_INTERVAL = 150;  // 150ms 一步

  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const scoreDisplay = document.getElementById('scoreDisplay');
  const bestScoreDisplay = document.getElementById('bestScoreDisplay');
  const finalScore = document.getElementById('finalScore');
  const finalBest = document.getElementById('finalBest');
  const overlay = document.getElementById('gameOverOverlay');
  const restartBtn = document.getElementById('restartBtn');
  const pauseBtn = document.getElementById('pauseBtn');

  // ===== 游戏状态 =====
  let snake = [];             // 蛇身坐标 [{x,y},...]
  let food = { x: 6, y: 10 };
  let direction = 'right';    // 当前移动方向
  let nextDirection = 'right';
  let score = 0;
  let bestScore = parseInt(localStorage.getItem('snakeBestScore') || '0');
  let gameRunning = false;
  let gamePaused = false;
  let gameOver = false;
  let timer = null;
  let speedMultiplier = 1;

  // 键盘缓冲：防止快速按键导致反向
  let pendingDirection = null;

  // ===== 初始化 =====
  function init() {
    snake = [
      { x: 10, y: 10 },
      { x: 9, y: 10 },
      { x: 8, y: 10 },
      { x: 7, y: 10 }
    ];
    direction = 'right';
    nextDirection = 'right';
    pendingDirection = null;
    score = 0;
    gameOver = false;
    gamePaused = false;
    speedMultiplier = 1;
    bestScoreDisplay.textContent = bestScore;
    updateScore();
    overlay.classList.remove('show');
    spawnFood();
    draw();
  }

  // ===== 生成食物 =====
  function spawnFood() {
    const occupied = new Set(snake.map(s => `${s.x},${s.y}`));
    const available = [];
    for (let y = 0; y < GRID_SIZE; y++) {
      for (let x = 0; x < GRID_SIZE; x++) {
        if (!occupied.has(`${x},${y}`)) available.push({ x, y });
      }
    }
    if (available.length === 0) return; // 胜利！
    food = available[Math.floor(Math.random() * available.length)];
  }

  // ===== 更新分数 =====
  function updateScore() {
    scoreDisplay.textContent = score;
    if (score > bestScore) {
      bestScore = score;
      localStorage.setItem('snakeBestScore', String(bestScore));
      bestScoreDisplay.textContent = bestScore;
    }
  }

  // ===== 游戏逻辑 =====
  function tick() {
    if (gamePaused || gameOver || !gameRunning) return;

    // 应用缓冲方向
    if (pendingDirection) {
      const isOpposite =
        (direction === 'up' && pendingDirection === 'down') ||
        (direction === 'down' && pendingDirection === 'up') ||
        (direction === 'left' && pendingDirection === 'right') ||
        (direction === 'right' && pendingDirection === 'left');
      if (!isOpposite) {
        nextDirection = pendingDirection;
      }
      pendingDirection = null;
    }

    direction = nextDirection;

    // 计算新蛇头
    const head = snake[0];
    let newHead = { ...head };
    switch (direction) {
      case 'up':    newHead.y--; break;
      case 'down':  newHead.y++; break;
      case 'left':  newHead.x--; break;
      case 'right': newHead.x++; break;
    }

    // 检查是否吃到食物
    const ate = (newHead.x === food.x && newHead.y === food.y);

    // 移动蛇
    snake.unshift(newHead);
    if (!ate) snake.pop();

    // 碰撞检测
    const headCollision = (() => {
      // 撞墙
      if (newHead.x < 0 || newHead.x >= GRID_SIZE || newHead.y < 0 || newHead.y >= GRID_SIZE) return true;
      // 撞自己（从索引1开始检查）
      for (let i = 1; i < snake.length; i++) {
        if (snake[i].x === newHead.x && snake[i].y === newHead.y) return true;
      }
      return false;
    })();

    if (headCollision) {
      endGame();
      return;
    }

    // 吃到食物
    if (ate) {
      score++;
      updateScore();
      spawnFood();
      // 每得5分加快速度
      if (score % 5 === 0) {
        speedMultiplier = Math.min(speedMultiplier + 0.1, 2.0);
        resetTimer();
      }
    }

    draw();
  }

  // ===== 重新设定定时器（加速用） =====
  function resetTimer() {
    if (timer) clearInterval(timer);
    if (gameRunning && !gameOver) {
      const interval = Math.max(60, TICK_INTERVAL / speedMultiplier);
      timer = setInterval(tick, interval);
    }
  }

  // ===== 结束游戏 =====
  function endGame() {
    gameOver = true;
    gameRunning = false;
    if (timer) { clearInterval(timer); timer = null; }
    finalScore.textContent = score;
    finalBest.textContent = `🏆 最高记录: ${bestScore}`;
    overlay.classList.add('show');
    // 最后一帧画上"死亡"高亮
    draw(true);
  }

  // ===== 绘图 =====
  function draw(isDead) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 绘制网格
    ctx.strokeStyle = 'rgba(0,255,170,0.04)';
    ctx.lineWidth = 0.5;
    for (let i = 0; i <= GRID_SIZE; i++) {
      ctx.beginPath();
      ctx.moveTo(i * CELL_SIZE, 0);
      ctx.lineTo(i * CELL_SIZE, canvas.height);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(0, i * CELL_SIZE);
      ctx.lineTo(canvas.width, i * CELL_SIZE);
      ctx.stroke();
    }

    // 绘制食物
    const fx = food.x * CELL_SIZE, fy = food.y * CELL_SIZE;
    const gradient = ctx.createRadialGradient(fx+12, fy+12, 2, fx+12, fy+12, 14);
    gradient.addColorStop(0, '#ff6b6b');
    gradient.addColorStop(0.5, '#ee5a24');
    gradient.addColorStop(1, '#c0392b');
    ctx.shadowColor = '#ff6b6b';
    ctx.shadowBlur = 15;
    ctx.beginPath();
    ctx.arc(fx + CELL_SIZE/2, fy + CELL_SIZE/2, CELL_SIZE/2 - 2, 0, Math.PI*2);
    ctx.fillStyle = gradient;
    ctx.fill();
    // 高光
    ctx.shadowBlur = 0;
    ctx.beginPath();
    ctx.arc(fx + 8, fy + 8, 3, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.fill();
    ctx.shadowBlur = 0;

    // 绘制蛇
    snake.forEach((seg, i) => {
      const sx = seg.x * CELL_SIZE, sy = seg.y * CELL_SIZE;
      const padding = i === 0 ? 1 : 2;
      const radius = 4;

      if (i === 0) {
        // 蛇头
        const grad = ctx.createLinearGradient(sx, sy, sx+CELL_SIZE, sy+CELL_SIZE);
        grad.addColorStop(0, '#00ffaa');
        grad.addColorStop(0.5, '#00e699');
        grad.addColorStop(1, '#00cc88');
        ctx.shadowColor = 'rgba(0,255,170,0.5)';
        ctx.shadowBlur = isDead ? 20 : 12;
        drawRoundRect(ctx, sx + 1, sy + 1, CELL_SIZE - 2, CELL_SIZE - 2, radius, grad);

        // 眼睛
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#fff';
        let ex1, ey1, ex2, ey2;
        const center = CELL_SIZE / 2;
        switch (direction) {
          case 'up':    ex1=sx+7; ey1=sy+7;  ex2=sx+17; ey2=sy+7;  break;
          case 'down':  ex1=sx+7; ey1=sy+17; ex2=sx+17; ey2=sy+17; break;
          case 'left':  ex1=sx+7; ey1=sy+7;  ex2=sx+7;  ey2=sy+17; break;
          case 'right': ex1=sx+17; ey1=sy+7; ex2=sx+17; ey2=sy+17; break;
          default:      ex1=sx+17; ey1=sy+7; ex2=sx+17; ey2=sy+17;
        }
        ctx.beginPath(); ctx.arc(ex1, ey1, 3, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(ex2, ey2, 3, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#0a0e17';
        ctx.beginPath(); ctx.arc(ex1, ey1, 1.5, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(ex2, ey2, 1.5, 0, Math.PI*2); ctx.fill();
      } else {
        // 蛇身
        const alpha = 1 - (i / snake.length) * 0.4;
        ctx.shadowColor = 'rgba(0,255,170,0.2)';
        ctx.shadowBlur = 6;
        drawRoundRect(ctx, sx + padding, sy + padding, CELL_SIZE - padding*2, CELL_SIZE - padding*2, radius,
          `rgba(0,255,170,${alpha})`);
      }
    });
    ctx.shadowBlur = 0;

    // 暂停提示
    if (gamePaused && !gameOver) {
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#00ffaa';
      ctx.font = 'bold 32px "Segoe UI", sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('⏸️ 已暂停', canvas.width/2, canvas.height/2 - 20);
      ctx.fillStyle = '#64748b';
      ctx.font = '16px "Segoe UI", sans-serif';
      ctx.fillText('按空格继续', canvas.width/2, canvas.height/2 + 30);
    }

    // 游戏结束时的额外绘制（蛇变红）
    if (isDead) {
      ctx.fillStyle = 'rgba(255,0,0,0.1)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }
  }

  function drawRoundRect(ctx, x, y, w, h, r, fill) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
    ctx.fillStyle = fill;
    ctx.fill();
  }

  // ===== 控制 =====
  function setDirection(newDir) {
    if (!gameRunning || gameOver) return;
    pendingDirection = newDir;
  }

  function togglePause() {
    if (!gameRunning || gameOver) return;
    gamePaused = !gamePaused;
    pauseBtn.textContent = gamePaused ? '▶️ 继续' : '⏸️ 暂停';
    draw();
  }

  function startGame() {
    if (gameRunning && !gameOver) return;
    init();
    gameRunning = true;
    gamePaused = false;
    pauseBtn.textContent = '⏸️ 暂停';
    overlay.classList.remove('show');
    resetTimer();
    draw();
  }

  // ===== 键盘事件 =====
  document.addEventListener('keydown', (e) => {
    const key = e.key;
    // 阻止方向键滚动和空格翻页
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(key)) {
      e.preventDefault();
    }

    if (key === ' ') {
      if (gameOver) {
        startGame();
      } else if (gameRunning) {
        togglePause();
      }
      return;
    }

    switch (key) {
      case 'ArrowUp':    setDirection('up'); break;
      case 'ArrowDown':  setDirection('down'); break;
      case 'ArrowLeft':  setDirection('left'); break;
      case 'ArrowRight': setDirection('right'); break;
    }
  });

  // ===== 触摸/按钮事件 =====
  document.querySelectorAll('.touch-btn[data-dir]').forEach(btn => {
    btn.addEventListener('touchstart', (e) => {
      e.preventDefault();
      setDirection(btn.dataset.dir);
    });
    btn.addEventListener('mousedown', (e) => {
      e.preventDefault();
      setDirection(btn.dataset.dir);
    });
  });

  restartBtn.addEventListener('click', startGame);
  pauseBtn.addEventListener('click', togglePause);

  // ===== 启动！ =====
  init();
  // 显示 "按空格开始" 提示
  gameRunning = false;
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#00ffaa';
  ctx.font = 'bold 28px "Segoe UI", sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🐍 贪吃蛇', canvas.width/2, canvas.height/2 - 30);
  ctx.fillStyle = '#94a3b8';
  ctx.font = '16px "Segoe UI", sans-serif';
  ctx.fillText('按 空格键 或 点击按钮 开始', canvas.width/2, canvas.height/2 + 25);

  // 点击"开始游戏"启动
  const startOnClick = () => {
    if (!gameRunning) {
      startGame();
    }
  };
  canvas.addEventListener('click', startOnClick);

  // 暴露 startGame 给按钮
  window.startSnake = startGame;
})();
</script>
</body>
</html>
